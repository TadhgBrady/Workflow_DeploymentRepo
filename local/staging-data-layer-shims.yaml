apiVersion: v1
kind: Service
metadata:
  name: postgres-database
  namespace: year4-project-staging
  labels:
    app: database-layer
    app.kubernetes.io/name: database-layer
    app.kubernetes.io/component: database-layer
    app.kubernetes.io/part-of: year4-project
    service.istio.io/canonical-name: database-layer
spec:
  ports:
    - name: tcp-postgres
      port: 5434
      protocol: TCP
      targetPort: 5434
---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgres-database
  namespace: year4-project-staging
  labels:
    app: database-layer
    app.kubernetes.io/name: database-layer
    app.kubernetes.io/component: database-layer
    app.kubernetes.io/part-of: year4-project
    service.istio.io/canonical-name: database-layer
subsets:
  - addresses:
      - ip: 192.168.65.254
    ports:
      - name: tcp-postgres
        port: 5434
        protocol: TCP
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: local-postgres-database-plaintext
  namespace: year4-project-staging
  labels:
    app: database-layer
    app.kubernetes.io/name: database-layer
    app.kubernetes.io/component: database-layer
    app.kubernetes.io/part-of: year4-project
    service.istio.io/canonical-name: database-layer
spec:
  host: postgres-database.year4-project-staging.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cache
  namespace: year4-project-staging
  labels:
    app: database-layer
    app.kubernetes.io/name: database-layer
    app.kubernetes.io/component: database-layer
    app.kubernetes.io/part-of: year4-project
    service.istio.io/canonical-name: database-layer
spec:
  ports:
    - name: tcp-redis
      port: 6380
      protocol: TCP
      targetPort: 6380
---
apiVersion: v1
kind: Endpoints
metadata:
  name: redis-cache
  namespace: year4-project-staging
  labels:
    app: database-layer
    app.kubernetes.io/name: database-layer
    app.kubernetes.io/component: database-layer
    app.kubernetes.io/part-of: year4-project
    service.istio.io/canonical-name: database-layer
subsets:
  - addresses:
      - ip: 192.168.65.254
    ports:
      - name: tcp-redis
        port: 6380
        protocol: TCP
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: local-redis-cache-plaintext
  namespace: year4-project-staging
  labels:
    app: database-layer
    app.kubernetes.io/name: database-layer
    app.kubernetes.io/component: database-layer
    app.kubernetes.io/part-of: year4-project
    service.istio.io/canonical-name: database-layer
spec:
  host: redis-cache.year4-project-staging.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
