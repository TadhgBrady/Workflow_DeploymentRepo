# Kind cluster configuration for local development
# Maps host port 30080 → container port 30080 for NodePort access to NGINX
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: local-dev
nodes:
  - role: control-plane
    extraPortMappings:
      # NGINX gateway accessible at http://localhost:30080
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
