# Local infrastructure simulating AWS managed services
# PostgreSQL → simulates RDS
# Redis      → simulates ElastiCache
# Mailpit    → simulates SES/SMTP
#
# Run: docker compose -f local/docker-compose.infra.yaml up -d

services:
  # ── RDS Simulator (PostgreSQL 15) ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: local-k8s-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_calendar
    volumes:
      - local_pg_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_calendar"]
      interval: 3s
      timeout: 3s
      start_period: 10s
      retries: 5

  # ── ElastiCache Simulator (Redis 7) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: local-k8s-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass redis-dev-password
    volumes:
      - local_redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis-dev-password", "ping"]
      interval: 3s
      timeout: 3s
      start_period: 5s
      retries: 5

  # ── SES/SMTP Simulator (Mailpit) ──────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: local-k8s-mailpit
    restart: unless-stopped
    ports:
      - "1026:1025"   # SMTP
      - "8026:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  local_pg_data:
    driver: local
  local_redis_data:
    driver: local
