- op: replace
  path: /apiVersion
  value: argoproj.io/v1alpha1
- op: replace
  path: /kind
  value: Rollout
- op: add
  path: /spec/replicas
  value: 2
- op: add
  path: /spec/strategy
  value:
    canary:
      maxUnavailable: 0
      maxSurge: 1
      steps:
        - setCanaryScale:
            replicas: 1
        - setWeight: 5
        - pause:
            duration: 2m
        - setWeight: 10
        - pause:
            duration: 3m
        - setWeight: 25
        - pause:
            duration: 5m
        - setWeight: 50
        - pause:
            duration: 5m
        - setWeight: 100