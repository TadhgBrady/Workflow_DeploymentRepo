- op: add
  path: /spec/strategy/canary/stableService
  value: nginx-gateway
- op: add
  path: /spec/strategy/canary/canaryService
  value: nginx-gateway-canary
- op: add
  path: /spec/strategy/canary/trafficRouting
  value:
    istio:
      virtualService:
        name: nginx-gateway
        routes:
          - primary
- op: add
  path: /spec/strategy/canary/analysis
  value:
    startingStep: 1
    templates:
      - templateName: istio-canary-analysis
    args:
      - name: namespace
        value: year4-project
      - name: stable-service
        value: nginx-gateway
      - name: canary-service
        value: nginx-gateway-canary