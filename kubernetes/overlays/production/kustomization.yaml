apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: year4-project

# Reference the base configuration
resources:
  - ../../base
  - external-secrets.yaml
  - migration-job.yaml

# Production-specific configuration
labels:
  - pairs:
      app.kubernetes.io/name: year4-project
      app.kubernetes.io/version: "1.0.0"
      environment: production
      managed-by: kustomize

commonAnnotations:
  environment: production
  deployment.type: production
  description: "Production deployment with full replicas and LoadBalancer"
  cloudwatch.aws.amazon.com/auto-annotate-dotnet: "false"
  cloudwatch.aws.amazon.com/auto-annotate-java: "false"
  cloudwatch.aws.amazon.com/auto-annotate-nodejs: "false"
  cloudwatch.aws.amazon.com/auto-annotate-python: "false"
  instrumentation.opentelemetry.io/inject-dotnet: "false"
  instrumentation.opentelemetry.io/inject-java: "false"
  instrumentation.opentelemetry.io/inject-nodejs: "false"
  instrumentation.opentelemetry.io/inject-python: "false"

# Production uses full replicas
replicas:
  - name: auth-service
    count: 3
  - name: user-bl-service
    count: 3
  - name: user-db-access-service
    count: 3
  - name: job-bl-service-deployment
    count: 3
  - name: job-db-access-service-deployment
    count: 3
  - name: customer-bl-service
    count: 3
  - name: customer-db-access-service
    count: 3
  - name: admin-bl-service
    count: 3
  - name: maps-access-service
    count: 3
  - name: notification-service
    count: 3
  - name: frontend-deployment
    count: 3
  - name: nginx-gateway
    count: 3

# Service type patch - use LoadBalancer for production (production access)
patches:
  - path: nginx-service-patch.yaml
  - path: resource-limits-patch.yaml
  - path: nginx-resource-limits-patch.yaml

# Generated ConfigMaps
generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - DEBUG=false
      - CORS_ORIGINS=*
  - name: smtp-config
    literals:
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_FROM_EMAIL=noreply@workflow.production
      - SMTP_FROM_NAME=Workflow Platform
      - SMTP_USE_TLS=true

# namePrefix removed - breaks nginx service discovery
