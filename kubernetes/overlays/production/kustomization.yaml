apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: year4-project

# Reference the base configuration
resources:
  - namespace-security.yaml
  - ../../base
  - external-secrets.yaml
  - migration-job.yaml
  - canary-services.yaml
  - analysis-templates.yaml
  - hpa.yaml
  - pod-disruption-budgets.yaml
  - network-policies.yaml

# Production-specific configuration
labels:
  - pairs:
      app.kubernetes.io/part-of: year4-project
      app.kubernetes.io/version: "1.0.0"
      environment: production
      managed-by: kustomize

commonAnnotations:
  environment: production
  deployment.type: production
  description: "Production deployment with cost-conscious replicas and Istio ingress"
  cloudwatch.aws.amazon.com/auto-annotate-dotnet: "false"
  cloudwatch.aws.amazon.com/auto-annotate-java: "false"
  cloudwatch.aws.amazon.com/auto-annotate-nodejs: "false"
  cloudwatch.aws.amazon.com/auto-annotate-python: "false"
  instrumentation.opentelemetry.io/inject-dotnet: "false"
  instrumentation.opentelemetry.io/inject-java: "false"
  instrumentation.opentelemetry.io/inject-nodejs: "false"
  instrumentation.opentelemetry.io/inject-python: "false"

# Production uses two replicas to reduce steady-state cost while preserving basic HA.
replicas:
  - name: auth-service
    count: 2
  - name: user-bl-service
    count: 2
  - name: user-db-access-service
    count: 2
  - name: job-bl-service-deployment
    count: 2
  - name: job-db-access-service-deployment
    count: 2
  - name: customer-bl-service
    count: 2
  - name: customer-db-access-service
    count: 2
  - name: admin-bl-service
    count: 2
  - name: maps-access-service
    count: 2
  - name: notification-service
    count: 2
  - name: frontend-deployment
    count: 2
  - name: nginx-gateway
    count: 2

# Service type patch - keep nginx internal; Istio ingressgateway owns external access.
patches:
  - path: image-pins/auth-service.yaml
  - path: image-pins/user-bl-service.yaml
  - path: image-pins/user-db-access-service.yaml
  - path: image-pins/job-bl-service-deployment.yaml
  - path: image-pins/job-db-access-service-deployment.yaml
  - path: image-pins/customer-bl-service.yaml
  - path: image-pins/customer-db-access-service.yaml
  - path: image-pins/admin-bl-service.yaml
  - path: image-pins/maps-access-service.yaml
  - path: image-pins/notification-service.yaml
  - path: image-pins/frontend-deployment.yaml
  - path: image-pins/nginx-gateway.yaml
  - path: image-pins/migration-runner.yaml
  - path: nginx-service-patch.yaml
  - path: resource-limits-patch.yaml
  - path: nginx-resource-limits-patch.yaml
  - path: workload-scheduling-patch.yaml
  - path: pod-security-patch.yaml
  - target:
      kind: Ingress
      name: api-ingress
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: api-ingress
  - target:
      group: apps
      version: v1
      kind: Deployment
    path: rollout-canary-patch.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: auth-service
    path: rollout-traffic-routing/auth-service.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: user-bl-service
    path: rollout-traffic-routing/user-bl-service.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: user-db-access-service
    path: rollout-traffic-routing/user-db-access-service.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: job-bl-service-deployment
    path: rollout-traffic-routing/job-bl-service-deployment.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: job-db-access-service-deployment
    path: rollout-traffic-routing/job-db-access-service-deployment.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: customer-bl-service
    path: rollout-traffic-routing/customer-bl-service.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: customer-db-access-service
    path: rollout-traffic-routing/customer-db-access-service.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: admin-bl-service
    path: rollout-traffic-routing/admin-bl-service.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: maps-access-service
    path: rollout-traffic-routing/maps-access-service.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: notification-service
    path: rollout-traffic-routing/notification-service.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: frontend-deployment
    path: rollout-traffic-routing/frontend-deployment.yaml
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: nginx-gateway
    path: rollout-traffic-routing/nginx-gateway.yaml

# Generated ConfigMaps
generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - DEBUG=false
      - CORS_ORIGINS=*
  - name: smtp-config
    literals:
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_FROM_EMAIL=noreply@workflow.production
      - SMTP_FROM_NAME=Workflow Platform
      - SMTP_USE_TLS=true

# namePrefix removed - breaks nginx service discovery
