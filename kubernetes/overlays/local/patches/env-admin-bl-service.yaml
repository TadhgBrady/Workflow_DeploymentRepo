# admin-bl-service: needs Redis(4), user-db URL, auth, secrets
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-bl-service
spec:
  template:
    spec:
      containers:
        - name: admin-bl-service
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: app-config
          env:
            - name: ENVIRONMENT
              value: "development"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: REDIS_URL
              value: "redis://:redis-dev-password@host.docker.internal:6380/4"
            - name: USER_SERVICE_URL
              value: "http://user-db-access-service"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8008
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8008
            initialDelaySeconds: 5
            periodSeconds: 5
