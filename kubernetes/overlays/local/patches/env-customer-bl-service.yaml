# customer-bl-service: needs Redis(3), DA URLs, auth, maps, secrets
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-bl-service
spec:
  template:
    spec:
      containers:
        - name: customer-bl-service
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: app-config
          env:
            - name: ENVIRONMENT
              value: "development"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: REDIS_URL
              value: "redis://:redis-dev-password@host.docker.internal:6380/3"
            - name: CUSTOMER_SERVICE_URL
              value: "http://customer-db-access-service"
            - name: JOB_SERVICE_URL
              value: "http://job-db-access-service"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service"
            - name: MAPS_SERVICE_URL
              value: "http://maps-access-service"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8007
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8007
            initialDelaySeconds: 5
            periodSeconds: 5
