# frontend: needs BL service URLs, Google Maps browser key
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  template:
    spec:
      containers:
        - name: frontend
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: ENVIRONMENT
              value: "development"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: USER_SERVICE_URL
              value: "http://user-bl-service"
            - name: CUSTOMER_SERVICE_URL
              value: "http://customer-bl-service"
            - name: JOB_SERVICE_URL
              value: "http://job-bl-service"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service"
            - name: ADMIN_BL_SERVICE_URL
              value: "http://admin-bl-service"
            - name: GOOGLE_MAPS_BROWSER_KEY
              valueFrom:
                secretKeyRef:
                  name: google-maps-secrets
                  key: GOOGLE_MAPS_BROWSER_KEY
            - name: GOOGLE_MAPS_MAP_ID
              valueFrom:
                secretKeyRef:
                  name: google-maps-secrets
                  key: GOOGLE_MAPS_MAP_ID
