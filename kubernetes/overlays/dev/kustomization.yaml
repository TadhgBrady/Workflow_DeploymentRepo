apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: year4-project-dev

# Reference the base configuration
bases:
  - ../../base

# Development-specific configuration
# Use dev labels
commonLabels:
  app.kubernetes.io/name: year4-project
  app.kubernetes.io/version: "1.0.0"
  environment: development
  managed-by: kustomize

commonAnnotations:
  environment: development
  deployment.type: dev
  description: "Development deployment with reduced replicas"

# Development environment uses lower replicas
replicas:
  - name: auth-service
    count: 1
  - name: user-bl-service
    count: 1
  - name: user-db-access-service
    count: 1
  - name: job-bl-service
    count: 1
  - name: job-db-access-service
    count: 1
  - name: customer-bl-service
    count: 1
  - name: customer-db-access-service
    count: 1
  - name: admin-bl-service
    count: 1
  - name: job-db-access-service
    count: 1
  - name: frontend-deployment
    count: 1
  - name: nginx-gateway
    count: 1

# Use dev image tags
images:
  - name: bencev04/4th-year-proj-tadgh-bence
    newTag: dev

# Resource patches - lower resources for dev
patchesStrategicMerge:
  - nginx-deployment-patch.yaml

# Kustomize configuration
namePrefix: dev-
