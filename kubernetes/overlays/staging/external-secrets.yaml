# =============================================================================
# Staging ExternalSecrets — Pull from yr4-project/staging/* in Secrets Manager
# =============================================================================
# These create K8s Secrets in the staging namespace that pods consume.
# ESO polls AWS Secrets Manager every hour to keep values in sync.
# =============================================================================

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: yr4-project/staging/db-credentials

