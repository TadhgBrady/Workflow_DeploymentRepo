apiVersion: v1
kind: Namespace
metadata:
  name: year4-project-staging
  labels:
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-namespace-quota
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "24"
    limits.memory: 48Gi
    pods: "80"
    services: "40"
    configmaps: "80"
    secrets: "80"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: app-container-defaults
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 25m
        memory: 64Mi