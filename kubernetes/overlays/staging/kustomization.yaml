apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: year4-project-staging

# Reference the base configuration
resources:
  - namespace-security.yaml
  - ../../base
  - external-secrets.yaml
  - migration-job.yaml
  - hpa.yaml
  - pod-disruption-budgets.yaml
  - network-policies.yaml

# Staging-specific configuration
labels:
  - pairs:
      app.kubernetes.io/part-of: year4-project
      app.kubernetes.io/version: "097716b7"
      environment: staging
      managed-by: kustomize

commonAnnotations:
  environment: staging
  deployment.type: staging
  description: "Staging deployment with balanced configuration"
  cloudwatch.aws.amazon.com/auto-annotate-dotnet: "false"
  cloudwatch.aws.amazon.com/auto-annotate-java: "false"
  cloudwatch.aws.amazon.com/auto-annotate-nodejs: "false"
  cloudwatch.aws.amazon.com/auto-annotate-python: "false"
  instrumentation.opentelemetry.io/inject-dotnet: "false"
  instrumentation.opentelemetry.io/inject-java: "false"
  instrumentation.opentelemetry.io/inject-nodejs: "false"
  instrumentation.opentelemetry.io/inject-python: "false"

# Staging uses 1 replica — keep rollout pressure low on the observability-enabled node group
replicas:
  - name: auth-service
    count: 1
  - name: user-bl-service
    count: 1
  - name: user-db-access-service
    count: 1
  - name: job-bl-service-deployment
    count: 2
  - name: job-db-access-service-deployment
    count: 2
  - name: customer-bl-service
    count: 2
  - name: customer-db-access-service
    count: 2
  - name: admin-bl-service
    count: 1
  - name: maps-access-service
    count: 1
  - name: notification-service
    count: 1
  - name: frontend-deployment
    count: 1
  - name: nginx-gateway
    count: 1

# Service type patch - keep nginx internal; Istio ingressgateway owns external access.
# Ingress resource excluded; mesh Gateway/VirtualService route traffic to nginx-gateway.
# Recreate strategy — avoids 2x pods during rollout on small staging cluster
patches:
  - path: image-pins/auth-service.yaml
  - path: image-pins/user-bl-service.yaml
  - path: image-pins/user-db-access-service.yaml
  - path: image-pins/job-bl-service-deployment.yaml
  - path: image-pins/job-db-access-service-deployment.yaml
  - path: image-pins/customer-bl-service.yaml
  - path: image-pins/customer-db-access-service.yaml
  - path: image-pins/admin-bl-service.yaml
  - path: image-pins/maps-access-service.yaml
  - path: image-pins/notification-service.yaml
  - path: image-pins/frontend-deployment.yaml
  - path: image-pins/nginx-gateway.yaml
  - path: image-pins/migration-runner.yaml
  - path: nginx-service-patch.yaml
  - path: workload-scheduling-patch.yaml
  - path: pod-security-patch.yaml
  # Keep staging scheduling predictable on the small node group. This inline
  # JSON6902 patch is compatible with both standalone kustomize and
  # kubectl apply -k; do not use a multi-document patch file here.
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
  # The medium human-workflow gate concentrates traffic on job/customer reads,
  # creates, schedules, and cleanup. Give those services enough headroom to
  # absorb 10 concurrent VUs without starving probes on the small staging group.
  - target:
      kind: Deployment
      name: job-bl-service-deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 384Mi
          limits:
            cpu: 1000m
            memory: 768Mi
  - target:
      kind: Deployment
      name: job-db-access-service-deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 384Mi
          limits:
            cpu: 1000m
            memory: 768Mi
  - target:
      kind: Deployment
      name: customer-bl-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 384Mi
          limits:
            cpu: 1000m
            memory: 768Mi
  - target:
      kind: Deployment
      name: customer-db-access-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 384Mi
          limits:
            cpu: 1000m
            memory: 768Mi
  - target:
      kind: Ingress
      name: api-ingress
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: api-ingress
  - target:
      kind: Deployment
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: unused
      spec:
        strategy:
          type: Recreate

# ── Generated ConfigMaps ────────────────────────────────────────
generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=INFO
      - DEBUG=false
      - CORS_ORIGINS=*
  - name: smtp-config
    literals:
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_FROM_EMAIL=noreply@workflow.staging
      - SMTP_FROM_NAME=Workflow Platform (Staging)
      - SMTP_USE_TLS=true
