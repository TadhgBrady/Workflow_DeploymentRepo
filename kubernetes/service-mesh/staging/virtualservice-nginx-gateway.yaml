apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: nginx-gateway
  namespace: year4-project-staging
spec:
  hosts:
    - "*"
  gateways:
    - year4-project-gateway
  http:
    - route:
        - destination:
            host: nginx-gateway.year4-project-staging.svc.cluster.local
            port:
              number: 80