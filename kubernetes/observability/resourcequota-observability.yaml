apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: year4-project-observability
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "8"
    requests.storage: 80Gi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: logging-quota
  namespace: logging
  labels:
    app.kubernetes.io/part-of: year4-project-observability
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
