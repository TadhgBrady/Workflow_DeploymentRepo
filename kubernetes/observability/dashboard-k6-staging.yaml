apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-year4-k6-staging
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: year4-k6-staging
    app.kubernetes.io/part-of: year4-project-observability
data:
  year4-k6-staging.json: |
    {
      "uid": "year4-k6-staging",
      "title": "Year4 Staging k6 Load Gate",
      "tags": ["year4-project", "staging", "k6", "load-test"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "10s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "testid",
            "label": "k6 test id",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(k6_http_reqs_total{environment=~\"staging|local-staging\"}, testid)",
            "refresh": 2,
            "sort": 2,
            "includeAll": true,
            "multi": false,
            "current": {"selected": true, "text": "All", "value": "$__all"}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "How this dashboard is populated",
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 3},
          "options": {
            "mode": "markdown",
            "content": "The GitLab staging-tests stage launches short-lived grafana/k6 Kubernetes Jobs. The automated load gate blocks release flow on threshold failures; the manual baseline and human-workflow jobs are allowed to fail and are used for tuning. Local kind runs use the same Prometheus remote write path with environment=local-staging. Filter by testid to inspect a run. The limiter and capacity panels show whether failures are caused by the gateway, app/service mesh, HPA headroom, or cluster capacity."
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Request Rate",
          "gridPos": {"x": 0, "y": 3, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(rate(k6_http_reqs_total{environment=~\"staging|local-staging\",testid=~\"$testid\"}[1m])) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "reqps"},
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Active VUs",
          "gridPos": {"x": 6, "y": 3, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max(k6_vus{environment=~\"staging|local-staging\",testid=~\"$testid\"}) or vector(0)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Failed Request Rate",
          "gridPos": {"x": 12, "y": 3, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max(k6_http_req_failed_rate{environment=~\"staging|local-staging\",testid=~\"$testid\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.005},
                  {"color": "red", "value": 0.01}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Checks Pass Rate",
          "gridPos": {"x": 18, "y": 3, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max(k6_checks_rate{environment=~\"staging|local-staging\",testid=~\"$testid\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "orange", "value": 0.95},
                  {"color": "green", "value": 0.98}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Request Rate by Endpoint",
          "gridPos": {"x": 0, "y": 7, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by (name) (rate(k6_http_reqs_total{environment=~\"staging|local-staging\",testid=~\"$testid\"}[1m]))",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "reqps"},
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "p95 / p99 Latency by Endpoint",
          "gridPos": {"x": 12, "y": 7, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max by (name) (k6_http_req_duration_p95{environment=~\"staging|local-staging\",testid=~\"$testid\"})",
              "legendFormat": "p95 {{name}}",
              "refId": "A"
            },
            {
              "expr": "max by (name) (k6_http_req_duration_p99{environment=~\"staging|local-staging\",testid=~\"$testid\"})",
              "legendFormat": "p99 {{name}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "ms"},
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Failure Rate by Endpoint",
          "gridPos": {"x": 0, "y": 15, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max by (name) (k6_http_req_failed_rate{environment=~\"staging|local-staging\",testid=~\"$testid\"})",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "percentunit"},
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Status Code Rate",
          "gridPos": {"x": 12, "y": 15, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by (status) (rate(k6_http_reqs_total{environment=~\"staging|local-staging\",testid=~\"$testid\"}[1m]))",
              "legendFormat": "HTTP {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "reqps"},
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Checks Pass Rate by Endpoint",
          "gridPos": {"x": 0, "y": 23, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max by (name) (k6_checks_rate{environment=~\"staging|local-staging\",testid=~\"$testid\"})",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "percentunit"},
            "overrides": []
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Server Error Rate by Endpoint",
          "gridPos": {"x": 12, "y": 23, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max by (name) (k6_server_errors_rate{environment=~\"staging|local-staging\",testid=~\"$testid\"})",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "percentunit"},
            "overrides": []
          }
        },
        {
          "id": 12,
          "type": "stat",
          "title": "Workflow Success Rate",
          "gridPos": {"x": 0, "y": 31, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max(k6_workflow_success_rate{environment=~\"staging|local-staging\",testid=~\"$testid\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "orange", "value": 0.9},
                  {"color": "green", "value": 0.95}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 13,
          "type": "stat",
          "title": "Cleanup Failure Rate",
          "gridPos": {"x": 6, "y": 31, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max(k6_cleanup_failures_rate{environment=~\"staging|local-staging\",testid=~\"$testid\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.01},
                  {"color": "red", "value": 0.02}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 14,
          "type": "stat",
          "title": "Auth Failure Rate",
          "gridPos": {"x": 12, "y": 31, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max(k6_auth_failures_rate{environment=~\"staging|local-staging\",testid=~\"$testid\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.005},
                  {"color": "red", "value": 0.01}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 15,
          "type": "stat",
          "title": "Expected Conflicts",
          "gridPos": {"x": 18, "y": 31, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(increase(k6_expected_conflicts_total{environment=~\"staging|local-staging\",testid=~\"$testid\"}[30m])) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": []
          }
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Workflow Duration p95 by Journey",
          "gridPos": {"x": 0, "y": 35, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max by (journey) (k6_workflow_duration_p95{environment=~\"staging|local-staging\",testid=~\"$testid\"})",
              "legendFormat": "{{journey}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "ms"},
            "overrides": []
          }
        },
        {
          "id": 17,
          "type": "timeseries",
          "title": "Scheduling and Conflict p95",
          "gridPos": {"x": 12, "y": 35, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max(k6_scheduling_duration_p95{environment=~\"staging|local-staging\",testid=~\"$testid\"}) or vector(0)",
              "legendFormat": "scheduling p95",
              "refId": "A"
            },
            {
              "expr": "max(k6_conflict_check_duration_p95{environment=~\"staging|local-staging\",testid=~\"$testid\"}) or vector(0)",
              "legendFormat": "conflict check p95",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "ms"},
            "overrides": []
          }
        },
        {
          "id": 18,
          "type": "stat",
          "title": "Token Refresh Failure Rate",
          "gridPos": {"x": 0, "y": 43, "w": 12, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "max(k6_token_refresh_failures_rate{environment=~\"staging|local-staging\",testid=~\"$testid\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.005},
                  {"color": "red", "value": 0.01}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 19,
          "type": "stat",
          "title": "Auth Recoveries",
          "gridPos": {"x": 12, "y": 43, "w": 12, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(increase(k6_auth_recoveries_total{environment=~\"staging|local-staging\",testid=~\"$testid\"}[30m])) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": []
          }
        },
        {
          "id": 20,
          "type": "text",
          "title": "Limiter And Capacity Triage",
          "gridPos": {"x": 0, "y": 47, "w": 24, "h": 3},
          "options": {
            "mode": "markdown",
            "content": "Use this row while a k6 run is active. If Gateway 429 RPS rises, nginx is the bottleneck. If gateway RPS is under the configured limit but 5xx or Envoy flags rise, inspect the named workload. If HPA headroom approaches 100% or Karpenter nodes rise, the app or cluster is scaling."
          }
        },
        {
          "id": 21,
          "type": "stat",
          "title": "Gateway API Limit",
          "gridPos": {"x": 0, "y": 50, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "vector(150)", "refId": "A"}
          ],
          "fieldConfig": {
            "defaults": {"unit": "reqps"},
            "overrides": []
          }
        },
        {
          "id": 22,
          "type": "stat",
          "title": "Gateway RPS / Limit",
          "gridPos": {"x": 4, "y": 50, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "100 * sum(rate(istio_requests_total{destination_workload_namespace=\"year4-project-staging\",destination_workload=\"nginx-gateway\",reporter=\"destination\"}[1m])) / 150", "refId": "A"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 75},
                  {"color": "red", "value": 100}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 23,
          "type": "stat",
          "title": "Gateway 429 RPS",
          "gridPos": {"x": 8, "y": 50, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(rate(istio_requests_total{destination_workload_namespace=\"year4-project-staging\",destination_workload=\"nginx-gateway\",reporter=\"destination\",response_code=\"429\"}[1m])) or vector(0)", "refId": "A"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.1},
                  {"color": "red", "value": 1}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 24,
          "type": "stat",
          "title": "HPA Desired / Max",
          "gridPos": {"x": 12, "y": 50, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "100 * sum(kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"year4-project-staging\"}) / sum(kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"year4-project-staging\"})", "refId": "A"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 25,
          "type": "stat",
          "title": "Karpenter Nodes",
          "gridPos": {"x": 16, "y": 50, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "count(kube_node_labels{label_karpenter_sh_nodepool=~\".+\"}) or vector(0)", "refId": "A"}
          ],
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": []
          }
        },
        {
          "id": 26,
          "type": "stat",
          "title": "Ready Nodes",
          "gridPos": {"x": 20, "y": 50, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})", "refId": "A"}
          ],
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": []
          }
        },
        {
          "id": 27,
          "type": "timeseries",
          "title": "Gateway RPS, Limit, And 429s",
          "gridPos": {"x": 0, "y": 54, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(rate(istio_requests_total{destination_workload_namespace=\"year4-project-staging\",destination_workload=\"nginx-gateway\",reporter=\"destination\"}[1m]))", "legendFormat": "gateway rps", "refId": "A"},
            {"expr": "vector(150)", "legendFormat": "api_general limit", "refId": "B"},
            {"expr": "sum(rate(istio_requests_total{destination_workload_namespace=\"year4-project-staging\",destination_workload=\"nginx-gateway\",reporter=\"destination\",response_code=\"429\"}[1m])) or vector(0)", "legendFormat": "429 rate limited", "refId": "C"}
          ],
          "fieldConfig": {
            "defaults": {"unit": "reqps"},
            "overrides": []
          }
        },
        {
          "id": 28,
          "type": "timeseries",
          "title": "Kiali Error Rate by Workload and Code",
          "gridPos": {"x": 12, "y": 54, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum by (destination_workload,response_code,response_flags) (rate(istio_requests_total{destination_workload_namespace=\"year4-project-staging\",reporter=\"destination\",response_code!~\"2..|3..\"}[1m]))", "legendFormat": "{{destination_workload}} {{response_code}} {{response_flags}}", "refId": "A"}
          ],
          "fieldConfig": {
            "defaults": {"unit": "reqps"},
            "overrides": []
          }
        },
        {
          "id": 29,
          "type": "timeseries",
          "title": "HPA Desired Current And Max",
          "gridPos": {"x": 0, "y": 62, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(kube_horizontalpodautoscaler_status_current_replicas{namespace=\"year4-project-staging\"})", "legendFormat": "current", "refId": "A"},
            {"expr": "sum(kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"year4-project-staging\"})", "legendFormat": "desired", "refId": "B"},
            {"expr": "sum(kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"year4-project-staging\"})", "legendFormat": "max", "refId": "C"}
          ],
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": []
          }
        },
        {
          "id": 30,
          "type": "timeseries",
          "title": "Node CPU And Memory Utilization",
          "gridPos": {"x": 12, "y": 62, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "100 * (1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))", "legendFormat": "cpu", "refId": "A"},
            {"expr": "100 * (1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))", "legendFormat": "memory", "refId": "B"}
          ],
          "fieldConfig": {
            "defaults": {"unit": "percent"},
            "overrides": []
          }
        }
      ]
    }
