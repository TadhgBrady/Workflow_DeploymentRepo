apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-defaults
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: year4-project-observability
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 128Mi
      default:
        cpu: 200m
        memory: 256Mi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: logging-defaults
  namespace: logging
  labels:
    app.kubernetes.io/part-of: year4-project-observability
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 200m
        memory: 256Mi