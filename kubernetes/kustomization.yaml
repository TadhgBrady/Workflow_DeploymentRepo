apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: year4-project
  namespace: default

# Include all YAML files from base directory
resources:
  - base

# Common labels applied to all resources
labels:
  - pairs:
      app.kubernetes.io/name: year4-project
      app.kubernetes.io/version: "1.0.0"
      managed-by: kustomize
    includeSelectors: false
    includeTemplates: true

# Common annotations
commonAnnotations:
  deployment.type: microservices
  documentation: "See README.md for details"

# Image tags are defined per-service in base deployment manifests
