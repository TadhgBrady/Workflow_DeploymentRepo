apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-bl-service
  labels:
    app: admin-bl-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: admin-bl-service
  template:
    metadata:
      labels:
        app: admin-bl-service
        version: v1
    spec:
      containers:
      - name: admin-bl-service
        image: admin-bl-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - admin-bl-service
              topologyKey: kubernetes.io/hostname
