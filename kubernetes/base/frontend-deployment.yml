apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend-sa
      containers:
      - name: frontend
        image: bencev04/4th-year-proj-tadgh-bence:frontend-latest
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - secretRef:
            name: app-secrets
        - configMapRef:
            name: app-config
        env:
        - name: USER_BL_SERVICE_URL
          value: "http://user-bl-service"
        - name: CUSTOMER_BL_SERVICE_URL
          value: "http://customer-bl-service"
        - name: JOB_BL_SERVICE_URL
          value: "http://job-bl-service"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service"
        - name: ADMIN_BL_SERVICE_URL
          value: "http://admin-bl-service"
        - name: GOOGLE_MAPS_BROWSER_KEY
          valueFrom:
            secretKeyRef:
              name: google-maps-secrets
              key: GOOGLE_MAPS_BROWSER_KEY
        - name: GOOGLE_MAPS_MAP_ID
          valueFrom:
            secretKeyRef:
              name: google-maps-secrets
              key: GOOGLE_MAPS_MAP_ID
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 10