apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-db-access-service
  labels:
    app: user-db-access-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-db-access-service
  template:
    metadata:
      labels:
        app: user-db-access-service
    spec:
      containers:
      - name: user-db-access-service
        image: bencev04/4th-year-proj-tadgh-bence:user-db-access-service-latest
        ports:
        - containerPort: 8001
          name: http
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5