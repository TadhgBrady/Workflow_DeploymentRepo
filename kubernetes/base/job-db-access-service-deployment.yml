apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-db-access-service-deployment
  labels:
    app: job-db-access-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-db-access-service
  template:
    metadata:
      labels:
        app: job-db-access-service
    spec:
      serviceAccountName: job-db-access-sa
      containers:
      - name: job-db-access-service
        image: bencev04/4th-year-proj-tadgh-bence:job-db-access-service-latest
        ports:
        - containerPort: 8003
          name: http
          protocol: TCP
        envFrom:
        - secretRef:
            name: app-secrets
        - configMapRef:
            name: app-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DATABASE_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 10