# RBAC Configuration for Year4 Project
# Implements least-privilege access control for all microservices

---
# Auth Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  labels:
    app: auth-service

---
# Auth Service Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auth-service-role
rules:
# Allow reading secrets for auth configuration
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["auth-secrets"]
  verbs: ["get"]
# Allow reading configmaps for auth config
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["auth-config"]
  verbs: ["get"]
# Allow writing logs (via stdout/stderr)
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]

---
# Auth Service RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auth-service-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: auth-service-role
subjects:
- kind: ServiceAccount
  name: auth-service-sa

