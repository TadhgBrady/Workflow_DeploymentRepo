apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-config
  labels:
    app: nginx-gateway
    component: config
data:
  nginx.conf: |
    # ==============================================================================
    # CRM Calendar — NGINX API Gateway
    # ==============================================================================
    #
    # Single entry-point for all traffic.  Responsibilities:
    #   • Reverse-proxy to business-layer services and the frontend
    #   • Security headers (OWASP baseline)
    #   • Gzip / Brotli compression
    #   • Rate limiting (login brute-force protection)
    #   • Request size limits
    #   • Static asset caching directives
    #   • WebSocket upgrade support (for future use)
    #   • Hides internal DB-access services from the public internet
    #
    # Architecture:
    #   Client ──► NGINX :80 ──┬──► frontend          :8000  (HTML / HTMX)
    #                           ├──► auth-service       :8005  /api/v1/auth/*
    #                           ├──► user-bl-service    :8004  /api/v1/users/* , /api/v1/employees/* , /api/v1/company
    #                           ├──► job-bl-service     :8006  /api/v1/jobs/*
    #                           ├──► customer-bl-service:8007  /api/v1/customers/* , /api/v1/notes/*
    #                           └──► admin-bl-service   :8008  /api/v1/admin/*  (superadmin only)
    #
    # DB-access services (8001-8003) are NEVER exposed through the gateway.
    # ==============================================================================

    worker_processes auto;
    worker_rlimit_nofile 65535;

    error_log /var/log/nginx/error.log warn;
    pid       /var/run/nginx.pid;

    events {
        worker_connections 4096;
        multi_accept       on;
        use                epoll;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        log_format json_combined escape=json
            '{'
                '"time":"$time_iso8601",'
                '"remote_addr":"$remote_addr",'
                '"request":"$request",'
                '"status":$status,'
                '"body_bytes_sent":$body_bytes_sent,'
                '"request_time":$request_time,'
                '"upstream_response_time":"$upstream_response_time",'
                '"http_user_agent":"$http_user_agent",'
                '"http_x_forwarded_for":"$http_x_forwarded_for"'
            '}';

        access_log /var/log/nginx/access.log json_combined;

        sendfile        on;
        tcp_nopush      on;
        tcp_nodelay     on;
        keepalive_timeout  65;
        types_hash_max_size 2048;
        server_tokens off;

        gzip              on;
        gzip_vary         on;
        gzip_proxied      any;
        gzip_comp_level   6;
        gzip_min_length   256;
        gzip_types
            text/plain
            text/css
            text/javascript
            application/json
            application/javascript
            application/xml
            application/xml+rss
            image/svg+xml;

        client_max_body_size       10m;
        client_body_buffer_size    128k;
        client_header_buffer_size  1k;
        large_client_header_buffers 4 8k;

        limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
        limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
        limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

        upstream frontend {
            server frontend:8000;
            keepalive 32;
        }

        upstream auth_service {
            server auth-service:8005;
            keepalive 16;
        }

        upstream user_service {
            server user-bl-service:8004;
            keepalive 16;
        }

        upstream job_service {
            server job-bl-service:8006;
            keepalive 16;
        }

        upstream customer_service {
            server customer-bl-service:8007;
            keepalive 16;
        }

        upstream admin_service {
            server admin-bl-service:8008;
            keepalive 16;
        }

        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        server {
            listen 80 default_server;
            server_name _;
            
            location = /health {
                access_log off;
                default_type application/json;
                return 200 '{"status":"healthy","service":"nginx-gateway","version":"1.0.0"}';
            }
            
            location / {
                return 444;
            }
        }

        server {
            listen 80;
            server_name localhost crm.local;

            limit_conn conn_limit 100;

            add_header X-Frame-Options        "SAMEORIGIN"       always;
            add_header X-Content-Type-Options "nosniff"          always;
            add_header X-XSS-Protection       "1; mode=block"    always;
            add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Robots-Tag "noindex, nofollow" always;

            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  5s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;

            proxy_buffering        on;
            proxy_buffer_size      4k;
            proxy_buffers          8 8k;

            location /api/auth {
                limit_req zone=auth_limit burst=10 nodelay;
                limit_req_status 429;
                proxy_pass http://frontend/api/auth;
            }

            location /api/users {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://frontend/api/users;
            }

            location /api/employees {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://frontend/api/employees;
            }

            location /api/customers {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://frontend/api/customers;
            }

            location /api/notes {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://frontend/api/notes;
            }

            location /api/jobs {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://frontend/api/jobs;
            }

            location /api/admin {
                limit_req zone=api_general burst=10 nodelay;
                limit_req_status 429;
                proxy_pass http://frontend/api/admin;
            }

            location /api/admin/ {
                limit_req zone=api_general burst=10 nodelay;
                limit_req_status 429;
                proxy_pass http://frontend/api/admin/;
            }

            location /api/v1/auth {
                limit_req zone=auth_limit burst=10 nodelay;
                limit_req_status 429;
                proxy_pass http://auth_service;
            }

            location /api/v1/users {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://user_service;
            }

            location /api/v1/employees {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://user_service;
            }

            location /api/v1/company {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://user_service;
            }

            location /api/v1/jobs {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://job_service;
            }

            location /api/v1/customers {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://customer_service;
            }

            location /api/v1/notes {
                limit_req zone=api_general burst=20 nodelay;
                limit_req_status 429;
                proxy_pass http://customer_service;
            }

            location /api/v1/admin {
                limit_req zone=api_general burst=10 nodelay;
                limit_req_status 429;
                proxy_pass http://admin_service;
            }

            location = /health {
                access_log off;
                default_type application/json;
                return 200 '{"status":"healthy","service":"nginx-gateway","version":"1.0.0"}';
            }

            location /static/ {
                proxy_pass http://frontend;
                expires 7d;
                add_header Cache-Control "public, immutable";
                add_header X-Content-Type-Options "nosniff" always;
            }

            location / {
                limit_req zone=api_general burst=40 nodelay;
                limit_req_status 429;
                proxy_pass http://frontend;
                proxy_set_header Upgrade    $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
            }

            location ~ ^/api/v1/internal/ {
                deny all;
                return 403;
            }

            error_page 429 /429.json;
            location = /429.json {
                default_type application/json;
                return 429 '{"detail":"Too many requests. Please slow down.","code":"RATE_LIMITED"}';
            }

            error_page 502 /502.json;
            location = /502.json {
                default_type application/json;
                return 502 '{"detail":"Service temporarily unavailable.","code":"BAD_GATEWAY"}';
            }

            error_page 503 /503.json;
            location = /503.json {
                default_type application/json;
                return 503 '{"detail":"Service is undergoing maintenance.","code":"SERVICE_UNAVAILABLE"}';
            }

            error_page 504 /504.json;
            location = /504.json {
                default_type application/json;
                return 504 '{"detail":"Upstream service did not respond in time.","code":"GATEWAY_TIMEOUT"}';
            }
        }
    }
