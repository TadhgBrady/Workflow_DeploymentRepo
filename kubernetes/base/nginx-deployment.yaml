apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  labels:
    app: nginx-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nginx-gateway-sa
      initContainers:
      - name: init-permissions
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            mkdir -p /var/cache/nginx /var/log/nginx && \
            chown -R 101:101 /var/cache/nginx /var/log/nginx
        volumeMounts:
          - name: nginx-logs
            mountPath: /var/log/nginx
          - name: nginx-cache
            mountPath: /var/cache/nginx

      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
        - name: nginx-logs
          mountPath: /var/log/nginx
        - name: nginx-cache
          mountPath: /var/cache/nginx
        securityContext:
          runAsUser: 101
          runAsGroup: 101
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
            add: ["NET_BIND_SERVICE"]
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-gateway-config
          items:
            - key: nginx.conf
              path: nginx.conf
      - name: nginx-logs
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      terminationGracePeriodSeconds: 30