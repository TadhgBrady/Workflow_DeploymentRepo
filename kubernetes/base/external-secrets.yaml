# =============================================================================
# ClusterSecretStore — Tells ESO how to authenticate with AWS Secrets Manager
# =============================================================================
#
# This is cluster-wide (not namespace-scoped) so both staging and prod
# namespaces can reference it. The ExternalSecret resources that reference
# this store are in each overlay (overlays/staging/, overlays/production/).
#
# PREREQUISITES:
#   1. External Secrets Operator installed (helm install external-secrets ...)
#   2. IRSA role created by Terraform (module.iam.eso_role_arn)
#   3. ServiceAccount annotated with the IRSA role ARN
#
# WHAT HAPPENS IF RDS IS RECREATED:
#   1. terraform apply → updates Secrets Manager with new RDS endpoint
#   2. ESO polls Secrets Manager (refreshInterval: 1h, or trigger manually)
#   3. ESO updates the K8s Secret with the new endpoint
#   4. Rolling restart of pods picks up the new values
#
# TO FORCE IMMEDIATE SYNC (don't wait for poll interval):
#   kubectl annotate externalsecret db-credentials \
#     force-sync=$(date +%s) --overwrite -n <namespace>
# =============================================================================

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
