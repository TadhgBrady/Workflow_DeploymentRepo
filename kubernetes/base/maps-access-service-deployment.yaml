apiVersion: apps/v1
kind: Deployment
metadata:
  name: maps-access-service
  labels:
    app: maps-access-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maps-access-service
  template:
    metadata:
      labels:
        app: maps-access-service
    spec:
      serviceAccountName: maps-access-service-sa
      containers:
      - name: maps-access-service
        image: bencev04/4th-year-proj-tadgh-bence:maps-access-service-latest
        ports:
        - containerPort: 8009
          name: http
          protocol: TCP
        envFrom:
        - secretRef:
            name: app-secrets
        - configMapRef:
            name: app-config
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: MAPS_REDIS_URL
        - name: GOOGLE_MAPS_SERVER_KEY
          valueFrom:
            secretKeyRef:
              name: google-maps-secrets
              key: GOOGLE_MAPS_SERVER_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8009
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 8009
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 10
