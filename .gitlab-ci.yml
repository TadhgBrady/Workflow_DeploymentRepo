    - aws eks update-kubeconfig --name $STAGING_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    - |
      set -eu
      if [ -z "${STAGING_URL:-}" ]; then
        echo "❌ STAGING_URL was not exported by deploy-staging"
        exit 1
      fi
      sh scripts/deployment/run-k6-staging.sh "$STAGING_URL"
  artifacts:
    when: always
    paths:
      - k6-results/
    expire_in: 14 days
  rules:
    - if: '$IMAGE_VERSION && $PIPELINE_MODE != "validate-only"'
      when: manual
      allow_failure: true
  allow_failure: true

# =============================================================================
# STAGE 6: PLAYWRIGHT E2E — Browser validation after k6 load gate
# =============================================================================
# Runs browser-based end-to-end tests against the deployed staging frontend.
# This is a hard release gate: browser regressions block promotion.

playwright-e2e-staging:
  stage: e2e-tests
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  needs:
    - smoke-tests-staging
    - k6-load-staging
    - job: deploy-staging
      artifacts: true
  variables:
    PLAYWRIGHT_E2E_DIR: "tests/e2e"
  script:
    - |
      set -eu
      if [ -z "${STAGING_URL:-}" ]; then
        echo "❌ STAGING_URL was not exported by deploy-staging"
        exit 1
      fi
      sh scripts/deployment/run-playwright-staging.sh "$STAGING_URL"
  artifacts:
    when: always
    paths:
      - tests/e2e/playwright-report/
      - tests/e2e/test-results/
    reports:
      junit: tests/e2e/test-results/playwright-junit.xml
    expire_in: 14 days
  rules:
    - if: '$IMAGE_VERSION && $PIPELINE_MODE != "validate-only"'
      when: on_success
  allow_failure: false

# =============================================================================
# STAGE 7: PROMOTE — Combined staging evidence and release choices
# =============================================================================
# This job records the exact image version, target URL, k6 evidence, and
# Playwright evidence that passed. When it succeeds, the pipeline exposes the
# manual choices to promote to production or destroy staging.

promote:
  stage: promote
  image: alpine:latest
  needs:
    - smoke-tests-staging
    - job: k6-load-staging
      artifacts: true
    - job: playwright-e2e-staging
      artifacts: true
    - job: deploy-staging
      artifacts: true
  script:
    - |
      set -eu
      EVIDENCE_DIR="promotion-evidence"
      mkdir -p "$EVIDENCE_DIR"

      K6_METADATA="$(find k6-results -name '*-metadata.json' | sort | head -1 || true)"
      K6_SUMMARY="$(find k6-results -name '*-summary.json' | sort | head -1 || true)"
      PLAYWRIGHT_METADATA="tests/e2e/test-results/metadata.json"
      PLAYWRIGHT_JUNIT="tests/e2e/test-results/playwright-junit.xml"
      PLAYWRIGHT_JSON="tests/e2e/test-results/playwright-results.json"
      PLAYWRIGHT_HTML="tests/e2e/playwright-report/index.html"

      if [ ! -f "$PLAYWRIGHT_METADATA" ] && [ -f "tests/e2e/test-results/summary.md" ]; then
        echo "⚠️  Playwright metadata artifact is missing; rebuilding it from summary/env evidence."
        PLAYWRIGHT_SUMMARY="tests/e2e/test-results/summary.md"
        PLAYWRIGHT_TEST_ID_FALLBACK="$(sed -n 's/^Test ID: //p' "$PLAYWRIGHT_SUMMARY" | head -1)"
        PLAYWRIGHT_TARGET_FALLBACK="$(sed -n 's/^Target URL: //p' "$PLAYWRIGHT_SUMMARY" | head -1)"
        PLAYWRIGHT_TEST_ID_DEFAULT="playwright-${CI_PIPELINE_ID:-local}-${CI_JOB_ID:-local}"
        cat > "$PLAYWRIGHT_METADATA" <<EOF
      {
        "test_id": "${PLAYWRIGHT_TEST_ID_FALLBACK:-$PLAYWRIGHT_TEST_ID_DEFAULT}",
        "environment": "staging",
        "target_url": "${STAGING_URL:-$PLAYWRIGHT_TARGET_FALLBACK}",
        "image_version": "${IMAGE_VERSION:-unknown}",
        "pipeline_id": "${CI_PIPELINE_ID:-local}",
        "job_id": "${CI_JOB_ID:-local}",
        "commit_sha": "${CI_COMMIT_SHA:-unknown}"
      }
      EOF
      fi

      for REQUIRED in "$K6_METADATA" "$K6_SUMMARY" "$PLAYWRIGHT_METADATA" "$PLAYWRIGHT_JUNIT" "$PLAYWRIGHT_JSON" "$PLAYWRIGHT_HTML"; do
        if [ -z "$REQUIRED" ] || [ ! -f "$REQUIRED" ]; then
          echo "❌ Missing required release evidence artifact: ${REQUIRED:-<empty>}"
          find k6-results tests/e2e/test-results tests/e2e/playwright-report -maxdepth 2 -type f 2>/dev/null || true
          exit 1
        fi
      done

      metadata_value() {
        file="$1"
        key="$2"
        sed -n "s/.*\"$key\": \"\([^\"]*\)\".*/\1/p" "$file" | head -1
      }

      K6_TEST_ID="$(metadata_value "$K6_METADATA" test_id)"
      PLAYWRIGHT_TEST_ID="$(metadata_value "$PLAYWRIGHT_METADATA" test_id)"
      TARGET_URL="${STAGING_URL:-$(metadata_value "$PLAYWRIGHT_METADATA" target_url)}"

      if [ -z "$K6_TEST_ID" ] || [ -z "$PLAYWRIGHT_TEST_ID" ] || [ -z "$TARGET_URL" ]; then
        echo "❌ Could not parse release evidence metadata"
        echo "k6_test_id=$K6_TEST_ID playwright_test_id=$PLAYWRIGHT_TEST_ID target_url=$TARGET_URL"
        exit 1
      fi

      cat > "$EVIDENCE_DIR/promotion.md" <<EOF
      # Promotion Evidence

      Status: ready
      Image version: ${IMAGE_VERSION:-unknown}
      Source commit: ${SOURCE_COMMIT:-${CI_COMMIT_SHA:-unknown}}
      Target URL: $TARGET_URL

      ## Mandatory gates
      - smoke-tests-staging: passed
      - k6-load-staging: passed
      - playwright-e2e-staging: passed

      ## k6 evidence
      - Test ID: $K6_TEST_ID
      - Metadata: $K6_METADATA
      - JSON summary: $K6_SUMMARY
      - Grafana: /d/year4-k6-staging filtered by testid=$K6_TEST_ID

      ## Playwright evidence
      - Test ID: $PLAYWRIGHT_TEST_ID
      - JUnit: $PLAYWRIGHT_JUNIT
      - JSON results: $PLAYWRIGHT_JSON
      - HTML report: $PLAYWRIGHT_HTML
      - Metadata: $PLAYWRIGHT_METADATA
      EOF

      cat > "$EVIDENCE_DIR/promotion.json" <<EOF
      {
        "status": "ready",
        "image_version": "${IMAGE_VERSION:-unknown}",
        "source_commit": "${SOURCE_COMMIT:-${CI_COMMIT_SHA:-unknown}}",
        "target_url": "$TARGET_URL",
        "k6_test_id": "$K6_TEST_ID",
        "k6_metadata": "$K6_METADATA",
        "k6_summary": "$K6_SUMMARY",
        "playwright_test_id": "$PLAYWRIGHT_TEST_ID",
        "playwright_junit": "$PLAYWRIGHT_JUNIT",
        "playwright_json": "$PLAYWRIGHT_JSON",
        "playwright_html_report": "$PLAYWRIGHT_HTML"
      }
      EOF

      cat "$EVIDENCE_DIR/promotion.md"
  artifacts:
    when: always
    paths:
      - promotion-evidence/
      - k6-results/
      - tests/e2e/playwright-report/
      - tests/e2e/test-results/
    expire_in: 14 days
  rules:
    - if: '$IMAGE_VERSION && $PIPELINE_MODE != "validate-only"'
      when: on_success
  allow_failure: false

# =============================================================================
# PROMOTE OPTION: Destroy staging after validation
# =============================================================================
# This manual choice can destroy staging after validation succeeds. Normal
# production promotion does not depend on teardown; use
# PIPELINE_MODE=staging-teardown-test when teardown proof is the primary purpose.

confirm-destroy-staging:
  stage: promote
  image: alpine:latest
  needs:
    - promote
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Manual approval: DESTROY STAGING infrastructure"
      echo "═══════════════════════════════════════════════════════════════"
      echo "This will trigger a full Terraform destroy for STAGING only."
      echo "Expected destroyed cost resources: staging EKS, worker nodes, VPC/NAT, RDS, Redis, ELBs, security groups."
      echo "Expected preserved resources: Terraform S3/DynamoDB bootstrap and persistent secrets state."
      echo "Production promotion is available from the promote stage; teardown is optional unless PIPELINE_MODE=staging-teardown-test."
  rules:
    - if: '$IMAGE_VERSION && $PIPELINE_MODE == "staging-teardown-test"'
      when: manual
      allow_failure: false
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: manual
      allow_failure: true

cleanup-staging-loadbalancers:
  stage: destroy-staging
  image: alpine:latest
  needs:
    - confirm-destroy-staging
  before_script:
    - apk add --no-cache curl bash python3 py3-pip
    - pip3 install --break-system-packages awscli
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
  script:
    - |
      set -eu
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Pre-destroy cleanup (staging): release cloud load balancers"
      echo "═══════════════════════════════════════════════════════════════"

      if ! aws eks describe-cluster --name "$STAGING_CLUSTER_NAME" --region "$AWS_DEFAULT_REGION" > /dev/null 2>&1; then
        echo "ℹ️  Staging cluster does not exist. Nothing to clean up."
        exit 0
      fi

      aws eks update-kubeconfig --name "$STAGING_CLUSTER_NAME" --region "$AWS_DEFAULT_REGION"

      LB_SERVICES=$(kubectl get svc --all-namespaces -o jsonpath='{range .items[?(@.spec.type=="LoadBalancer")]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)
      if [ -n "$LB_SERVICES" ]; then
        echo "Deleting LoadBalancer services across all staging cluster namespaces to release cloud load balancers..."
        printf '%s\n' "$LB_SERVICES" | while read -r NS SVC; do
          [ -n "$NS" ] && [ -n "$SVC" ] || continue
          echo "  Deleting service: $NS/$SVC"
          kubectl delete svc "$SVC" -n "$NS" --wait=true --timeout=180s || true
        done
      else
        echo "ℹ️  No LoadBalancer services found in the staging cluster."
      fi

      VPC_ID=$(aws eks describe-cluster --name "$STAGING_CLUSTER_NAME" --region "$AWS_DEFAULT_REGION" \
        --query 'cluster.resourcesVpcConfig.vpcId' --output text)
      echo "Staging VPC: $VPC_ID"

      echo "Cleaning any remaining ALB/NLB in staging VPC..."
      for ARN in $(aws elbv2 describe-load-balancers --region "$AWS_DEFAULT_REGION" \
        --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" --output text); do
        [ -n "$ARN" ] || continue
        echo "  Deleting ELBv2: $ARN"
        aws elbv2 delete-load-balancer --region "$AWS_DEFAULT_REGION" --load-balancer-arn "$ARN" || true
      done

      echo "Cleaning any remaining Classic ELB in staging VPC..."
      for NAME in $(aws elb describe-load-balancers --region "$AWS_DEFAULT_REGION" \
        --query "LoadBalancerDescriptions[?VPCId=='$VPC_ID'].LoadBalancerName" --output text); do
        [ -n "$NAME" ] || continue
        echo "  Deleting Classic ELB: $NAME"
        aws elb delete-load-balancer --region "$AWS_DEFAULT_REGION" --load-balancer-name "$NAME" || true
      done

      echo "Waiting up to 15 minutes for ELB network interfaces to drain..."
      for ATTEMPT in $(seq 1 90); do
        ENI_COUNT=$(aws ec2 describe-network-interfaces --region "$AWS_DEFAULT_REGION" \
          --filters "Name=vpc-id,Values=$VPC_ID" \
          --query "length(NetworkInterfaces[?RequesterManaged==\`true\` && contains(Description, 'ELB')])" \
          --output text)
        if [ "$ENI_COUNT" = "0" ]; then
          echo "✅ No ELB-managed ENIs remain in staging VPC."
          exit 0
        fi
        if [ "$ATTEMPT" -eq 1 ] || [ "$((ATTEMPT % 12))" -eq 0 ]; then
          echo "  ELB-managed ENIs still present: $ENI_COUNT (attempt $ATTEMPT/90)"
        fi
        sleep 10
      done

      echo "❌ Timed out waiting for ELB ENIs to drain from staging VPC."
      echo "Diagnostics:"
      aws ec2 describe-network-interfaces --region "$AWS_DEFAULT_REGION" \
        --filters "Name=vpc-id,Values=$VPC_ID" \
        --query "NetworkInterfaces[?RequesterManaged==\`true\` && contains(Description, 'ELB')].{Id:NetworkInterfaceId,Status:Status,Description:Description,Subnet:SubnetId}" \
        --output table || true
      aws elbv2 describe-load-balancers --region "$AWS_DEFAULT_REGION" \
        --query "LoadBalancers[?VpcId=='$VPC_ID'].{Name:LoadBalancerName,Type:Type,State:State.Code}" \
        --output table || true
      aws elb describe-load-balancers --region "$AWS_DEFAULT_REGION" \
        --query "LoadBalancerDescriptions[?VPCId=='$VPC_ID'].{Name:LoadBalancerName,Scheme:Scheme}" \
        --output table || true
      exit 1
  rules:
    - if: '$IMAGE_VERSION && $PIPELINE_MODE == "staging-teardown-test"'
      when: on_success
      allow_failure: false
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: on_success
      allow_failure: true

trigger-destroy-staging:
  stage: destroy-staging
  needs:
    - cleanup-staging-loadbalancers
  trigger:
    project: finalproject/Prototypes/yr4-projectinfrarepo
    strategy: depend
  variables:
    DESTROY_ENV: "staging"
  rules:
    - if: '$IMAGE_VERSION && $PIPELINE_MODE == "staging-teardown-test"'
      when: on_success
      allow_failure: false
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: on_success
      allow_failure: true

verify-staging-destroyed:
  stage: verify-destroy
  image: alpine:latest
  needs:
    - trigger-destroy-staging
  before_script:
    - apk add --no-cache bash python3 py3-pip
    - pip3 install --break-system-packages awscli
  script:
    - sh scripts/deployment/verify-staging-destroyed.sh
  rules:
    - if: '$IMAGE_VERSION && $PIPELINE_MODE == "staging-teardown-test"'
      when: on_success
      allow_failure: false
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: on_success
      allow_failure: true

# =============================================================================
# PROMOTE OPTION: Proceed to production
# =============================================================================
#
# Updates the production overlay version label and commits back to repo.
# The infra repo is then triggered to build/scale production before deploy.

promote-to-production:
  stage: promote
  image: alpine:latest
  needs:
    - promote
  before_script:
    - apk add --no-cache git sed
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Promoting ${IMAGE_VERSION} to PRODUCTION"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      git fetch origin main
      git checkout -B main origin/main
      cd kubernetes/overlays/production
      if ! grep -q 'app.kubernetes.io/version:' kustomization.yaml; then
        echo "❌ Production overlay is missing app.kubernetes.io/version label"
        exit 1
      fi
      sed -i "s|app.kubernetes.io/version: .*|app.kubernetes.io/version: \"${IMAGE_VERSION}\"|" kustomization.yaml
      if ! grep -q "app.kubernetes.io/version: \"${IMAGE_VERSION}\"" kustomization.yaml; then
        echo "❌ Failed to update production version label"
        exit 1
      fi
      cd "$CI_PROJECT_DIR"
      sh scripts/deployment/write-image-pins.sh "$IMAGE_VERSION" production
    - git config user.email "cd-pipeline@gitlab.ci"
    - git config user.name "CD Pipeline"
    - git add kubernetes/overlays/production/kustomization.yaml kubernetes/overlays/production/image-pins.yaml
    - 'git commit -m "ci: promote ${IMAGE_VERSION} to production [skip ci] - Source: ${SOURCE_COMMIT}" || echo "No changes to commit"'
    - |
      # Push with a token that can write to this repository.
      # Prefer GITLAB_PUSH_TOKEN so GITLAB_API_TOKEN can stay API-only for infra polling.
      if [ -n "$GITLAB_PUSH_TOKEN" ]; then
        PUSH_USER="${GITLAB_PUSH_USER:-oauth2}"
        PUSH_URL="https://${PUSH_USER}:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      elif [ -n "$GITLAB_API_TOKEN" ]; then
        echo "WARNING: GITLAB_PUSH_TOKEN is not set; using legacy GITLAB_API_TOKEN for repository push."
        echo "         This token must have write_repository scope."
        PUSH_USER="${GITLAB_PUSH_USER:-oauth2}"
        PUSH_URL="https://${PUSH_USER}:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        echo "WARNING: GITLAB_PUSH_TOKEN not set; falling back to CI_JOB_TOKEN."
        echo "         If push fails, enable CI job-token push for this project"
        echo "         or set GITLAB_PUSH_TOKEN with write_repository scope."
        PUSH_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi
      for ATTEMPT in 1 2 3; do
        PUSH_STATUS=0
        PUSH_OUTPUT="$(git push "$PUSH_URL" HEAD:main 2>&1)" || PUSH_STATUS=$?
        echo "$PUSH_OUTPUT"

        if [ "$PUSH_STATUS" -eq 0 ]; then
          echo "✅ Push succeeded on attempt $ATTEMPT"
          break
        fi

        case "$PUSH_OUTPUT" in
          *"HTTP Basic: Access denied"*|*"Authentication failed"*|*"not allowed to push"*|*"403"*)
            echo "ERROR: Git push authentication failed."
            echo "Set GITLAB_PUSH_TOKEN to a non-expired personal/project access token with write_repository scope."
            echo "If you use a project access token, set GITLAB_PUSH_USER to that token's username if oauth2 is rejected."
            echo "Alternatively, enable CI_JOB_TOKEN push access for this project and leave GITLAB_PUSH_TOKEN unset."
            exit "$PUSH_STATUS"
            ;;
        esac

        if [ "$ATTEMPT" -eq 3 ]; then
          echo "❌ Push failed after 3 attempts (likely sustained write race)."
          exit 1
        fi

        echo "⚠️  Push rejected (non-fast-forward). Rebasing on latest main and retrying..."
        if ! FETCH_OUTPUT="$(git fetch "$PUSH_URL" main 2>&1)"; then
          echo "$FETCH_OUTPUT"
          echo "ERROR: Could not fetch latest main before retrying push."
          exit 1
        fi
        git rebase FETCH_HEAD
      done
    - echo ""
    - echo "✅ Production overlay updated — Argo CD sync will proceed next"
  rules:
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: manual
      allow_failure: false

# =============================================================================
# PRODUCTION: Trigger infra repo to bring production cluster up
# =============================================================================
# Same cross-project trigger pattern as staging. Fires after manual promotion
# is approved. The infra repo creates/scales the production cluster, and the
# CD pipeline waits for it to finish before deploying.

trigger-infra-production:
  stage: ensure-production
  needs:
    - promote-to-production
  trigger:
    project: finalproject/Prototypes/yr4-projectinfrarepo
    strategy: depend
  variables:
    ENSURE_UP: "true"
    TARGET_ENV: "production"
  rules:
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: on_success

wait-production-ready:
  stage: ensure-production
  image: alpine:latest
  needs:
    - trigger-infra-production
  before_script:
    - apk add --no-cache curl bash python3 py3-pip
    - pip3 install --break-system-packages awscli
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Verifying PRODUCTION cluster readiness after infra trigger"
      echo "═══════════════════════════════════════════════════════════════"

      if ! aws eks describe-cluster --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION > /dev/null 2>&1; then
        echo "❌ Production cluster still does not exist after infra trigger."
        echo "   Check the infra repo pipeline for errors."
        exit 1
      fi

      DESIRED=$(aws eks describe-nodegroup \
        --cluster-name $PROD_CLUSTER_NAME \
        --nodegroup-name $PROD_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --query 'nodegroup.scalingConfig.desiredSize' \
        --output text 2>/dev/null || echo "0")

      if [ "$DESIRED" = "0" ] || [ "$DESIRED" = "None" ]; then
        echo "❌ Production nodes still at 0 after infra trigger."
        exit 1
      fi

      echo "✅ Production node group ready — $DESIRED node(s) desired."

      # Wait for K8s API to become reachable (up to 10 minutes)
      aws eks update-kubeconfig --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION

      echo "Waiting for Kubernetes API to become reachable..."
      API_ENDPOINT=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
      echo "  API endpoint: $API_ENDPOINT"

      for ATTEMPT in $(seq 1 40); do
        if kubectl --request-timeout=15s get --raw=/readyz >/dev/null 2>&1; then
          echo "✅ Kubernetes API is reachable (attempt $ATTEMPT/40)"
          exit 0
        fi
        if [ "$ATTEMPT" -eq 1 ] || [ "$((ATTEMPT % 5))" -eq 0 ]; then
          echo "  Diagnostic (attempt $ATTEMPT/40):"
          kubectl --request-timeout=10s get --raw=/readyz 2>&1 || true
        else
          echo "  ⚠️  API not reachable yet (attempt $ATTEMPT/40), retrying in 15s..."
        fi
        sleep 15
      done

      echo "❌ Kubernetes API not reachable after 10 minutes"
      echo ""
      echo "Diagnostics:"
      echo "── Cluster status ──"
      aws eks describe-cluster --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION \
        --query 'cluster.{Status:status,Endpoint:endpoint,PlatformVersion:platformVersion}' --output table || true
      echo "── Node group status ──"
      aws eks describe-nodegroup --cluster-name $PROD_CLUSTER_NAME --nodegroup-name $PROD_NODE_GROUP --region $AWS_DEFAULT_REGION \
        --query 'nodegroup.{Status:status,DesiredSize:scalingConfig.desiredSize,Health:health}' --output table || true
      echo "── DNS resolution ──"
      nslookup $(echo $API_ENDPOINT | sed 's|https://||') 2>&1 || echo "DNS resolution failed"
      echo "── curl to API endpoint ──"
      curl -sk --connect-timeout 10 --max-time 15 "${API_ENDPOINT}/readyz" 2>&1 | head -20 || echo "curl failed"
      exit 1
  rules:
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: on_success
  allow_failure: false
# =============================================================================
# PRODUCTION: Install cluster add-ons — cert-manager, ESO, NGINX Ingress
# =============================================================================

install-addons-production:
  stage: deploy-prod
  image: alpine:latest
  resource_group: production-cluster-addons
  needs:
    - wait-production-ready
  before_script:
    - apk add --no-cache curl bash tar gzip python3 py3-pip
    - pip3 install --break-system-packages awscli
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - curl -sL "https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz" | tar xz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/
    - |
      for ATTEMPT in 1 2 3; do
        if aws eks update-kubeconfig --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION; then
          break
        fi
        if [ "$ATTEMPT" -eq 3 ]; then
          echo "❌ Failed to configure kubeconfig after 3 attempts"
          exit 1
        fi
        echo "⚠️  update-kubeconfig failed (attempt $ATTEMPT/3), retrying in 10s..."
        sleep 10
      done
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Installing cluster add-ons for PRODUCTION"
      echo "═══════════════════════════════════════════════════════════════"

      retry_cmd() {
        ATTEMPTS=$1
        DELAY=$2
        shift 2
        TRY=1
        until "$@"; do
          if [ "$TRY" -ge "$ATTEMPTS" ]; then
            echo "❌ Command failed after ${ATTEMPTS} attempts: $*"
            return 1
          fi
          echo "⚠️  Command failed (attempt ${TRY}/${ATTEMPTS}): $*"
          echo "   Retrying in ${DELAY}s..."
          sleep "$DELAY"
          TRY=$((TRY + 1))
        done
      }

      wait_for_k8s_api() {
        ATTEMPTS=$1
        DELAY=$2
        TRY=1
        while [ "$TRY" -le "$ATTEMPTS" ]; do
          if kubectl --request-timeout=15s get --raw=/readyz >/dev/null 2>&1; then
            echo "✅ Kubernetes API reachable (attempt ${TRY}/${ATTEMPTS})"
            return 0
          fi
          if [ "$((TRY % 5))" -eq 0 ]; then
            echo "⚠️  Kubernetes API not reachable (attempt ${TRY}/${ATTEMPTS}) — error:"
            kubectl --request-timeout=10s get --raw=/readyz 2>&1 || true
          else
            echo "⚠️  Kubernetes API not reachable yet (attempt ${TRY}/${ATTEMPTS}), retrying in ${DELAY}s..."
          fi
          sleep "$DELAY"
          TRY=$((TRY + 1))
        done
        echo "❌ Kubernetes API not reachable after ${ATTEMPTS} checks"
        echo "── Final diagnostic ──"
        kubectl --request-timeout=10s cluster-info 2>&1 || true
        return 1
      }

      clear_pending_helm_release() {
        RELEASE=$1
        NAMESPACE=$2
        STATUS=$(helm status "$RELEASE" -n "$NAMESPACE" -o json 2>/dev/null | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
        case "$STATUS" in
          pending-install|pending-upgrade|pending-rollback)
            echo "⚠️  Helm release $RELEASE in $NAMESPACE is $STATUS — clearing stale operation lock..."
            helm rollback "$RELEASE" 0 -n "$NAMESPACE" 2>/dev/null || true
            helm uninstall "$RELEASE" -n "$NAMESPACE" 2>/dev/null || true
            sleep 10
            ;;
        esac
      }

      wait_for_k8s_api 30 15

      ESO_ROLE_ARN=$(aws iam get-role \
        --role-name yr4-project-production-eso-role \
        --query 'Role.Arn' --output text)
      echo "ESO Role ARN: $ESO_ROLE_ARN"

      # 1. cert-manager
      echo "--- Installing cert-manager ---"
      retry_cmd 4 10 helm repo add jetstack https://charts.jetstack.io
      retry_cmd 4 10 helm repo update jetstack
      clear_pending_helm_release cert-manager cert-manager
      # Pre-install CRDs to avoid startupapicheck deadlock on fresh clusters
      echo "  Applying cert-manager CRDs..."
      retry_cmd 4 15 kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.7/cert-manager.crds.yaml
      retry_cmd 4 20 helm upgrade --install cert-manager jetstack/cert-manager \
        --version 1.14.7 \
        --namespace cert-manager --create-namespace \
        --set crds.enabled=true \
        --set startupapicheck.enabled=false \
        --wait --timeout 300s

      # 2. External Secrets Operator
      echo "--- Installing External Secrets Operator ---"
      retry_cmd 4 10 helm repo add external-secrets https://charts.external-secrets.io
      retry_cmd 4 10 helm repo update external-secrets
      clear_pending_helm_release external-secrets external-secrets
      retry_cmd 10 30 helm upgrade --install external-secrets external-secrets/external-secrets \
        --namespace external-secrets --create-namespace \
        --set installCRDs=true \
        --set serviceAccount.create=true \
        --set serviceAccount.name=external-secrets-sa \
        --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$ESO_ROLE_ARN" \
        --wait --timeout 300s

      sh scripts/deployment/ensure-external-secret-store.sh

      # 3. NGINX Ingress Controller
      echo "--- Installing NGINX Ingress Controller ---"
      retry_cmd 4 10 helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
      retry_cmd 4 10 helm repo update ingress-nginx
      helm status ingress-nginx -n ingress-nginx 2>/dev/null \
        && STATUS=$(helm status ingress-nginx -n ingress-nginx -o json | grep -o '"status":"[^"]*"' | head -1) \
        || STATUS=""
      if echo "$STATUS" | grep -q 'failed\|pending-'; then
        echo "  Previous release in bad state ($STATUS) — rolling back..."
        helm rollback ingress-nginx 0 -n ingress-nginx 2>/dev/null || helm uninstall ingress-nginx -n ingress-nginx 2>/dev/null || true
      fi
      retry_cmd 4 20 helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
        --namespace ingress-nginx --create-namespace \
        --atomic --timeout 900s

      echo ""
      echo "✅ All production add-ons installed successfully"
  rules:
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: on_success
  allow_failure: false
install-observability-production:
  stage: deploy-prod
  image: alpine:latest
  resource_group: production-observability
  needs:
    - install-addons-production
  before_script:
    - apk add --no-cache curl bash tar gzip python3 py3-pip
    - pip3 install --break-system-packages awscli
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - curl -sL "https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz" | tar xz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/
    - aws eks update-kubeconfig --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Installing observability foundation for PRODUCTION"
      echo "═══════════════════════════════════════════════════════════════"

      kubectl apply -f kubernetes/observability/storageclass-gp3.yaml

      sh scripts/deployment/check-cloudwatch-observability.sh "$PROD_CLUSTER_NAME"

      FLUENT_BIT_ROLE_ARN="${FLUENT_BIT_ROLE_ARN:-$(aws iam get-role \
        --role-name yr4-project-production-fluent-bit-role \
        --query 'Role.Arn' --output text)}"
      echo "Fluent Bit Role ARN: $FLUENT_BIT_ROLE_ARN"

      helm upgrade --install "$FLUENT_BIT_RELEASE" helm/fluent-bit \
        -f helm/fluent-bit/values-prod.yaml \
        --namespace "$LOGGING_NAMESPACE" --create-namespace \
        --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$FLUENT_BIT_ROLE_ARN" \
        --wait --timeout 300s

      kubectl rollout status daemonset/$FLUENT_BIT_RELEASE -n "$LOGGING_NAMESPACE" --timeout=180s
      echo "✅ Production observability foundation installed"
  rules:
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: on_success
  allow_failure: false

install-argocd-production:
  stage: deploy-prod
  image: alpine:latest
  resource_group: production-gitops-bootstrap
  needs:
    - install-observability-production
  before_script:
    - apk add --no-cache curl bash tar gzip python3 py3-pip
    - pip3 install --break-system-packages awscli
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - curl -sL "https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz" | tar xz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/
    - aws eks update-kubeconfig --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Bootstrapping Argo CD and Argo Rollouts for PRODUCTION"
    - echo "═══════════════════════════════════════════════════════════════"
    - sh scripts/deployment/bootstrap-argocd-production.sh
  rules:
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: on_success
  allow_failure: false

# =============================================================================
# PRODUCTION: Argo CD sync + rollout verification
# =============================================================================

deploy-production:
  stage: deploy-prod
  image: alpine:latest
  needs:
    - install-argocd-production
  before_script:
    - apk add --no-cache curl bash tar gzip python3 py3-pip sed
    - pip3 install --break-system-packages awscli
    # Install kubectl
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    # Install Helm (direct binary download — fallback addon installation)
    - curl -sL "https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz" | tar xz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/
    # Install Argo CD CLI for in-cluster core syncs
    - curl -sSL -o /usr/local/bin/argocd "https://github.com/argoproj/argo-cd/releases/download/v2.12.6/argocd-linux-amd64"
    - chmod +x /usr/local/bin/argocd
    # Install Argo Rollouts kubectl plugin for canary rollout status and diagnostics
    - curl -sSL -o /usr/local/bin/kubectl-argo-rollouts "https://github.com/argoproj/argo-rollouts/releases/download/v1.7.2/kubectl-argo-rollouts-linux-amd64"
    - chmod +x /usr/local/bin/kubectl-argo-rollouts
    # Configure kubeconfig for the production EKS cluster
    - aws eks update-kubeconfig --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Deploying to PRODUCTION via Argo CD sync"
    - 'echo "  Image version: ${IMAGE_VERSION}"'
    - echo "═══════════════════════════════════════════════════════════════"
    # Ensure ESO is installed (fallback if install-addons-production was skipped/retried)
    - |
      if ! kubectl get crd externalsecrets.external-secrets.io > /dev/null 2>&1; then
        echo "⚠️  ESO CRDs not found — installing External Secrets Operator as fallback..."
        STATUS=$(helm status external-secrets -n external-secrets -o json 2>/dev/null | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
        case "$STATUS" in
          pending-install|pending-upgrade|pending-rollback)
            echo "⚠️  External-secrets release is $STATUS — clearing stale operation lock..."
            helm rollback external-secrets 0 -n external-secrets 2>/dev/null || true
            helm uninstall external-secrets -n external-secrets 2>/dev/null || true
            sleep 10
            ;;
        esac
        helm repo add external-secrets https://charts.external-secrets.io
        helm repo update external-secrets
        ESO_ROLE_ARN=$(aws iam get-role --role-name yr4-project-production-eso-role \
          --query 'Role.Arn' --output text 2>/dev/null || echo "")
        if [ -z "$ESO_ROLE_ARN" ]; then
          echo "❌ IAM role yr4-project-production-eso-role was not found; External Secrets cannot access AWS Secrets Manager"
          exit 1
        fi
        HELM_ARGS="--namespace external-secrets --create-namespace --set installCRDs=true --wait --timeout 300s"
        HELM_ARGS="$HELM_ARGS --set serviceAccount.create=true --set serviceAccount.name=external-secrets-sa"
        HELM_ARGS="$HELM_ARGS --set serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn=$ESO_ROLE_ARN"
        for ATTEMPT in 1 2 3 4 5; do
          if helm upgrade --install external-secrets external-secrets/external-secrets $HELM_ARGS; then
            break
          fi
          if [ "$ATTEMPT" -eq 5 ]; then
            echo "❌ Failed to install external-secrets after 5 attempts"
            exit 1
          fi
          echo "⚠️  External-secrets install failed (attempt $ATTEMPT/5), retrying in 20s..."
          sleep 20
        done
        echo "✅ ESO installed"
      else
        echo "✅ ESO CRDs already available"
      fi
      sh scripts/deployment/ensure-external-secret-store.sh
    # Ensure cert-manager is installed (fallback)
    - |
      if ! kubectl get crd certificates.cert-manager.io > /dev/null 2>&1; then
        echo "⚠️  cert-manager CRDs not found — installing as fallback..."
        helm repo add jetstack https://charts.jetstack.io
        helm repo update jetstack
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager --create-namespace \
          --set crds.enabled=true \
          --wait --timeout 300s
        echo "✅ cert-manager installed"
      else
        echo "✅ cert-manager CRDs already available"
      fi
    # ── Pin images locally for validation/migration rendering. The committed
    # production image-pins.yaml is the Argo CD source of truth.
    - sh scripts/deployment/write-image-pins.sh "$IMAGE_VERSION" production
    - kubectl create namespace $PROD_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    - |
      echo "Validating production Kustomize overlay with kubectl before apply..."
      kubectl kustomize kubernetes/overlays/production > /tmp/production-rendered.yaml
      kubectl apply --dry-run=client --validate=false -k kubernetes/overlays/production > /dev/null
    # Sync secrets and run migrations before application rollouts.
    - kubectl apply -f kubernetes/overlays/production/external-secrets.yaml -n $PROD_NAMESPACE
    - sh scripts/deployment/sync-external-secrets.sh "$PROD_NAMESPACE" 180
    - sh scripts/deployment/run-migration-job.sh "$PROD_NAMESPACE" /tmp/production-rendered.yaml 300s
    - kubectl apply --dry-run=server -k kubernetes/overlays/production > /dev/null
    - sh scripts/deployment/sync-argocd-production.sh
    # Force ESO to re-sync secrets from AWS before checking rollouts
    - sh scripts/deployment/sync-external-secrets.sh "$PROD_NAMESPACE" 180
    - sh scripts/deployment/wait-deployment-rollout.sh "$PROD_NAMESPACE" 300
    - |
      echo ""
      echo "Waiting for LoadBalancer external hostname..."
      for i in $(seq 1 60); do
        LB_HOST=$(kubectl get svc nginx-gateway -n $PROD_NAMESPACE \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
        LB_IP=$(kubectl get svc nginx-gateway -n $PROD_NAMESPACE \
          -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)

        if [ -n "$LB_HOST" ]; then
          echo "PROD_URL=http://$LB_HOST" > production-deploy.env
          echo "✅ Production URL: http://$LB_HOST"
          break
        fi

        if [ -n "$LB_IP" ]; then
          echo "PROD_URL=http://$LB_IP" > production-deploy.env
          echo "✅ Production URL: http://$LB_IP"
          break
        fi

        echo "  Attempt $i/60 — waiting for LB provisioning..."
        sleep 10
      done
      if [ -z "$LB_HOST" ] && [ -z "$LB_IP" ]; then
        echo "⚠️  LoadBalancer hostname not available yet"
        kubectl get svc nginx-gateway -n $PROD_NAMESPACE -o wide || true
        kubectl describe svc nginx-gateway -n $PROD_NAMESPACE || true
        echo "PROD_URL=" > production-deploy.env
      fi
    - echo ""
    - echo "✅ Production deployment complete"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - argocd-production-app.json
    reports:
      dotenv: production-deploy.env
  rules:
    - if: '$IMAGE_VERSION && ($PIPELINE_MODE == "auto" || $PIPELINE_MODE == "full-release")'
      when: on_success
  allow_failure: false

# =============================================================================
# PRODUCTION: Post-deploy smoke tests
# =============================================================================

smoke-tests-production:
  stage: prod-validation
  image: alpine:latest
  needs:
    - deploy-production
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
