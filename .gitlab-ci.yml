# =============================================================================
# STAGE 5: PROMOTE — Manual approval to deploy to production
# =============================================================================
#
# Same manual gate pattern as the dev repo's trigger-deploy stage.
# Updates production overlay image tags and commits back to repo.
# ArgoCD production app requires manual sync in ArgoCD UI as a second gate.

promote-to-production:
  stage: promote
  image: alpine:latest
  needs:
    - smoke-tests-staging
    - playwright-e2e-staging
    - k6-load-tests-staging
  before_script:
    - apk add --no-cache git sed
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Promoting ${IMAGE_VERSION} to PRODUCTION"
    - echo "═══════════════════════════════════════════════════════════════"

    # Update production overlay with the validated staging image version
    - |
      cd kubernetes/overlays/production
      sed -i "s|newTag:.*|newTag: ${IMAGE_VERSION}|" kustomization.yaml
      cd "$CI_PROJECT_DIR"

    # Commit and push
    - git config user.email "cd-pipeline@gitlab.ci"
    - git config user.name "CD Pipeline"
    - git add kubernetes/overlays/production/kustomization.yaml
    - |
      git commit -m "ci: promote ${IMAGE_VERSION} to production

      Staging validation passed:
        ✅ Smoke tests
        ✅ Playwright E2E (or skipped — placeholder)
        ✅ k6 load tests (or skipped — placeholder)

      Source commit: ${SOURCE_COMMIT}
      Promoted by: manual approval in GitLab CI" || echo "No changes to commit"
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:main

    - echo ""
    - echo "✅ Production overlay updated — awaiting ArgoCD manual sync"
    - echo ""
    - echo "ACTION REQUIRED: Approve the sync in ArgoCD UI for year4-project-production"
  rules:
    - if: $IMAGE_VERSION
      when: manual
      allow_failure: false

# =============================================================================
# STAGE 6: DEPLOY PRODUCTION — ArgoCD sync + conservative canary rollout
# =============================================================================

deploy-production:
  stage: deploy-prod
  image: argoproj/argocd:v2.10.0
  needs:
    - promote-to-production
  before_script:
    - argocd login "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --grpc-web
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Deploying to PRODUCTION via ArgoCD"
    - echo "  Image version: ${IMAGE_VERSION}"
    - echo "═══════════════════════════════════════════════════════════════"

    # Production app uses manual sync — trigger it from pipeline
    # (Operator already approved promotion in the promote stage)
    - argocd app sync year4-project-production --force --prune

    # Wait for healthy — production canary takes longer (conservative steps)
    # 10% → 30% → 60% → 100% with 2-minute pauses = ~8 min total minimum
    - argocd app wait year4-project-production --health --timeout 900

    - echo ""
    - echo "✅ Production deployment healthy — canary rollout complete"
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# =============================================================================
# STAGE 7: PRODUCTION VALIDATION — Post-deploy smoke tests
# =============================================================================

smoke-tests-production:
  stage: prod-validation
  image: alpine:latest
  needs:
    - deploy-production
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Production Smoke Tests — Health Checks"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      FAILED=0
      SERVICES_TO_CHECK="auth-service user-bl-service user-db-access-service job-bl-service job-db-access-service customer-bl-service customer-db-access-service admin-bl-service frontend"
      for SVC in $SERVICES_TO_CHECK; do
        echo -n "  Checking $SVC... "
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
          "${PROD_URL}/api/${SVC}/health" 2>/dev/null || echo "000")
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ ($HTTP_CODE)"
        else
          echo "❌ ($HTTP_CODE)"
          FAILED=$((FAILED + 1))
        fi
      done

      echo ""
      if [ "$FAILED" -gt 0 ]; then
        echo "❌ $FAILED service(s) failed health check in production"
        echo "⚠️  ACTION REQUIRED: Check ArgoCD dashboard and rollout status"
        exit 1
      else
        echo "✅ All production services healthy"
      fi
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# =============================================================================
# STAGE 8: NOTIFY — Deploy result notification
# =============================================================================

notify-success:
  stage: notify
  image: alpine:latest
  needs:
    - smoke-tests-production
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  ✅ DEPLOYMENT SUCCESSFUL"
    - echo "═══════════════════════════════════════════════════════════════"
    - echo ""
    - echo "  Environment:  Production"
    - echo "  Version:      ${IMAGE_VERSION}"
    - echo "  Source:        ${SOURCE_COMMIT}"
    - echo "  Pipeline:     ${CI_PIPELINE_URL}"
    - echo ""
    # TODO: Add Slack/Teams/webhook notification
    # - |
    #   curl -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" \
    #     -d "{\"text\": \"✅ Production deploy complete — version ${IMAGE_VERSION}\"}"
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: true

notify-failure:
  stage: notify
  image: alpine:latest
  needs:
    - smoke-tests-production
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  ❌ DEPLOYMENT FAILED"
    - echo "═══════════════════════════════════════════════════════════════"
    - echo ""
    - echo "  Environment:  Production"
    - echo "  Version:      ${IMAGE_VERSION}"
    - echo "  Pipeline:     ${CI_PIPELINE_URL}"
    - echo ""
    - echo "  ACTION REQUIRED: Check ArgoCD dashboard for rollback status"
    # TODO: Add Slack/Teams/webhook notification
  rules:
    - if: $IMAGE_VERSION
      when: on_failure
  allow_failure: true

# =============================================================================
# INFRASTRUCTURE SCALE-UP / SCALE-DOWN JOBS
# =============================================================================
#
# Manual-trigger jobs for bringing environments up and down via Terraform.
# Each environment has independent Terraform state — can be controlled separately.
#
# Typical workflow:
#   1. scale-up-staging    → bring staging infra up
#   2. (pipeline deploys)  → validate in staging
#   3. scale-up-production → bring prod infra up
#   4. (pipeline deploys)  → canary rollout to prod
#   5. scale-down-staging  → staging no longer needed
#   6. (after demo/use)    → scale-down-production
#
# EKS control plane ($0.10/hr) still runs when nodes=0.
# RDS auto-restarts after 7 days — re-run scale-down if needed.

.terraform-base: &terraform-base
  image:
    name: hashicorp/terraform:1.7
    entrypoint: [""]
  before_script:
    - echo "Terraform $TF_ENV environment — $TF_ACTION"

scale-up-staging:
  <<: *terraform-base
  stage: validate   # Runs independently, not tied to deploy flow
  variables:
    TF_ENV: staging
    TF_ACTION: scale-up
  script:
    - cd terraform/environments/staging
    - terraform init
    - terraform apply -var="enabled=true" -auto-approve
    - echo "✅ Staging infrastructure scaled UP"
  rules:
    - when: manual
  allow_failure: true

scale-down-staging:
  <<: *terraform-base
  stage: validate
  variables:
    TF_ENV: staging
    TF_ACTION: scale-down
  script:
    - cd terraform/environments/staging
    - terraform init
    - terraform apply -var="enabled=false" -auto-approve
    - echo "✅ Staging infrastructure scaled DOWN"
  rules:
    - when: manual
  allow_failure: true

scale-up-production:
  <<: *terraform-base
  stage: validate
  variables:
    TF_ENV: production
    TF_ACTION: scale-up
  script:
    - cd terraform/environments/production
    - terraform init
    - terraform apply -var="enabled=true" -auto-approve
    - echo "✅ Production infrastructure scaled UP"
  rules:
    - when: manual
  allow_failure: true

scale-down-production:
  <<: *terraform-base
  stage: validate
  variables:
    TF_ENV: production
    TF_ACTION: scale-down
  script:
    - cd terraform/environments/production
    - terraform init
    - terraform apply -var="enabled=false" -auto-approve
    - echo "✅ Production infrastructure scaled DOWN"
  rules:
    - when: manual
  allow_failure: true
