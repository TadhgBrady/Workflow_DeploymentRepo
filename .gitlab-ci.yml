# =============================================================================
# Year 4 Project — CD Pipeline (Deployment Repo)
# =============================================================================
#
# Triggered by the dev repo CI pipeline (trigger-deploy stage) via GitLab webhook.
# Receives: IMAGE_TAG, IMAGE_VERSION, SOURCE_COMMIT, SOURCE_BRANCH
#
# Pipeline Architecture (12 stages):
#
#   validate → update-tags → ensure-staging (triggers infra repo) → deploy-staging
#     → staging-tests → destroy-staging (triggers infra repo) → promote
#       → ensure-production (triggers infra repo) → deploy-prod → prod-validation
#         → notify
#
# Environments:
#   - Staging:    Auto-deploy, canary rollout, full test suite before promotion
#   - Production: Manual gate, conservative canary rollout, post-deploy smoke tests
#
# Infrastructure:t
#   - AWS EKS (managed via Terraform in infra repo)
#   - Direct kubectl/kustomize deployments from pipeline
#   - RDS PostgreSQL + ElastiCache Redis (AWS-managed, Terraform-provisioned)
#   - External Secrets Operator for secrets from AWS Secrets Manager
#
# Scale-up/down jobs at the bottom allow bringing staging or production
# infrastructure up and down independently when needed.
#
# =============================================================================

stages:
  - validate            # Lint manifests, validate Helm templates
  - update-tags         # Patch Kustomize overlays with new image version
  - ensure-staging      # Scale up staging cluster (or trigger infra pipeline)
  - deploy-staging      # kubectl apply staging, rollout verification
  - staging-tests       # Playwright E2E, Grafana k6 load tests, smoke tests
  - destroy-staging     # Fully destroy staging infra via infra repo before prod
  - promote             # Manual gate — approve promotion to production
  - ensure-production   # Scale up production cluster (or trigger infra pipeline)
  - deploy-prod         # kubectl apply production, rollout verification
  - prod-validation     # Post-deploy smoke tests & health verification
  - notify              # Slack/webhook notification of deploy result
  - manual-ops          # Manual scale-up / scale-down jobs (independent)

# =============================================================================
# VARIABLES
# =============================================================================

variables:
  # -- Passed from dev repo trigger-deploy stage --
  # IMAGE_TAG:       Docker Hub registry path (e.g. bencev04/4th-year-proj-tadgh-bence)
  # IMAGE_VERSION:   Short SHA of the source commit (e.g. a1b2c3d4)
  # SOURCE_COMMIT:   Full SHA of the source commit
  # SOURCE_BRANCH:   Branch that triggered the build (should be "main")

  # -- AWS credentials (set in GitLab CI/CD settings) --
  # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  AWS_DEFAULT_REGION: eu-west-1

  # Runner checkout hardening: avoid stale shallow clone metadata on shared runners.
  GIT_STRATEGY: clone
  GIT_CLEAN_FLAGS: -ffdx
  GIT_DEPTH: "0"

  # -- Cluster (separate EKS clusters per environment) --
  STAGING_CLUSTER_NAME: "yr4-project-staging-eks"
  STAGING_NODE_GROUP: "yr4-project-staging-eks-nodes"
  PROD_CLUSTER_NAME: "yr4-project-production-eks"
  PROD_NODE_GROUP: "yr4-project-production-eks-nodes"
  STAGING_NAMESPACE: "year4-project-staging"
  PROD_NAMESPACE: "year4-project"
  # -- Infrastructure repo (set in GitLab CI/CD settings as masked variables) --
  # INFRA_PROJECT_ID: ""        # GitLab project ID for yr4-projectinfrarepo
  # INFRA_TRIGGER_TOKEN: ""     # Pipeline trigger token for infra repo
  # GITLAB_API_TOKEN: ""        # GitLab personal/project token with API access (for polling)

  # -- App URLs --
  # STAGING_URL and PROD_URL are discovered dynamically by deploy jobs
  # and exported as dotenv artifacts for downstream smoke test jobs.

  # -- Services list (matches dev repo) --
  SERVICES: "nginx-gateway auth-service user-bl-service user-db-access-service job-bl-service job-db-access-service customer-bl-service customer-db-access-service admin-bl-service maps-access-service notification-service frontend migration-runner"

# =============================================================================
# STAGE 1: VALIDATE — Lint manifests, validate Helm templates
# =============================================================================

validate-manifests:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache curl bash tar gzip
    # Install kustomize
    - curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz | tar xz -C /usr/local/bin/
    # Install kubeconform
    - curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz -C /usr/local/bin/
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Validating Kubernetes manifests (kubeconform)"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      for ENV in staging production; do
        echo "── Validating overlay: $ENV ──"
        kustomize build kubernetes/overlays/$ENV | kubeconform -strict -summary -skip ClusterIssuer,ClusterSecretStore,ExternalSecret
      done
    - echo ""
    - echo "✅ All Kubernetes manifests are valid"
  rules:
    - when: always
  allow_failure: false

# NOTE: Terraform validation happens in the infra repo pipeline, not here.
# This repo only contains Kubernetes manifests, Helm charts, and Kustomize overlays.

validate-helm:
  stage: validate
  image:
    name: alpine/helm:3.14.0
    entrypoint: [""]
  before_script: []
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Validating Helm templates"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      for ENV in dev staging prod; do
        echo "── helm template: values-${ENV}.yaml ──"
        helm template year4-project helm/year4-project \
          -f helm/year4-project/values-${ENV}.yaml \
          --debug > /dev/null
      done
    - echo ""
    - echo "✅ All Helm templates render successfully"
  rules:
    - when: always
  allow_failure: false

# =============================================================================
# STAGE 2: UPDATE TAGS — Patch Kustomize overlays with new image version
# =============================================================================
#
# This commits the updated image tags back to the deployment repo.
#
# References dev repo: IMAGE_TAG = $CI_REGISTRY_IMAGE, IMAGE_VERSION = $CI_COMMIT_SHORT_SHA
# Image naming convention: $IMAGE_TAG:{service}-{IMAGE_VERSION} and {service}-latest
# (see dev repo .gitlab-ci.yml build-scan-push stage)

update-image-tags:
  stage: update-tags
  image: alpine:latest
  needs:
    - validate-manifests
    - validate-helm
  before_script:
    - apk add --no-cache git sed
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Updating Kustomize image tags"
    - 'echo "  IMAGE_TAG:     ${IMAGE_TAG}"'
    - 'echo "  IMAGE_VERSION: ${IMAGE_VERSION}"'
    - 'echo "  SOURCE_COMMIT: ${SOURCE_COMMIT}"'
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      # ── Guard: Fail fast if required variables are missing ──
      MISSING=""
      if [ -z "$IMAGE_TAG" ]; then MISSING="$MISSING IMAGE_TAG"; fi
      if [ -z "$IMAGE_VERSION" ]; then MISSING="$MISSING IMAGE_VERSION"; fi
      if [ -n "$MISSING" ]; then
        echo ""
        echo "❌ MISSING REQUIRED VARIABLES:$MISSING"
        echo ""
        echo "This pipeline must be triggered by the dev repo (cross-project trigger)"
        echo "with IMAGE_TAG and IMAGE_VERSION set. If this was triggered by a direct"
        echo "push, those variables are not available."
        exit 1
      fi
      # Guard: catch unexpanded variable references (bridge job bug)
      case "$IMAGE_VERSION" in
        *'$'*) echo "❌ IMAGE_VERSION contains literal dollar sign: $IMAGE_VERSION"; echo "   Bridge job did not expand the variable. Fix trigger-deploy in dev repo."; exit 1 ;;
      esac
    - |
      # ── Update version label in staging overlay for GitOps tracking ──
      # NOTE: Kustomize 'images:' with newTag cannot handle per-service tags
      # (all services share bencev04/4th-year-proj-tadgh-bence with different
      # tag prefixes like auth-service-latest, admin-bl-service-latest).
      # Actual image pinning happens in deploy-staging via sed.
      # Rebase onto latest main first to avoid non-fast-forward push failures.
      git fetch origin main
      git checkout -B main origin/main
      cd kubernetes/overlays/staging
      sed -i "s|app.kubernetes.io/version: .*|app.kubernetes.io/version: \"${IMAGE_VERSION}\"|" kustomization.yaml
      cd "$CI_PROJECT_DIR"
    - git config user.email "cd-pipeline@gitlab.ci"
    - git config user.name "CD Pipeline"
    - git add kubernetes/overlays/staging/kustomization.yaml
    - 'git commit -m "ci: update staging version to ${IMAGE_VERSION} [skip ci] - Source: ${SOURCE_COMMIT}" || echo "No changes to commit"'
    - |
      # ── Push: prefer GITLAB_API_TOKEN, fall back to CI_JOB_TOKEN ──
      # CI_JOB_TOKEN requires: Settings > Repository > "Allow CI job token to push"
      # GITLAB_API_TOKEN: project/group token with write_repository scope
      if [ -n "$GITLAB_API_TOKEN" ]; then
        PUSH_URL="https://oauth2:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        echo "⚠️  GITLAB_API_TOKEN not set — falling back to CI_JOB_TOKEN"
        echo "   If push fails with 403, enable 'Allow CI job token to push'"
        echo "   in Settings > Repository, or set GITLAB_API_TOKEN variable"
        PUSH_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi

      # Retry on non-fast-forward races from parallel pipelines.
      # The change is deterministic (set version label), so rebase-and-retry is safe.
      for ATTEMPT in 1 2 3; do
        if git push "$PUSH_URL" HEAD:main; then
          echo "✅ Push succeeded on attempt $ATTEMPT"
          break
        fi

        if [ "$ATTEMPT" -eq 3 ]; then
          echo "❌ Push failed after 3 attempts (likely sustained write race)."
          exit 1
        fi

        echo "⚠️  Push rejected (non-fast-forward). Rebasing on latest main and retrying..."
        git fetch "$PUSH_URL" main
        git rebase FETCH_HEAD
      done
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: false

# =============================================================================
# STAGE 3a: ENSURE STAGING — Trigger infra repo to bring staging cluster up
# =============================================================================
# Cross-project trigger: fires the infra repo pipeline with ENSURE_UP=true
# and TARGET_ENV=staging. The infra repo handles all three scenarios:
#   1. Cluster running with nodes   → exit 0 (instant)
#   2. Cluster exists, 0 nodes      → scale up
#   3. Cluster doesn't exist at all → full terraform apply (ensure-apply)
#
# strategy: depend → this CD pipeline WAITS until the infra pipeline finishes.
# If the infra pipeline fails, this job fails, blocking the deploy.
#
# REQUIRED CI/CD VARIABLES:
#   INFRA_PROJECT_ID    — GitLab project ID for yr4-projectinfrarepo
#   INFRA_TRIGGER_TOKEN — Pipeline trigger token created in the infra repo
#                         (Settings > CI/CD > Pipeline trigger tokens)

trigger-infra-staging:
  stage: ensure-staging
  needs:
    - update-image-tags
  trigger:
    project: finalproject/Prototypes/yr4-projectinfrarepo
    strategy: depend
  variables:
    ENSURE_UP: "true"
    TARGET_ENV: "staging"
  rules:
    - if: $IMAGE_VERSION
      when: on_success
      allow_failure: false

# After the infra pipeline completes, do a quick readiness check to confirm
# nodes are actually in Ready state before kubectl tries to deploy.
wait-staging-ready:
  stage: ensure-staging
  image: alpine:latest
  needs:
    - trigger-infra-staging
  before_script:
    - apk add --no-cache curl bash python3 py3-pip
    - pip3 install --break-system-packages awscli
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Verifying STAGING cluster readiness after infra trigger"
      echo "═══════════════════════════════════════════════════════════════"

      # Confirm cluster exists (should always pass after infra pipeline)
      if ! aws eks describe-cluster --name $STAGING_CLUSTER_NAME --region $AWS_DEFAULT_REGION > /dev/null 2>&1; then
        echo "❌ Staging cluster still does not exist after infra trigger."
        echo "   Check the infra repo pipeline for errors."
        exit 1
      fi

      # Confirm nodes are active
      DESIRED=$(aws eks describe-nodegroup \
        --cluster-name $STAGING_CLUSTER_NAME \
        --nodegroup-name $STAGING_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --query 'nodegroup.scalingConfig.desiredSize' \
        --output text 2>/dev/null || echo "0")

      if [ "$DESIRED" = "0" ] || [ "$DESIRED" = "None" ]; then
        echo "❌ Staging nodes still at 0 after infra trigger."
        exit 1
      fi

      echo "✅ Staging node group ready — $DESIRED node(s) desired."

      # Show which IAM identity this job is using (helps debug auth issues)
      echo "── IAM identity for this job ──"
      aws sts get-caller-identity --output table || echo "⚠️  Could not determine caller identity"

      # Wait for K8s API to become reachable (up to 10 minutes)
      aws eks update-kubeconfig --name $STAGING_CLUSTER_NAME --region $AWS_DEFAULT_REGION

      echo "Waiting for Kubernetes API to become reachable..."
      API_ENDPOINT=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
      echo "  API endpoint: $API_ENDPOINT"

      for ATTEMPT in $(seq 1 40); do
        if kubectl --request-timeout=15s get --raw=/readyz >/dev/null 2>&1; then
          echo "✅ Kubernetes API is reachable (attempt $ATTEMPT/40)"
          exit 0
        fi
        if [ "$ATTEMPT" -eq 1 ] || [ "$((ATTEMPT % 5))" -eq 0 ]; then
          echo "  Diagnostic (attempt $ATTEMPT/40):"
          kubectl --request-timeout=10s get --raw=/readyz 2>&1 || true
        else
          echo "  ⚠️  API not reachable yet (attempt $ATTEMPT/40), retrying in 15s..."
        fi
        sleep 15
      done

      echo "❌ Kubernetes API not reachable after 10 minutes"
      echo ""
      echo "Diagnostics:"
      echo "── Cluster status ──"
      aws eks describe-cluster --name $STAGING_CLUSTER_NAME --region $AWS_DEFAULT_REGION \
        --query 'cluster.{Status:status,Endpoint:endpoint,PlatformVersion:platformVersion}' --output table || true
      echo "── Node group status ──"
      aws eks describe-nodegroup --cluster-name $STAGING_CLUSTER_NAME --nodegroup-name $STAGING_NODE_GROUP --region $AWS_DEFAULT_REGION \
        --query 'nodegroup.{Status:status,DesiredSize:scalingConfig.desiredSize,Health:health}' --output table || true
      echo "── DNS resolution ──"
      nslookup $(echo $API_ENDPOINT | sed 's|https://||') 2>&1 || echo "DNS resolution failed"
      echo "── curl to API endpoint ──"
      curl -sk --connect-timeout 10 --max-time 15 "${API_ENDPOINT}/readyz" 2>&1 | head -20 || echo "curl failed"
      exit 1
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: false

# =============================================================================
# STAGE 3b: INSTALL CLUSTER ADD-ONS — cert-manager, ESO, NGINX Ingress
# =============================================================================
# Installs required Helm charts before deploying the application. Uses
# "helm upgrade --install" so it's idempotent (safe on re-runs).
# Runs AFTER the cluster is confirmed ready, BEFORE the app deploy.

install-addons-staging:
  stage: deploy-staging
  image: alpine:latest
  resource_group: staging-cluster-addons
  needs:
    - wait-staging-ready
  before_script:
    - apk add --no-cache curl bash tar gzip python3 py3-pip
    - pip3 install --break-system-packages awscli
    # Install kubectl
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    # Install Helm (direct binary download)
    - curl -sL "https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz" | tar xz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/
    # Configure kubeconfig (retry for transient AWS API/DNS issues)
    - |
      for ATTEMPT in 1 2 3; do
        if aws eks update-kubeconfig --name $STAGING_CLUSTER_NAME --region $AWS_DEFAULT_REGION; then
          break
        fi
        if [ "$ATTEMPT" -eq 3 ]; then
          echo "❌ Failed to configure kubeconfig after 3 attempts"
          exit 1
        fi
        echo "⚠️  update-kubeconfig failed (attempt $ATTEMPT/3), retrying in 10s..."
        sleep 10
      done
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Installing cluster add-ons for STAGING"
      echo "═══════════════════════════════════════════════════════════════"

      retry_cmd() {
        ATTEMPTS=$1
        DELAY=$2
        shift 2
        TRY=1
        until "$@"; do
          if [ "$TRY" -ge "$ATTEMPTS" ]; then
            echo "❌ Command failed after ${ATTEMPTS} attempts: $*"
            return 1
          fi
          echo "⚠️  Command failed (attempt ${TRY}/${ATTEMPTS}): $*"
          echo "   Retrying in ${DELAY}s..."
          sleep "$DELAY"
          TRY=$((TRY + 1))
        done
      }

      wait_for_k8s_api() {
        ATTEMPTS=$1
        DELAY=$2
        TRY=1
        while [ "$TRY" -le "$ATTEMPTS" ]; do
          if kubectl --request-timeout=15s get --raw=/readyz >/dev/null 2>&1; then
            echo "✅ Kubernetes API reachable (attempt ${TRY}/${ATTEMPTS})"
            return 0
          fi
          # Show actual error every 5th attempt for diagnostics
          if [ "$((TRY % 5))" -eq 0 ]; then
            echo "⚠️  Kubernetes API not reachable (attempt ${TRY}/${ATTEMPTS}) — error:"
            kubectl --request-timeout=10s get --raw=/readyz 2>&1 || true
          else
            echo "⚠️  Kubernetes API not reachable yet (attempt ${TRY}/${ATTEMPTS}), retrying in ${DELAY}s..."
          fi
          sleep "$DELAY"
          TRY=$((TRY + 1))
        done
        echo "❌ Kubernetes API not reachable after ${ATTEMPTS} checks"
        echo "── Final diagnostic ──"
        kubectl --request-timeout=10s cluster-info 2>&1 || true
        return 1
      }

      clear_pending_helm_release() {
        RELEASE=$1
        NAMESPACE=$2
        STATUS=$(helm status "$RELEASE" -n "$NAMESPACE" -o json 2>/dev/null | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
        case "$STATUS" in
          pending-install|pending-upgrade|pending-rollback)
            echo "⚠️  Helm release $RELEASE in $NAMESPACE is $STATUS — clearing stale operation lock..."
            helm rollback "$RELEASE" 0 -n "$NAMESPACE" 2>/dev/null || true
            helm uninstall "$RELEASE" -n "$NAMESPACE" 2>/dev/null || true
            sleep 10
            ;;
        esac
      }

      wait_for_k8s_api 30 15

      # Look up IAM role ARNs (created by Terraform)
      ESO_ROLE_ARN=$(aws iam get-role \
        --role-name yr4-project-staging-eso-role \
        --query 'Role.Arn' --output text)
      echo "ESO Role ARN: $ESO_ROLE_ARN"

      # 1. cert-manager (TLS certificate management)
      echo "--- Installing cert-manager ---"
      retry_cmd 4 10 helm repo add jetstack https://charts.jetstack.io
      retry_cmd 4 10 helm repo update jetstack
      retry_cmd 4 20 helm upgrade --install cert-manager jetstack/cert-manager \
        --namespace cert-manager --create-namespace \
        --set crds.enabled=true \
        --wait --timeout 300s

      # 2. External Secrets Operator (syncs AWS Secrets Manager → K8s Secrets)
      echo "--- Installing External Secrets Operator ---"
      retry_cmd 4 10 helm repo add external-secrets https://charts.external-secrets.io
      retry_cmd 4 10 helm repo update external-secrets
      clear_pending_helm_release external-secrets external-secrets
      retry_cmd 10 30 helm upgrade --install external-secrets external-secrets/external-secrets \
        --namespace external-secrets --create-namespace \
        --set installCRDs=true \
        --set serviceAccount.create=true \
        --set serviceAccount.name=external-secrets-sa \
        --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$ESO_ROLE_ARN" \
        --wait --timeout 300s

      # 3. NGINX Ingress Controller — SKIPPED for staging
      # Staging uses nginx-gateway LoadBalancer directly (no Ingress resource needed).
      # The ingress-nginx controller is only installed for production (TLS via cert-manager).
      echo "--- Skipping NGINX Ingress Controller (not needed for staging) ---"

      echo ""
      echo "✅ All staging add-ons installed successfully"
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: false

# =============================================================================
# STAGE 3b: DEPLOY STAGING — kubectl apply + rollout verification
# =============================================================================

deploy-staging:
  stage: deploy-staging
  image: alpine:latest
  needs:
    - install-addons-staging
  before_script:
    - apk add --no-cache curl bash tar gzip python3 py3-pip sed
    - pip3 install --break-system-packages awscli
    # Install kubectl
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    # Install Helm (direct binary download — fallback addon installation)
    - curl -sL "https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz" | tar xz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/
    # Configure kubeconfig for the staging EKS cluster
    - aws eks update-kubeconfig --name $STAGING_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Deploying to STAGING via kubectl apply"
    - 'echo "  Image version: ${IMAGE_VERSION}"'
    - echo "═══════════════════════════════════════════════════════════════"
    # Ensure ESO is installed (fallback if install-addons-staging was skipped/retried)
    - |
      if ! kubectl get crd externalsecrets.external-secrets.io > /dev/null 2>&1; then
        echo "⚠️  ESO CRDs not found — installing External Secrets Operator as fallback..."
        STATUS=$(helm status external-secrets -n external-secrets -o json 2>/dev/null | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
        case "$STATUS" in
          pending-install|pending-upgrade|pending-rollback)
            echo "⚠️  External-secrets release is $STATUS — clearing stale operation lock..."
            helm rollback external-secrets 0 -n external-secrets 2>/dev/null || true
            helm uninstall external-secrets -n external-secrets 2>/dev/null || true
            sleep 10
            ;;
        esac
        helm repo add external-secrets https://charts.external-secrets.io
        helm repo update external-secrets
        ESO_ROLE_ARN=$(aws iam get-role --role-name yr4-project-staging-eso-role \
          --query 'Role.Arn' --output text 2>/dev/null || echo "")
        HELM_ARGS="--namespace external-secrets --create-namespace --set installCRDs=true --wait --timeout 300s"
        if [ -n "$ESO_ROLE_ARN" ]; then
          HELM_ARGS="$HELM_ARGS --set serviceAccount.create=true --set serviceAccount.name=external-secrets-sa"
          HELM_ARGS="$HELM_ARGS --set serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn=$ESO_ROLE_ARN"
        fi
        for ATTEMPT in 1 2 3 4 5; do
          if helm upgrade --install external-secrets external-secrets/external-secrets $HELM_ARGS; then
            break
          fi
          if [ "$ATTEMPT" -eq 5 ]; then
            echo "❌ Failed to install external-secrets after 5 attempts"
            exit 1
          fi
          echo "⚠️  External-secrets install failed (attempt $ATTEMPT/5), retrying in 20s..."
          sleep 20
        done
        echo "✅ ESO installed"
      else
        echo "✅ ESO CRDs already available"
      fi
    # Ensure cert-manager is installed (fallback)
    - |
      if ! kubectl get crd certificates.cert-manager.io > /dev/null 2>&1; then
        echo "⚠️  cert-manager CRDs not found — installing as fallback..."
        helm repo add jetstack https://charts.jetstack.io
        helm repo update jetstack
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager --create-namespace \
          --set crds.enabled=true \
          --wait --timeout 300s
        echo "✅ cert-manager installed"
      else
        echo "✅ cert-manager CRDs already available"
      fi
    # ── Pin images to exact version when triggered by dev repo ──
    - |
      if [ -n "$IMAGE_VERSION" ] && [ "$IMAGE_VERSION" != "latest" ]; then
        echo "📌 Pinning images to version: $IMAGE_VERSION"
        for f in kubernetes/base/*-deployment.y*ml kubernetes/overlays/staging/migration-job.yaml; do
          [ -f "$f" ] || continue
          if grep -q "bencev04/4th-year-proj-tadgh-bence:.*-latest" "$f" 2>/dev/null; then
            sed -i "s|bencev04/4th-year-proj-tadgh-bence:\(.*\)-latest|bencev04/4th-year-proj-tadgh-bence:\\1-${IMAGE_VERSION}|g" "$f"
            echo "  ✅ $(basename $f)"
          fi
        done
        echo ""
      else
        echo "ℹ️  IMAGE_VERSION not set — deploying with -latest tags"
      fi
    - kubectl create namespace $STAGING_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    - |
      # Job pod template is immutable; recreate migration job on each deploy.
      kubectl delete job migration-runner -n $STAGING_NAMESPACE --ignore-not-found=true
    # Clean up stuck pods from previous failed deployments to free CPU
    - |
      echo "Cleaning up stuck pods from previous deployments..."
      kubectl delete pods -n $STAGING_NAMESPACE --field-selector=status.phase!=Running --ignore-not-found 2>/dev/null || true
      # Scale down all deployments to 0 first to free resources for clean redeploy
      for dep in $(kubectl get deploy -n $STAGING_NAMESPACE -o name 2>/dev/null); do
        kubectl scale $dep -n $STAGING_NAMESPACE --replicas=0 2>/dev/null || true
      done
      echo "  Waiting for pods to terminate..."
      kubectl wait --for=delete pod --all -n $STAGING_NAMESPACE --timeout=60s 2>/dev/null || true
    - kubectl apply -k kubernetes/overlays/staging
    # Force ESO to re-sync secrets from AWS (picks up any recent secret value changes)
    - |
      echo "Forcing ExternalSecrets to re-sync..."
      for es in $(kubectl get externalsecret -n $STAGING_NAMESPACE -o name 2>/dev/null); do
        kubectl annotate $es -n $STAGING_NAMESPACE force-sync="$(date +%s)" --overwrite 2>/dev/null || true
      done
    - |
      echo "Waiting for ExternalSecrets to sync from AWS Secrets Manager..."
      kubectl wait --for=condition=Ready=True externalsecret \
        --all -n $STAGING_NAMESPACE --timeout=180s || {
          echo "⚠️  ExternalSecret sync timed out — checking status..."
          kubectl get externalsecrets -n $STAGING_NAMESPACE
          kubectl describe externalsecrets -n $STAGING_NAMESPACE
          exit 1
        }
      echo "✅ All ExternalSecrets synced"
    - |
      echo "Waiting for deployments to become ready..."
      FAILED_DEPLOYS=""
      for DEPLOY in $(kubectl get deployments -n $STAGING_NAMESPACE -o name); do
        echo "  Waiting for $DEPLOY..."
        kubectl rollout status $DEPLOY -n $STAGING_NAMESPACE --timeout=300s || {
          DEPLOY_NAME=$(echo $DEPLOY | sed 's|deployment.apps/||')
          echo "❌ $DEPLOY rollout failed — gathering diagnostics..."
          echo "── Pod status ──"
          kubectl get pods -n $STAGING_NAMESPACE -l app=$DEPLOY_NAME -o wide 2>/dev/null || true
          echo "── Recent events ──"
          kubectl get events -n $STAGING_NAMESPACE --sort-by=.lastTimestamp --field-selector involvedObject.kind=Pod 2>/dev/null | grep "$DEPLOY_NAME" | tail -15 || true
          echo "── Container logs (last 30 lines) ──"
          kubectl logs -n $STAGING_NAMESPACE -l app=$DEPLOY_NAME --tail=30 --all-containers 2>/dev/null || true
          echo ""
          FAILED_DEPLOYS="$FAILED_DEPLOYS $DEPLOY_NAME"
        }
      done
      if [ -n "$FAILED_DEPLOYS" ]; then
        echo ""
        echo "❌ FAILED DEPLOYMENTS:$FAILED_DEPLOYS"
        echo ""
        echo "Diagnostics above should indicate the root cause."
        echo "Common issues:"
        echo "  • ImagePullBackOff → image tag doesn't exist on Docker Hub"
        echo "  • CrashLoopBackOff → container crashes on startup (check logs above)"
        echo "  • Pending → not enough cluster resources (CPU/memory)"
        echo "  • health probe failures → service not responding on expected port/path"
        exit 1
      fi
    - |
      echo ""
      echo "Waiting for LoadBalancer external hostname..."
      for i in $(seq 1 60); do
        LB_HOST=$(kubectl get svc nginx-gateway -n $STAGING_NAMESPACE \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
        LB_IP=$(kubectl get svc nginx-gateway -n $STAGING_NAMESPACE \
          -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)

        if [ -n "$LB_HOST" ]; then
          echo "STAGING_URL=http://$LB_HOST" > staging-deploy.env
          echo "✅ Staging URL: http://$LB_HOST"
          break
        fi

        if [ -n "$LB_IP" ]; then
          echo "STAGING_URL=http://$LB_IP" > staging-deploy.env
          echo "✅ Staging URL: http://$LB_IP"
          break
        fi

        echo "  Attempt $i/60 — waiting for LB provisioning..."
        sleep 10
      done
      if [ -z "$LB_HOST" ] && [ -z "$LB_IP" ]; then
        echo "⚠️  LoadBalancer hostname not available yet (may still be provisioning)"
        kubectl get svc nginx-gateway -n $STAGING_NAMESPACE -o wide || true
        kubectl describe svc nginx-gateway -n $STAGING_NAMESPACE || true
        echo "STAGING_URL=" > staging-deploy.env
      fi
    - echo ""
    - echo "✅ Staging deployment complete"
  artifacts:
    reports:
      dotenv: staging-deploy.env
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: false

# =============================================================================
# STAGE 4: STAGING TESTS — E2E, load tests, smoke tests
# =============================================================================
#
# All three jobs run in parallel against the staging environment.
# Playwright E2E and k6 load tests validate the deployment before promotion.
#

smoke-tests-staging:
  stage: staging-tests
  image: alpine:latest
  needs:
    - deploy-staging
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Smoke Tests — Staging Health Checks"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      if [ -z "$STAGING_URL" ]; then
        echo "❌ STAGING_URL is empty — LoadBalancer hostname not provisioned"
        exit 1
      fi
      FAILED=0
      # NGINX gateway exposes /health and route prefixes (/api/v1/*), not /api/{service}/health.
      # Probe stable public endpoints to avoid false negatives from invalid paths.
      check_url() {
        NAME="$1"
        URL="$2"
        EXPECTED="$3"
        echo -n "  Checking $NAME... "
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
        OLDIFS=$IFS
        IFS=','
        for CODE in $EXPECTED; do
          if [ "$HTTP_CODE" = "$CODE" ]; then
            IFS=$OLDIFS
            echo "✅ ($HTTP_CODE)"
            return 0
          fi
        done
        IFS=$OLDIFS
        echo "❌ ($HTTP_CODE), expected: $EXPECTED"
        return 1
      }

      check_url "gateway-health" "${STAGING_URL}/health" "200" || FAILED=$((FAILED + 1))
      check_url "frontend-root" "${STAGING_URL}/" "200,301,302" || FAILED=$((FAILED + 1))
      check_url "auth-login-endpoint" "${STAGING_URL}/api/v1/auth/login" "200,400,401,405,422" || FAILED=$((FAILED + 1))
      check_url "users-route-prefix" "${STAGING_URL}/api/v1/users" "200,401,405" || FAILED=$((FAILED + 1))
      check_url "jobs-route-prefix" "${STAGING_URL}/api/v1/jobs" "200,401,405" || FAILED=$((FAILED + 1))
      check_url "customers-route-prefix" "${STAGING_URL}/api/v1/customers" "200,401,405" || FAILED=$((FAILED + 1))
      check_url "admin-organizations-endpoint" "${STAGING_URL}/api/v1/admin/organizations" "200,401,403,405" || FAILED=$((FAILED + 1))

      echo ""
      if [ "$FAILED" -gt 0 ]; then
        echo "❌ $FAILED service(s) failed health check"
        exit 1
      else
        echo "✅ All services healthy"
      fi
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: false

# ---------------------------------------------------------------------------
# PLAYWRIGHT E2E TESTS (Staging)
# ---------------------------------------------------------------------------
# Runs browser-based end-to-end tests against the staging environment.
# Tests live in tests/e2e/ (to be created — see CD_PLAN.md Phase 4).
#
# TODO: Add Playwright test suite covering critical user journeys:
#   - Login / logout / token refresh
#   - Customer CRUD
#   - Job scheduling & calendar
#   - Admin panel access
# ---------------------------------------------------------------------------

playwright-e2e-staging:
  stage: staging-tests
  image: mcr.microsoft.com/playwright:v1.42.0-jammy
  needs:
    - deploy-staging
  before_script:
    - npm ci --prefix tests/e2e || echo "⚠️  No package.json yet — Playwright tests not configured"
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  🎭 Playwright E2E Tests — Staging"
    - echo "═══════════════════════════════════════════════════════════════"
    - 'echo "  Target: ${STAGING_URL}"'
    - echo "⚠️  PLACEHOLDER — Playwright E2E tests not yet implemented"
    - echo "  See CD_PLAN.md Phase 4 for implementation steps"
    - 'echo "⏭️  Skipping (allow_failure: true until tests are written)"'
  artifacts:
    when: always
    paths:
      - tests/e2e/test-results/
      - tests/e2e/playwright-report/
    expire_in: 7 days
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: true   # Soft gate until Playwright tests are implemented

# ---------------------------------------------------------------------------
# GRAFANA K6 LOAD TESTS (Staging)
# ---------------------------------------------------------------------------
# Runs load/performance tests against the staging environment to verify
# the deployment can handle expected traffic before promoting to production.
# Test scripts live in tests/k6/ (to be created — see CD_PLAN.md Phase 4).
#
# TODO: Add k6 test scenarios:
#   - Baseline: 10 VUs for 1 minute (health check)
#   - Ramp-up:  1 → 50 VUs over 3 minutes (normal load)
#   - Spike:    50 → 100 VUs for 1 minute (burst traffic)
#   - Thresholds: p95 < 500ms, error rate < 1%
# ---------------------------------------------------------------------------

k6-load-tests-staging:
  stage: staging-tests
  image:
    name: grafana/k6:latest
    entrypoint: [""]
  needs:
    - deploy-staging
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  📊 Grafana k6 Load Tests — Staging"
    - echo "═══════════════════════════════════════════════════════════════"
    - 'echo "  Target: ${STAGING_URL}"'
    - echo "⚠️  PLACEHOLDER — Grafana k6 load tests not yet implemented"
    - echo "  See CD_PLAN.md Phase 4 for implementation steps"
    - 'echo "⏭️  Skipping (allow_failure: true until tests are written)"'
  artifacts:
    when: always
    paths:
      - k6-results.json
    expire_in: 7 days
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: true   # Soft gate until k6 tests are implemented

# =============================================================================
# STAGE 5: DESTROY STAGING — Fully tear down staging before production
# =============================================================================
# Uses the infra repo destroy job so the EKS cluster, VPC, security groups,
# and IAM resources are removed rather than only scaling nodes to zero.

trigger-destroy-staging:
  stage: destroy-staging
  needs:
    - smoke-tests-staging
    - playwright-e2e-staging
    - k6-load-tests-staging
  trigger:
    project: finalproject/Prototypes/yr4-projectinfrarepo
    strategy: depend
  variables:
    DESTROY_ENV: "staging"
  rules:
    - if: $IMAGE_VERSION
      when: manual
      allow_failure: false

# =============================================================================
# STAGE 6: PROMOTE — Manual approval to deploy to production
# =============================================================================
#
# Same manual gate pattern as the dev repo's trigger-deploy stage.
# Updates production overlay image tags and commits back to repo.
# The pipeline waits for manual approval before deploying to production.

promote-to-production:
  stage: promote
  image: alpine:latest
  needs:
    - trigger-destroy-staging
  before_script:
    - apk add --no-cache git sed
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Promoting ${IMAGE_VERSION} to PRODUCTION"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      cd kubernetes/overlays/production
      sed -i "s|newTag:.*|newTag: ${IMAGE_VERSION}|" kustomization.yaml
      cd "$CI_PROJECT_DIR"
    - git config user.email "cd-pipeline@gitlab.ci"
    - git config user.name "CD Pipeline"
    - git add kubernetes/overlays/production/kustomization.yaml
    - 'git commit -m "ci: promote ${IMAGE_VERSION} to production [skip ci] - Source: ${SOURCE_COMMIT}" || echo "No changes to commit"'
    - |
      # ── Push: prefer GITLAB_API_TOKEN, fall back to CI_JOB_TOKEN ──
      if [ -n "$GITLAB_API_TOKEN" ]; then
        PUSH_URL="https://oauth2:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        echo "⚠️  GITLAB_API_TOKEN not set — falling back to CI_JOB_TOKEN"
        PUSH_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi
      git push "$PUSH_URL" HEAD:main
    - echo ""
    - echo "✅ Production overlay updated — kubectl deploy will proceed next"
  rules:
    - if: $IMAGE_VERSION
      when: manual
      allow_failure: false

# =============================================================================
# STAGE 7a: ENSURE PRODUCTION — Trigger infra repo to bring production cluster up
# =============================================================================
# Same cross-project trigger pattern as staging. Fires after manual promotion
# is approved. The infra repo creates/scales the production cluster, and the
# CD pipeline waits for it to finish before deploying.

trigger-infra-production:
  stage: ensure-production
  needs:
    - promote-to-production
  trigger:
    project: finalproject/Prototypes/yr4-projectinfrarepo
    strategy: depend
  variables:
    ENSURE_UP: "true"
    TARGET_ENV: "production"
  rules:
    - if: $IMAGE_VERSION
      when: on_success

wait-production-ready:
  stage: ensure-production
  image: alpine:latest
  needs:
    - trigger-infra-production
  before_script:
    - apk add --no-cache curl bash python3 py3-pip
    - pip3 install --break-system-packages awscli
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Verifying PRODUCTION cluster readiness after infra trigger"
      echo "═══════════════════════════════════════════════════════════════"

      if ! aws eks describe-cluster --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION > /dev/null 2>&1; then
        echo "❌ Production cluster still does not exist after infra trigger."
        echo "   Check the infra repo pipeline for errors."
        exit 1
      fi

      DESIRED=$(aws eks describe-nodegroup \
        --cluster-name $PROD_CLUSTER_NAME \
        --nodegroup-name $PROD_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --query 'nodegroup.scalingConfig.desiredSize' \
        --output text 2>/dev/null || echo "0")

      if [ "$DESIRED" = "0" ] || [ "$DESIRED" = "None" ]; then
        echo "❌ Production nodes still at 0 after infra trigger."
        exit 1
      fi

      echo "✅ Production node group ready — $DESIRED node(s) desired."

      # Wait for K8s API to become reachable (up to 10 minutes)
      aws eks update-kubeconfig --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION

      echo "Waiting for Kubernetes API to become reachable..."
      API_ENDPOINT=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
      echo "  API endpoint: $API_ENDPOINT"

      for ATTEMPT in $(seq 1 40); do
        if kubectl --request-timeout=15s get --raw=/readyz >/dev/null 2>&1; then
          echo "✅ Kubernetes API is reachable (attempt $ATTEMPT/40)"
          exit 0
        fi
        if [ "$ATTEMPT" -eq 1 ] || [ "$((ATTEMPT % 5))" -eq 0 ]; then
          echo "  Diagnostic (attempt $ATTEMPT/40):"
          kubectl --request-timeout=10s get --raw=/readyz 2>&1 || true
        else
          echo "  ⚠️  API not reachable yet (attempt $ATTEMPT/40), retrying in 15s..."
        fi
        sleep 15
      done

      echo "❌ Kubernetes API not reachable after 10 minutes"
      echo ""
      echo "Diagnostics:"
      echo "── Cluster status ──"
      aws eks describe-cluster --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION \
        --query 'cluster.{Status:status,Endpoint:endpoint,PlatformVersion:platformVersion}' --output table || true
      echo "── Node group status ──"
      aws eks describe-nodegroup --cluster-name $PROD_CLUSTER_NAME --nodegroup-name $PROD_NODE_GROUP --region $AWS_DEFAULT_REGION \
        --query 'nodegroup.{Status:status,DesiredSize:scalingConfig.desiredSize,Health:health}' --output table || true
      echo "── DNS resolution ──"
      nslookup $(echo $API_ENDPOINT | sed 's|https://||') 2>&1 || echo "DNS resolution failed"
      echo "── curl to API endpoint ──"
      curl -sk --connect-timeout 10 --max-time 15 "${API_ENDPOINT}/readyz" 2>&1 | head -20 || echo "curl failed"
      exit 1
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: false

# =============================================================================
# STAGE 7b: INSTALL CLUSTER ADD-ONS — cert-manager, ESO, NGINX Ingress (PROD)
# =============================================================================

install-addons-production:
  stage: deploy-prod
  image: alpine:latest
  resource_group: production-cluster-addons
  needs:
    - wait-production-ready
  before_script:
    - apk add --no-cache curl bash tar gzip python3 py3-pip
    - pip3 install --break-system-packages awscli
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - curl -sL "https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz" | tar xz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/
    - |
      for ATTEMPT in 1 2 3; do
        if aws eks update-kubeconfig --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION; then
          break
        fi
        if [ "$ATTEMPT" -eq 3 ]; then
          echo "❌ Failed to configure kubeconfig after 3 attempts"
          exit 1
        fi
        echo "⚠️  update-kubeconfig failed (attempt $ATTEMPT/3), retrying in 10s..."
        sleep 10
      done
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Installing cluster add-ons for PRODUCTION"
      echo "═══════════════════════════════════════════════════════════════"

      retry_cmd() {
        ATTEMPTS=$1
        DELAY=$2
        shift 2
        TRY=1
        until "$@"; do
          if [ "$TRY" -ge "$ATTEMPTS" ]; then
            echo "❌ Command failed after ${ATTEMPTS} attempts: $*"
            return 1
          fi
          echo "⚠️  Command failed (attempt ${TRY}/${ATTEMPTS}): $*"
          echo "   Retrying in ${DELAY}s..."
          sleep "$DELAY"
          TRY=$((TRY + 1))
        done
      }

      wait_for_k8s_api() {
        ATTEMPTS=$1
        DELAY=$2
        TRY=1
        while [ "$TRY" -le "$ATTEMPTS" ]; do
          if kubectl --request-timeout=15s get --raw=/readyz >/dev/null 2>&1; then
            echo "✅ Kubernetes API reachable (attempt ${TRY}/${ATTEMPTS})"
            return 0
          fi
          if [ "$((TRY % 5))" -eq 0 ]; then
            echo "⚠️  Kubernetes API not reachable (attempt ${TRY}/${ATTEMPTS}) — error:"
            kubectl --request-timeout=10s get --raw=/readyz 2>&1 || true
          else
            echo "⚠️  Kubernetes API not reachable yet (attempt ${TRY}/${ATTEMPTS}), retrying in ${DELAY}s..."
          fi
          sleep "$DELAY"
          TRY=$((TRY + 1))
        done
        echo "❌ Kubernetes API not reachable after ${ATTEMPTS} checks"
        echo "── Final diagnostic ──"
        kubectl --request-timeout=10s cluster-info 2>&1 || true
        return 1
      }

      clear_pending_helm_release() {
        RELEASE=$1
        NAMESPACE=$2
        STATUS=$(helm status "$RELEASE" -n "$NAMESPACE" -o json 2>/dev/null | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
        case "$STATUS" in
          pending-install|pending-upgrade|pending-rollback)
            echo "⚠️  Helm release $RELEASE in $NAMESPACE is $STATUS — clearing stale operation lock..."
            helm rollback "$RELEASE" 0 -n "$NAMESPACE" 2>/dev/null || true
            helm uninstall "$RELEASE" -n "$NAMESPACE" 2>/dev/null || true
            sleep 10
            ;;
        esac
      }

      wait_for_k8s_api 30 15

      ESO_ROLE_ARN=$(aws iam get-role \
        --role-name yr4-project-production-eso-role \
        --query 'Role.Arn' --output text)
      echo "ESO Role ARN: $ESO_ROLE_ARN"

      # 1. cert-manager
      echo "--- Installing cert-manager ---"
      retry_cmd 4 10 helm repo add jetstack https://charts.jetstack.io
      retry_cmd 4 10 helm repo update jetstack
      retry_cmd 4 20 helm upgrade --install cert-manager jetstack/cert-manager \
        --namespace cert-manager --create-namespace \
        --set crds.enabled=true \
        --wait --timeout 300s

      # 2. External Secrets Operator
      echo "--- Installing External Secrets Operator ---"
      retry_cmd 4 10 helm repo add external-secrets https://charts.external-secrets.io
      retry_cmd 4 10 helm repo update external-secrets
      clear_pending_helm_release external-secrets external-secrets
      retry_cmd 10 30 helm upgrade --install external-secrets external-secrets/external-secrets \
        --namespace external-secrets --create-namespace \
        --set installCRDs=true \
        --set serviceAccount.create=true \
        --set serviceAccount.name=external-secrets-sa \
        --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$ESO_ROLE_ARN" \
        --wait --timeout 300s

      # 3. NGINX Ingress Controller
      echo "--- Installing NGINX Ingress Controller ---"
      retry_cmd 4 10 helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
      retry_cmd 4 10 helm repo update ingress-nginx
      helm status ingress-nginx -n ingress-nginx 2>/dev/null \
        && STATUS=$(helm status ingress-nginx -n ingress-nginx -o json | grep -o '"status":"[^"]*"' | head -1) \
        || STATUS=""
      if echo "$STATUS" | grep -q 'failed\|pending-'; then
        echo "  Previous release in bad state ($STATUS) — rolling back..."
        helm rollback ingress-nginx 0 -n ingress-nginx 2>/dev/null || helm uninstall ingress-nginx -n ingress-nginx 2>/dev/null || true
      fi
      retry_cmd 4 20 helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
        --namespace ingress-nginx --create-namespace \
        --atomic --timeout 900s

      echo ""
      echo "✅ All production add-ons installed successfully"
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: false

# =============================================================================
# STAGE 6b: DEPLOY PRODUCTION — kubectl apply + rollout verification
# =============================================================================

deploy-production:
  stage: deploy-prod
  image: alpine:latest
  needs:
    - install-addons-production
  before_script:
    - apk add --no-cache curl bash tar gzip python3 py3-pip sed
    - pip3 install --break-system-packages awscli
    # Install kubectl
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    # Install Helm (direct binary download — fallback addon installation)
    - curl -sL "https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz" | tar xz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/
    # Configure kubeconfig for the production EKS cluster
    - aws eks update-kubeconfig --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Deploying to PRODUCTION via kubectl apply"
    - 'echo "  Image version: ${IMAGE_VERSION}"'
    - echo "═══════════════════════════════════════════════════════════════"
    # Ensure ESO is installed (fallback if install-addons-production was skipped/retried)
    - |
      if ! kubectl get crd externalsecrets.external-secrets.io > /dev/null 2>&1; then
        echo "⚠️  ESO CRDs not found — installing External Secrets Operator as fallback..."
        STATUS=$(helm status external-secrets -n external-secrets -o json 2>/dev/null | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
        case "$STATUS" in
          pending-install|pending-upgrade|pending-rollback)
            echo "⚠️  External-secrets release is $STATUS — clearing stale operation lock..."
            helm rollback external-secrets 0 -n external-secrets 2>/dev/null || true
            helm uninstall external-secrets -n external-secrets 2>/dev/null || true
            sleep 10
            ;;
        esac
        helm repo add external-secrets https://charts.external-secrets.io
        helm repo update external-secrets
        ESO_ROLE_ARN=$(aws iam get-role --role-name yr4-project-production-eso-role \
          --query 'Role.Arn' --output text 2>/dev/null || echo "")
        HELM_ARGS="--namespace external-secrets --create-namespace --set installCRDs=true --wait --timeout 300s"
        if [ -n "$ESO_ROLE_ARN" ]; then
          HELM_ARGS="$HELM_ARGS --set serviceAccount.create=true --set serviceAccount.name=external-secrets-sa"
          HELM_ARGS="$HELM_ARGS --set serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn=$ESO_ROLE_ARN"
        fi
        for ATTEMPT in 1 2 3 4 5; do
          if helm upgrade --install external-secrets external-secrets/external-secrets $HELM_ARGS; then
            break
          fi
          if [ "$ATTEMPT" -eq 5 ]; then
            echo "❌ Failed to install external-secrets after 5 attempts"
            exit 1
          fi
          echo "⚠️  External-secrets install failed (attempt $ATTEMPT/5), retrying in 20s..."
          sleep 20
        done
        echo "✅ ESO installed"
      else
        echo "✅ ESO CRDs already available"
      fi
    # Ensure cert-manager is installed (fallback)
    - |
      if ! kubectl get crd certificates.cert-manager.io > /dev/null 2>&1; then
        echo "⚠️  cert-manager CRDs not found — installing as fallback..."
        helm repo add jetstack https://charts.jetstack.io
        helm repo update jetstack
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager --create-namespace \
          --set crds.enabled=true \
          --wait --timeout 300s
        echo "✅ cert-manager installed"
      else
        echo "✅ cert-manager CRDs already available"
      fi
    # ── Pin images to exact version when triggered by dev repo ──
    - |
      if [ -n "$IMAGE_VERSION" ] && [ "$IMAGE_VERSION" != "latest" ]; then
        echo "📌 Pinning production images to version: $IMAGE_VERSION"
        for f in kubernetes/base/*-deployment.y*ml kubernetes/base/migration-job.yaml; do
          [ -f "$f" ] || continue
          if grep -q "bencev04/4th-year-proj-tadgh-bence:.*-latest" "$f" 2>/dev/null; then
            sed -i "s|bencev04/4th-year-proj-tadgh-bence:\(.*\)-latest|bencev04/4th-year-proj-tadgh-bence:\\1-${IMAGE_VERSION}|g" "$f"
            echo "  ✅ $(basename $f)"
          fi
        done
        echo ""
      else
        echo "ℹ️  IMAGE_VERSION not set — deploying with -latest tags"
      fi
    - kubectl create namespace $PROD_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    - |
      # Job pod template is immutable; recreate migration job on each deploy.
      kubectl delete job migration-runner -n $PROD_NAMESPACE --ignore-not-found=true
    - kubectl apply -k kubernetes/overlays/production
    - |
      echo "Waiting for deployments to become ready..."
      FAILED_DEPLOYS=""
      for DEPLOY in $(kubectl get deployments -n $PROD_NAMESPACE -o name); do
        echo "  Waiting for $DEPLOY..."
        kubectl rollout status $DEPLOY -n $PROD_NAMESPACE --timeout=300s || {
          DEPLOY_NAME=$(echo $DEPLOY | sed 's|deployment.apps/||')
          echo "❌ $DEPLOY rollout failed — gathering diagnostics..."
          echo "── Pod status ──"
          kubectl get pods -n $PROD_NAMESPACE -l app=$DEPLOY_NAME -o wide 2>/dev/null || true
          echo "── Recent events ──"
          kubectl get events -n $PROD_NAMESPACE --sort-by=.lastTimestamp --field-selector involvedObject.kind=Pod 2>/dev/null | grep "$DEPLOY_NAME" | tail -15 || true
          echo "── Container logs (last 30 lines) ──"
          kubectl logs -n $PROD_NAMESPACE -l app=$DEPLOY_NAME --tail=30 --all-containers 2>/dev/null || true
          echo ""
          FAILED_DEPLOYS="$FAILED_DEPLOYS $DEPLOY_NAME"
        }
      done
      if [ -n "$FAILED_DEPLOYS" ]; then
        echo ""
        echo "❌ FAILED DEPLOYMENTS:$FAILED_DEPLOYS"
        echo ""
        echo "Diagnostics above should indicate the root cause."
        exit 1
      fi
    - |
      echo ""
      echo "Waiting for LoadBalancer external hostname..."
      for i in $(seq 1 60); do
        LB_HOST=$(kubectl get svc nginx-gateway -n $PROD_NAMESPACE \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
        LB_IP=$(kubectl get svc nginx-gateway -n $PROD_NAMESPACE \
          -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)

        if [ -n "$LB_HOST" ]; then
          echo "PROD_URL=http://$LB_HOST" > production-deploy.env
          echo "✅ Production URL: http://$LB_HOST"
          break
        fi

        if [ -n "$LB_IP" ]; then
          echo "PROD_URL=http://$LB_IP" > production-deploy.env
          echo "✅ Production URL: http://$LB_IP"
          break
        fi

        echo "  Attempt $i/60 — waiting for LB provisioning..."
        sleep 10
      done
      if [ -z "$LB_HOST" ] && [ -z "$LB_IP" ]; then
        echo "⚠️  LoadBalancer hostname not available yet"
        kubectl get svc nginx-gateway -n $PROD_NAMESPACE -o wide || true
        kubectl describe svc nginx-gateway -n $PROD_NAMESPACE || true
        echo "PROD_URL=" > production-deploy.env
      fi
    - echo ""
    - echo "✅ Production deployment complete"
  artifacts:
    reports:
      dotenv: production-deploy.env
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: false

# =============================================================================
# STAGE 7: PRODUCTION VALIDATION — Post-deploy smoke tests
# =============================================================================

smoke-tests-production:
  stage: prod-validation
  image: alpine:latest
  needs:
    - deploy-production
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Production Smoke Tests — Health Checks"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      if [ -z "$PROD_URL" ]; then
        echo "❌ PROD_URL is empty — LoadBalancer hostname not provisioned"
        exit 1
      fi
      FAILED=0
      check_url() {
        NAME="$1"
        URL="$2"
        EXPECTED="$3"
        echo -n "  Checking $NAME... "
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
        OLDIFS=$IFS
        IFS=','
        for CODE in $EXPECTED; do
          if [ "$HTTP_CODE" = "$CODE" ]; then
            IFS=$OLDIFS
            echo "✅ ($HTTP_CODE)"
            return 0
          fi
        done
        IFS=$OLDIFS
        echo "❌ ($HTTP_CODE), expected: $EXPECTED"
        return 1
      }

      check_url "gateway-health" "${PROD_URL}/health" "200" || FAILED=$((FAILED + 1))
      check_url "frontend-root" "${PROD_URL}/" "200,301,302" || FAILED=$((FAILED + 1))
      check_url "auth-login-endpoint" "${PROD_URL}/api/v1/auth/login" "200,400,401,405,422" || FAILED=$((FAILED + 1))
      check_url "users-route-prefix" "${PROD_URL}/api/v1/users" "200,401,405" || FAILED=$((FAILED + 1))
      check_url "jobs-route-prefix" "${PROD_URL}/api/v1/jobs" "200,401,405" || FAILED=$((FAILED + 1))
      check_url "customers-route-prefix" "${PROD_URL}/api/v1/customers" "200,401,405" || FAILED=$((FAILED + 1))
      check_url "admin-organizations-endpoint" "${PROD_URL}/api/v1/admin/organizations" "200,401,403,405" || FAILED=$((FAILED + 1))

      echo ""
      if [ "$FAILED" -gt 0 ]; then
        echo "❌ $FAILED service(s) failed health check in production"
        echo "⚠️  ACTION REQUIRED: Check deployment logs and kubectl rollout status"
        exit 1
      else
        echo "✅ All production services healthy"
      fi
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: false

# =============================================================================
# STAGE 8: NOTIFY — Deploy result notification
# =============================================================================

# =============================================================================
# STAGE 9: NOTIFY — Deploy result notification
# =============================================================================

notify-success:
  stage: notify
  image: alpine:latest
  needs:
    - smoke-tests-production
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  ✅ DEPLOYMENT SUCCESSFUL"
    - echo "═══════════════════════════════════════════════════════════════"
    - echo ""
    - 'echo "  Environment:  Production"'
    - 'echo "  Version:      ${IMAGE_VERSION}"'
    - 'echo "  Source:        ${SOURCE_COMMIT}"'
    - 'echo "  Pipeline:     ${CI_PIPELINE_URL}"'
    - echo ""
    # TODO: Add Slack/Teams/webhook notification
    # - |
    #   curl -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" \
    #     -d "{\"text\": \"✅ Production deploy complete — version ${IMAGE_VERSION}\"}"
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: true

notify-failure:
  stage: notify
  image: alpine:latest
  needs:
    - smoke-tests-production
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  ❌ DEPLOYMENT FAILED"
    - echo "═══════════════════════════════════════════════════════════════"
    - echo ""
    - 'echo "  Environment:  Production"'
    - 'echo "  Version:      ${IMAGE_VERSION}"'
    - 'echo "  Pipeline:     ${CI_PIPELINE_URL}"'
    - echo ""
    - 'echo "  ACTION REQUIRED: Check deployment logs and kubectl rollout status"'
    # TODO: Add Slack/Teams/webhook notification
  rules:
    - if: $IMAGE_VERSION
      when: on_failure
  allow_failure: true

# =============================================================================
# MANUAL OVERRIDE: SCALE-UP / SCALE-DOWN JOBS
# =============================================================================
#
# Manual-trigger jobs for controlling EKS node groups via AWS CLI.
# These are independent of the deploy flow — use them from the GitLab UI.
#
# Typical workflow (Option C — separate clusters):
#   1. scale-up-staging    → bring staging nodes up
#   2. (pipeline deploys)  → validate in staging
#   3. scale-up-production → bring production nodes up
#   4. (pipeline deploys)  → canary rollout to production
#   5. scale-down-staging  → staging no longer needed (auto after prod deploy)
#   6. (after demo/use)    → scale-down-production
#
# EKS control plane (~$0.10/hr) still runs when nodes=0.
# To fully destroy a cluster, use 'destroy-staging' or 'destroy-production'
# in the infrastructure repo.

manual-scale-up-staging:
  stage: manual-ops
  image:
    name: amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - |
      echo "Scaling STAGING node group to 2 nodes..."
      aws eks update-nodegroup-config \
        --cluster-name $STAGING_CLUSTER_NAME \
        --nodegroup-name $STAGING_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --scaling-config desiredSize=2,minSize=0,maxSize=3

      echo "Waiting for staging nodes..."
      aws eks wait nodegroup-active \
        --cluster-name $STAGING_CLUSTER_NAME \
        --nodegroup-name $STAGING_NODE_GROUP \
        --region $AWS_DEFAULT_REGION
      echo "✅ Staging scaled UP"
  rules:
    - when: manual
  allow_failure: true

manual-scale-down-staging:
  stage: manual-ops
  image:
    name: amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - |
      echo "Scaling STAGING node group to 0 nodes..."
      aws eks update-nodegroup-config \
        --cluster-name $STAGING_CLUSTER_NAME \
        --nodegroup-name $STAGING_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --scaling-config desiredSize=0,minSize=0,maxSize=3
      echo "✅ Staging scaled DOWN"
  rules:
    - when: manual
  allow_failure: true

manual-scale-up-production:
  stage: manual-ops
  image:
    name: amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - |
      echo "Scaling PRODUCTION node group to 3 nodes..."
      aws eks update-nodegroup-config \
        --cluster-name $PROD_CLUSTER_NAME \
        --nodegroup-name $PROD_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --scaling-config desiredSize=3,minSize=0,maxSize=5

      echo "Waiting for production nodes..."
      aws eks wait nodegroup-active \
        --cluster-name $PROD_CLUSTER_NAME \
        --nodegroup-name $PROD_NODE_GROUP \
        --region $AWS_DEFAULT_REGION
      echo "✅ Production scaled UP"
  rules:
    - when: manual
  allow_failure: true

manual-scale-down-production:
  stage: manual-ops
  image:
    name: amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - |
      echo "Scaling PRODUCTION node group to 0 nodes..."
      aws eks update-nodegroup-config \
        --cluster-name $PROD_CLUSTER_NAME \
        --nodegroup-name $PROD_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --scaling-config desiredSize=0,minSize=0,maxSize=5
      echo "✅ Production scaled DOWN"
  rules:
    - when: manual
  allow_failure: true
