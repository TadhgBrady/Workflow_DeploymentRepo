# =============================================================================
# Year 4 Project — CD Pipeline (Deployment Repo)
# =============================================================================
#
# Triggered by the dev repo CI pipeline (trigger-deploy stage) via GitLab webhook.
# Receives: IMAGE_TAG, IMAGE_VERSION, SOURCE_COMMIT, SOURCE_BRANCH
#
# Pipeline Architecture (8 stages):
#
#   validate → update-tags → deploy-staging → staging-tests → promote → deploy-prod → prod-validation → notify
#
# Environments:
#   - Staging:    Auto-deploy, canary rollout, full test suite before promotion
#   - Production: Manual gate, conservative canary rollout, post-deploy smoke tests
#
# Infrastructure:
#   - AWS EKS (managed via Terraform in terraform/)
#   - ArgoCD for GitOps-driven deployments
#   - Argo Rollouts for canary (slow switchover) strategy
#   - RDS PostgreSQL + ElastiCache Redis (AWS-managed, Terraform-provisioned)
#   - External Secrets Operator for secrets from AWS Secrets Manager
#
# Scale-up/down jobs at the bottom allow bringing staging or production
# infrastructure up and down independently via Terraform to minimise cost.
#
# =============================================================================

stages:
  - validate            # Lint manifests, validate Terraform & Helm
  - update-tags         # Patch Kustomize overlays with new image version
  - deploy-staging      # ArgoCD sync staging, canary rollout
  - staging-tests       # Playwright E2E, Grafana k6 load tests, smoke tests
  - promote             # Manual gate — approve promotion to production
  - deploy-prod         # ArgoCD sync production, conservative canary rollout
  - prod-validation     # Post-deploy smoke tests & health verification
  - notify              # Slack/webhook notification of deploy result

# =============================================================================
# VARIABLES
# =============================================================================

variables:
  # -- Passed from dev repo trigger-deploy stage --
  # IMAGE_TAG:       Docker Hub registry path (e.g. bencev04/4th-year-proj-tadgh-bence)
  # IMAGE_VERSION:   Short SHA of the source commit (e.g. a1b2c3d4)
  # SOURCE_COMMIT:   Full SHA of the source commit
  # SOURCE_BRANCH:   Branch that triggered the build (should be "main")

  # -- ArgoCD connection (set in GitLab CI/CD settings) --
  # ARGOCD_SERVER:     ArgoCD server URL
  # ARGOCD_AUTH_TOKEN: ArgoCD API token

  # -- AWS credentials (set in GitLab CI/CD settings) --
  # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION

  # -- Terraform --
  TF_IN_AUTOMATION: "true"

  # -- Cluster --
  EKS_CLUSTER_NAME: "year4-project"
  STAGING_NAMESPACE: "year4-project-staging"
  PROD_NAMESPACE: "year4-project"

  # -- App --
  STAGING_URL: ""   # Set after ALB/ingress is provisioned
  PROD_URL: ""      # Set after ALB/ingress is provisioned

  # -- Services list (matches dev repo) --
  SERVICES: "nginx-gateway auth-service user-bl-service user-db-access-service job-bl-service job-db-access-service customer-bl-service customer-db-access-service admin-bl-service frontend migration-runner"

# =============================================================================
# STAGE 1: VALIDATE — Lint manifests, validate Terraform & Helm
# =============================================================================

validate-manifests:
  stage: validate
  image: ghcr.io/yannh/kubeconform:latest
  before_script: []
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Validating Kubernetes manifests (kubeconform)"
    - echo "═══════════════════════════════════════════════════════════════"

    # Validate that Kustomize overlays produce valid K8s YAML
    # Note: requires kustomize binary; kubeconform image may need a multi-tool image
    - |
      for ENV in staging production; do
        echo "── Validating overlay: $ENV ──"
        kubectl kustomize kubernetes/overlays/$ENV | kubeconform -strict -summary
      done

    - echo ""
    - echo "✅ All Kubernetes manifests are valid"
  rules:
    - when: always
  allow_failure: false

validate-terraform:
  stage: validate
  image:
    name: hashicorp/terraform:1.7
    entrypoint: [""]
  before_script: []
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Validating Terraform configuration"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      for ENV in staging production; do
        echo "── terraform validate: environments/$ENV ──"
        cd terraform/environments/$ENV
        terraform init -backend=false
        terraform validate
        terraform fmt -check -recursive
        cd "$CI_PROJECT_DIR"
      done
    - echo ""
    - echo "✅ Terraform configuration is valid"
  rules:
    - when: always
  allow_failure: false

validate-helm:
  stage: validate
  image:
    name: alpine/helm:3.14
    entrypoint: [""]
  before_script: []
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Validating Helm templates"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      for ENV in dev staging prod; do
        echo "── helm template: values-${ENV}.yaml ──"
        helm template year4-project helm/year4-project \
          -f helm/year4-project/values-${ENV}.yaml \
          --debug > /dev/null
      done
    - echo ""
    - echo "✅ All Helm templates render successfully"
  rules:
    - when: always
  allow_failure: false

# =============================================================================
# STAGE 2: UPDATE TAGS — Patch Kustomize overlays with new image version
# =============================================================================
#
# This commits the updated image tags back to the deployment repo.
# ArgoCD watches this repo — the commit triggers an automatic sync for staging.
#
# References dev repo: IMAGE_TAG = $CI_REGISTRY_IMAGE, IMAGE_VERSION = $CI_COMMIT_SHORT_SHA
# Image naming convention: $IMAGE_TAG:{service}-{IMAGE_VERSION} and {service}-latest
# (see dev repo .gitlab-ci.yml build-scan-push stage)

update-image-tags:
  stage: update-tags
  image: alpine:latest
  needs:
    - validate-manifests
    - validate-terraform
    - validate-helm
  before_script:
    - apk add --no-cache git sed
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Updating Kustomize image tags"
    - echo "  IMAGE_TAG:     ${IMAGE_TAG}"
    - echo "  IMAGE_VERSION: ${IMAGE_VERSION}"
    - echo "  SOURCE_COMMIT: ${SOURCE_COMMIT}"
    - echo "═══════════════════════════════════════════════════════════════"

    # Update staging overlay — use the SHA-tagged images
    - |
      cd kubernetes/overlays/staging
      sed -i "s|newTag:.*|newTag: ${IMAGE_VERSION}|" kustomization.yaml
      cd "$CI_PROJECT_DIR"

    # Update production overlay — keep on latest for now (promotion updates this)
    # Production tag update happens in the promote stage

    # Commit and push the tag update
    - git config user.email "cd-pipeline@gitlab.ci"
    - git config user.name "CD Pipeline"
    - git add kubernetes/overlays/staging/kustomization.yaml
    - |
      git commit -m "ci: update staging image tag to ${IMAGE_VERSION}

      Source commit: ${SOURCE_COMMIT}
      Source branch: ${SOURCE_BRANCH}
      Triggered by dev repo CI pipeline" || echo "No changes to commit"
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:main
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# =============================================================================
# STAGE 3: DEPLOY STAGING — ArgoCD sync + canary rollout
# =============================================================================

deploy-staging:
  stage: deploy-staging
  image: argoproj/argocd:v2.10.0
  needs:
    - update-image-tags
  before_script:
    - argocd login "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --grpc-web
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Deploying to STAGING via ArgoCD"
    - echo "  Image version: ${IMAGE_VERSION}"
    - echo "═══════════════════════════════════════════════════════════════"

    # Trigger sync (staging app has auto-sync, but force it here for immediacy)
    - argocd app sync year4-project-staging --force --prune

    # Wait for all resources to be healthy (canary rollout completion)
    - argocd app wait year4-project-staging --health --timeout 600

    - echo ""
    - echo "✅ Staging deployment healthy — canary rollout complete"
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# =============================================================================
# STAGE 4: STAGING TESTS — E2E, load tests, smoke tests
# =============================================================================
#
# All three jobs run in parallel against the staging environment.
# Playwright E2E and k6 load tests validate the deployment before promotion.
#

smoke-tests-staging:
  stage: staging-tests
  image: alpine:latest
  needs:
    - deploy-staging
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Smoke Tests — Staging Health Checks"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      FAILED=0
      SERVICES_TO_CHECK="auth-service user-bl-service user-db-access-service job-bl-service job-db-access-service customer-bl-service customer-db-access-service admin-bl-service frontend"
      for SVC in $SERVICES_TO_CHECK; do
        echo -n "  Checking $SVC... "
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
          "${STAGING_URL}/api/${SVC}/health" 2>/dev/null || echo "000")
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ ($HTTP_CODE)"
        else
          echo "❌ ($HTTP_CODE)"
          FAILED=$((FAILED + 1))
        fi
      done

      echo ""
      if [ "$FAILED" -gt 0 ]; then
        echo "❌ $FAILED service(s) failed health check"
        exit 1
      else
        echo "✅ All services healthy"
      fi
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# ---------------------------------------------------------------------------
