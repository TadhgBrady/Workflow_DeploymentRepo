    K6_COOLDOWN_DURATION: "1m"
    K6_JOB_TIMEOUT: "35m"
    K6_SCHEDULE_TIMEOUT: "5m"
    K6_HARD_TARGET_VUS: "24"
    K6_HARD_JOBS_PER_SESSION: "2"
    K6_PRE_ALLOCATED_VUS: "24"
    K6_MAX_VUS: "70"
    K6_THINK_TIME_SECONDS: "0.35"
    K6_THINK_TIME_JITTER_SECONDS: "0.25"
    K6_FAILURE_RATE: "0.05"
    K6_UNEXPECTED_STATUS_RATE: "0.05"
    K6_SERVER_ERROR_RATE: "0.01"
    K6_CHECK_RATE: "0.90"
    K6_WORKFLOW_SUCCESS_RATE: "0.90"
    K6_LATENCY_P95_MS: "3000"
    K6_LATENCY_P99_MS: "7000"
    K6_SCHEDULING_P95_MS: "4000"
    K6_SCHEDULING_P99_MS: "8000"
    K6_CONFLICT_P95_MS: "4000"
    K6_CONFLICT_P99_MS: "8000"
    K6_OWNER_EMAIL: "owner@demo.com"
    K6_MANAGER_EMAIL: "manager@demo.com"
    K6_EMPLOYEE_EMAIL: "employee@demo.com"
  before_script:
    - apk add --no-cache curl bash aws-cli
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
