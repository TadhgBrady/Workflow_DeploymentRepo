# =============================================================================
# Year 4 Project — CD Pipeline (Deployment Repo)
# =============================================================================
#
# Triggered by the dev repo CI pipeline (trigger-deploy stage) via GitLab webhook.
# Receives: IMAGE_TAG, IMAGE_VERSION, SOURCE_COMMIT, SOURCE_BRANCH
#
# Pipeline Architecture (11 stages):
#
#   validate → update-tags → ensure-staging (triggers infra repo) → deploy-staging
#     → staging-tests → promote → ensure-production (triggers infra repo) → deploy-prod
#       → prod-validation → teardown → notify
#
# Environments:
#   - Staging:    Auto-deploy, canary rollout, full test suite before promotion
#   - Production: Manual gate, conservative canary rollout, post-deploy smoke tests
#
# Infrastructure:
#   - AWS EKS (managed via Terraform in infra repo)
#   - Direct kubectl/kustomize deployments from pipeline
#   - RDS PostgreSQL + ElastiCache Redis (AWS-managed, Terraform-provisioned)
#   - External Secrets Operator for secrets from AWS Secrets Manager
#
# Scale-up/down jobs at the bottom allow bringing staging or production
# infrastructure up and down independently via Terraform to minimise cost.
#
# =============================================================================

stages:
  - validate            # Lint manifests, validate Helm templates
  - update-tags         # Patch Kustomize overlays with new image version
  - ensure-staging      # Scale up staging cluster (or trigger infra pipeline)
  - deploy-staging      # kubectl apply staging, rollout verification
  - staging-tests       # Playwright E2E, Grafana k6 load tests, smoke tests
  - promote             # Manual gate — approve promotion to production
  - ensure-production   # Scale up production cluster (or trigger infra pipeline)
  - deploy-prod         # kubectl apply production, rollout verification
  - prod-validation     # Post-deploy smoke tests & health verification
  - teardown            # Tear down staging after successful prod deploy
  - notify              # Slack/webhook notification of deploy result
  - manual-ops          # Manual scale-up / scale-down jobs (independent)

# =============================================================================
# VARIABLES
# =============================================================================

variables:
  # -- Passed from dev repo trigger-deploy stage --
  # IMAGE_TAG:       Docker Hub registry path (e.g. bencev04/4th-year-proj-tadgh-bence)
  # IMAGE_VERSION:   Short SHA of the source commit (e.g. a1b2c3d4)
  # SOURCE_COMMIT:   Full SHA of the source commit
  # SOURCE_BRANCH:   Branch that triggered the build (should be "main")

  # -- AWS credentials (set in GitLab CI/CD settings) --
  # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  AWS_DEFAULT_REGION: eu-west-1

  # -- Cluster (separate EKS clusters per environment) --
  STAGING_CLUSTER_NAME: "yr4-project-staging-eks"
  STAGING_NODE_GROUP: "yr4-project-staging-eks-nodes"
  PROD_CLUSTER_NAME: "yr4-project-production-eks"
  PROD_NODE_GROUP: "yr4-project-production-eks-nodes"
  STAGING_NAMESPACE: "year4-project-staging"
  PROD_NAMESPACE: "year4-project"
  # -- Infrastructure repo (set in GitLab CI/CD settings as masked variables) --
  # INFRA_PROJECT_ID: ""        # GitLab project ID for yr4-projectinfrarepo
  # INFRA_TRIGGER_TOKEN: ""     # Pipeline trigger token for infra repo
  # GITLAB_API_TOKEN: ""        # GitLab personal/project token with API access (for polling)

  # -- App URLs --
  # STAGING_URL and PROD_URL are discovered dynamically by deploy jobs
  # and exported as dotenv artifacts for downstream smoke test jobs.

  # -- Services list (matches dev repo) --
  SERVICES: "nginx-gateway auth-service user-bl-service user-db-access-service job-bl-service job-db-access-service customer-bl-service customer-db-access-service admin-bl-service maps-access-service notification-service frontend migration-runner"

# =============================================================================
# STAGE 1: VALIDATE — Lint manifests, validate Helm templates
# =============================================================================

validate-manifests:
  stage: validate
  image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/alpine:latest
  before_script:
    - apk add --no-cache curl bash
    # Install kustomize
    - curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz | tar xz -C /usr/local/bin/
    # Install kubeconform
    - curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz -C /usr/local/bin/
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Validating Kubernetes manifests (kubeconform)"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      for ENV in staging production; do
        echo "── Validating overlay: $ENV ──"
        kustomize build kubernetes/overlays/$ENV | kubeconform -strict -summary -skip ClusterIssuer
      done
    - echo ""
    - echo "✅ All Kubernetes manifests are valid"
  rules:
    - when: always
  allow_failure: false

# NOTE: Terraform validation happens in the infra repo pipeline, not here.
# This repo only contains Kubernetes manifests, Helm charts, and Kustomize overlays.

validate-helm:
  stage: validate
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/alpine/helm:3.14.0
    entrypoint: [""]
  before_script: []
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Validating Helm templates"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      for ENV in dev staging prod; do
        echo "── helm template: values-${ENV}.yaml ──"
        helm template year4-project helm/year4-project \
          -f helm/year4-project/values-${ENV}.yaml \
          --debug > /dev/null
      done
    - echo ""
    - echo "✅ All Helm templates render successfully"
  rules:
    - when: always
  allow_failure: false

# =============================================================================
# STAGE 2: UPDATE TAGS — Patch Kustomize overlays with new image version
# =============================================================================
#
# This commits the updated image tags back to the deployment repo.
#
# References dev repo: IMAGE_TAG = $CI_REGISTRY_IMAGE, IMAGE_VERSION = $CI_COMMIT_SHORT_SHA
# Image naming convention: $IMAGE_TAG:{service}-{IMAGE_VERSION} and {service}-latest
# (see dev repo .gitlab-ci.yml build-scan-push stage)

update-image-tags:
  stage: update-tags
  image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/alpine:latest
  needs:
    - validate-manifests
    - validate-helm
  before_script:
    - apk add --no-cache git sed
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Updating Kustomize image tags"
    - 'echo "  IMAGE_TAG:     ${IMAGE_TAG}"'
    - 'echo "  IMAGE_VERSION: ${IMAGE_VERSION}"'
    - 'echo "  SOURCE_COMMIT: ${SOURCE_COMMIT}"'
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      # ── Guard: Fail fast if required variables are missing ──
      MISSING=""
      if [ -z "$IMAGE_TAG" ]; then MISSING="$MISSING IMAGE_TAG"; fi
      if [ -z "$IMAGE_VERSION" ]; then MISSING="$MISSING IMAGE_VERSION"; fi
      if [ -n "$MISSING" ]; then
        echo ""
        echo "❌ MISSING REQUIRED VARIABLES:$MISSING"
        echo ""
        echo "This pipeline must be triggered by the dev repo (cross-project trigger)"
        echo "with IMAGE_TAG and IMAGE_VERSION set. If this was triggered by a direct"
        echo "push, those variables are not available."
        exit 1
      fi
    - |
      cd kubernetes/overlays/staging
      sed -i "s|newTag:.*|newTag: ${IMAGE_VERSION}|" kustomization.yaml
      cd "$CI_PROJECT_DIR"
    - git config user.email "cd-pipeline@gitlab.ci"
    - git config user.name "CD Pipeline"
    - git add kubernetes/overlays/staging/kustomization.yaml
    - 'git commit -m "ci: update staging image tag to ${IMAGE_VERSION} [skip ci] - Source: ${SOURCE_COMMIT}" || echo "No changes to commit"'
    - |
      # ── Push: prefer GITLAB_API_TOKEN, fall back to CI_JOB_TOKEN ──
      # CI_JOB_TOKEN requires: Settings > Repository > "Allow CI job token to push"
      # GITLAB_API_TOKEN: project/group token with write_repository scope
      if [ -n "$GITLAB_API_TOKEN" ]; then
        PUSH_URL="https://oauth2:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        echo "⚠️  GITLAB_API_TOKEN not set — falling back to CI_JOB_TOKEN"
        echo "   If push fails with 403, enable 'Allow CI job token to push'"
        echo "   in Settings > Repository, or set GITLAB_API_TOKEN variable"
        PUSH_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi
      git push "$PUSH_URL" HEAD:main
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# =============================================================================
# STAGE 3a: ENSURE STAGING — Trigger infra repo to bring staging cluster up
# =============================================================================
# Cross-project trigger: fires the infra repo pipeline with ENSURE_UP=true
# and TARGET_ENV=staging. The infra repo handles all three scenarios:
#   1. Cluster running with nodes   → exit 0 (instant)
#   2. Cluster exists, 0 nodes      → scale up
#   3. Cluster doesn't exist at all → full terraform apply (ensure-apply)
#
# strategy: depend → this CD pipeline WAITS until the infra pipeline finishes.
# If the infra pipeline fails, this job fails, blocking the deploy.
#
# REQUIRED CI/CD VARIABLES:
#   INFRA_PROJECT_ID    — GitLab project ID for yr4-projectinfrarepo
#   INFRA_TRIGGER_TOKEN — Pipeline trigger token created in the infra repo
#                         (Settings > CI/CD > Pipeline trigger tokens)

trigger-infra-staging:
  stage: ensure-staging
  needs:
    - update-image-tags
  trigger:
    project: finalproject/Prototypes/yr4-projectinfrarepo
    strategy: depend
  variables:
    ENSURE_UP: "true"
    TARGET_ENV: "staging"
  rules:
    - if: $IMAGE_VERSION
      when: manual
      allow_failure: false

# After the infra pipeline completes, do a quick readiness check to confirm
# nodes are actually in Ready state before kubectl tries to deploy.
wait-staging-ready:
  stage: ensure-staging
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/amazon/aws-cli:2.22.0
    entrypoint: [""]
  needs:
    - trigger-infra-staging
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Verifying STAGING cluster readiness after infra trigger"
      echo "═══════════════════════════════════════════════════════════════"

      # Confirm cluster exists (should always pass after infra pipeline)
      if ! aws eks describe-cluster --name $STAGING_CLUSTER_NAME --region $AWS_DEFAULT_REGION > /dev/null 2>&1; then
        echo "❌ Staging cluster still does not exist after infra trigger."
        echo "   Check the infra repo pipeline for errors."
        exit 1
      fi

      # Confirm nodes are active
      DESIRED=$(aws eks describe-nodegroup \
        --cluster-name $STAGING_CLUSTER_NAME \
        --nodegroup-name $STAGING_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --query 'nodegroup.scalingConfig.desiredSize' \
        --output text 2>/dev/null || echo "0")

      if [ "$DESIRED" = "0" ] || [ "$DESIRED" = "None" ]; then
        echo "❌ Staging nodes still at 0 after infra trigger."
        exit 1
      fi

      echo "✅ Staging cluster ready — $DESIRED node(s) running."
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# =============================================================================
# STAGE 3b: DEPLOY STAGING — kubectl apply + rollout verification
# =============================================================================

deploy-staging:
  stage: deploy-staging
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/amazon/aws-cli:2.22.0
    entrypoint: [""]
  needs:
    - wait-staging-ready
  before_script:
    # Install kubectl
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    # Configure kubeconfig for the staging EKS cluster
    - aws eks update-kubeconfig --name $STAGING_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Deploying to STAGING via kubectl apply"
    - 'echo "  Image version: ${IMAGE_VERSION}"'
    - echo "═══════════════════════════════════════════════════════════════"
    - kubectl create namespace $STAGING_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    - kubectl apply -k kubernetes/overlays/staging
    - |
      echo "Waiting for deployments to become ready..."
      for DEPLOY in $(kubectl get deployments -n $STAGING_NAMESPACE -o name); do
        echo "  Waiting for $DEPLOY..."
        kubectl rollout status $DEPLOY -n $STAGING_NAMESPACE --timeout=300s
      done
    - |
      echo ""
      echo "Waiting for LoadBalancer external hostname..."
      for i in $(seq 1 30); do
        LB_HOST=$(kubectl get svc staging-nginx-gateway -n $STAGING_NAMESPACE \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
        if [ -n "$LB_HOST" ]; then
          echo "STAGING_URL=http://$LB_HOST" > staging-deploy.env
          echo "✅ Staging URL: http://$LB_HOST"
          break
        fi
        echo "  Attempt $i/30 — waiting for LB provisioning..."
        sleep 10
      done
      if [ -z "$LB_HOST" ]; then
        echo "⚠️  LoadBalancer hostname not available yet (may still be provisioning)"
        echo "STAGING_URL=" > staging-deploy.env
      fi
    - echo ""
    - echo "✅ Staging deployment complete"
  artifacts:
    reports:
      dotenv: staging-deploy.env
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# =============================================================================
# STAGE 4: STAGING TESTS — E2E, load tests, smoke tests
# =============================================================================
#
# All three jobs run in parallel against the staging environment.
# Playwright E2E and k6 load tests validate the deployment before promotion.
#

smoke-tests-staging:
  stage: staging-tests
  image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/alpine:latest
  needs:
    - deploy-staging
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Smoke Tests — Staging Health Checks"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      FAILED=0
      SERVICES_TO_CHECK="auth-service user-bl-service user-db-access-service job-bl-service job-db-access-service customer-bl-service customer-db-access-service admin-bl-service frontend"
      for SVC in $SERVICES_TO_CHECK; do
        echo -n "  Checking $SVC... "
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
          "${STAGING_URL}/api/${SVC}/health" 2>/dev/null || echo "000")
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ ($HTTP_CODE)"
        else
          echo "❌ ($HTTP_CODE)"
          FAILED=$((FAILED + 1))
        fi
      done

      echo ""
      if [ "$FAILED" -gt 0 ]; then
        echo "❌ $FAILED service(s) failed health check"
        exit 1
      else
        echo "✅ All services healthy"
      fi
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# ---------------------------------------------------------------------------
# PLAYWRIGHT E2E TESTS (Staging)
# ---------------------------------------------------------------------------
# Runs browser-based end-to-end tests against the staging environment.
# Tests live in tests/e2e/ (to be created — see CD_PLAN.md Phase 4).
#
# TODO: Add Playwright test suite covering critical user journeys:
#   - Login / logout / token refresh
#   - Customer CRUD
#   - Job scheduling & calendar
#   - Admin panel access
# ---------------------------------------------------------------------------

playwright-e2e-staging:
  stage: staging-tests
  image: mcr.microsoft.com/playwright:v1.42.0-jammy
  needs:
    - deploy-staging
  before_script:
    - npm ci --prefix tests/e2e || echo "⚠️  No package.json yet — Playwright tests not configured"
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  🎭 Playwright E2E Tests — Staging"
    - echo "═══════════════════════════════════════════════════════════════"
    - 'echo "  Target: ${STAGING_URL}"'
    - echo "⚠️  PLACEHOLDER — Playwright E2E tests not yet implemented"
    - echo "  See CD_PLAN.md Phase 4 for implementation steps"
    - 'echo "⏭️  Skipping (allow_failure: true until tests are written)"'
  artifacts:
    when: always
    paths:
      - tests/e2e/test-results/
      - tests/e2e/playwright-report/
    expire_in: 7 days
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: true   # Soft gate until Playwright tests are implemented

# ---------------------------------------------------------------------------
# GRAFANA K6 LOAD TESTS (Staging)
# ---------------------------------------------------------------------------
# Runs load/performance tests against the staging environment to verify
# the deployment can handle expected traffic before promoting to production.
# Test scripts live in tests/k6/ (to be created — see CD_PLAN.md Phase 4).
#
# TODO: Add k6 test scenarios:
#   - Baseline: 10 VUs for 1 minute (health check)
#   - Ramp-up:  1 → 50 VUs over 3 minutes (normal load)
#   - Spike:    50 → 100 VUs for 1 minute (burst traffic)
#   - Thresholds: p95 < 500ms, error rate < 1%
# ---------------------------------------------------------------------------

k6-load-tests-staging:
  stage: staging-tests
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/grafana/k6:latest
    entrypoint: [""]
  needs:
    - deploy-staging
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  📊 Grafana k6 Load Tests — Staging"
    - echo "═══════════════════════════════════════════════════════════════"
    - 'echo "  Target: ${STAGING_URL}"'
    - echo "⚠️  PLACEHOLDER — Grafana k6 load tests not yet implemented"
    - echo "  See CD_PLAN.md Phase 4 for implementation steps"
    - 'echo "⏭️  Skipping (allow_failure: true until tests are written)"'
  artifacts:
    when: always
    paths:
      - k6-results.json
    expire_in: 7 days
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: true   # Soft gate until k6 tests are implemented

# =============================================================================
# STAGE 5: PROMOTE — Manual approval to deploy to production
# =============================================================================
#
# Same manual gate pattern as the dev repo's trigger-deploy stage.
# Updates production overlay image tags and commits back to repo.
# The pipeline waits for manual approval before deploying to production.

promote-to-production:
  stage: promote
  image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/alpine:latest
  needs:
    - smoke-tests-staging
    - playwright-e2e-staging
    - k6-load-tests-staging
  before_script:
    - apk add --no-cache git sed
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Promoting ${IMAGE_VERSION} to PRODUCTION"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      cd kubernetes/overlays/production
      sed -i "s|newTag:.*|newTag: ${IMAGE_VERSION}|" kustomization.yaml
      cd "$CI_PROJECT_DIR"
    - git config user.email "cd-pipeline@gitlab.ci"
    - git config user.name "CD Pipeline"
    - git add kubernetes/overlays/production/kustomization.yaml
    - 'git commit -m "ci: promote ${IMAGE_VERSION} to production [skip ci] - Source: ${SOURCE_COMMIT}" || echo "No changes to commit"'
    - |
      # ── Push: prefer GITLAB_API_TOKEN, fall back to CI_JOB_TOKEN ──
      if [ -n "$GITLAB_API_TOKEN" ]; then
        PUSH_URL="https://oauth2:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        echo "⚠️  GITLAB_API_TOKEN not set — falling back to CI_JOB_TOKEN"
        PUSH_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi
      git push "$PUSH_URL" HEAD:main
    - echo ""
    - echo "✅ Production overlay updated — kubectl deploy will proceed next"
  rules:
    - if: $IMAGE_VERSION
      when: manual
      allow_failure: false

# =============================================================================
# STAGE 6a: ENSURE PRODUCTION — Trigger infra repo to bring production cluster up
# =============================================================================
# Same cross-project trigger pattern as staging. Fires after manual promotion
# is approved. The infra repo creates/scales the production cluster, and the
# CD pipeline waits for it to finish before deploying.

trigger-infra-production:
  stage: ensure-production
  needs:
    - promote-to-production
  trigger:
    project: finalproject/Prototypes/yr4-projectinfrarepo
    strategy: depend
  variables:
    ENSURE_UP: "true"
    TARGET_ENV: "production"
  rules:
    - if: $IMAGE_VERSION
      when: always

wait-production-ready:
  stage: ensure-production
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/amazon/aws-cli:2.22.0
    entrypoint: [""]
  needs:
    - trigger-infra-production
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Verifying PRODUCTION cluster readiness after infra trigger"
      echo "═══════════════════════════════════════════════════════════════"

      if ! aws eks describe-cluster --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION > /dev/null 2>&1; then
        echo "❌ Production cluster still does not exist after infra trigger."
        echo "   Check the infra repo pipeline for errors."
        exit 1
      fi

      DESIRED=$(aws eks describe-nodegroup \
        --cluster-name $PROD_CLUSTER_NAME \
        --nodegroup-name $PROD_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --query 'nodegroup.scalingConfig.desiredSize' \
        --output text 2>/dev/null || echo "0")

      if [ "$DESIRED" = "0" ] || [ "$DESIRED" = "None" ]; then
        echo "❌ Production nodes still at 0 after infra trigger."
        exit 1
      fi

      echo "✅ Production cluster ready — $DESIRED node(s) running."
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# =============================================================================
# STAGE 6b: DEPLOY PRODUCTION — kubectl apply + rollout verification
# =============================================================================

deploy-production:
  stage: deploy-prod
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/amazon/aws-cli:2.22.0
    entrypoint: [""]
  needs:
    - wait-production-ready
  before_script:
    - curl -sLO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - aws eks update-kubeconfig --name $PROD_CLUSTER_NAME --region $AWS_DEFAULT_REGION
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Deploying to PRODUCTION via kubectl apply"
    - 'echo "  Image version: ${IMAGE_VERSION}"'
    - echo "═══════════════════════════════════════════════════════════════"
    - kubectl create namespace $PROD_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    - kubectl apply -k kubernetes/overlays/production
    - |
      echo "Waiting for deployments to become ready..."
      for DEPLOY in $(kubectl get deployments -n $PROD_NAMESPACE -o name); do
        echo "  Waiting for $DEPLOY..."
        kubectl rollout status $DEPLOY -n $PROD_NAMESPACE --timeout=300s
      done
    - |
      echo ""
      echo "Waiting for LoadBalancer external hostname..."
      for i in $(seq 1 30); do
        LB_HOST=$(kubectl get svc prod-nginx-gateway -n $PROD_NAMESPACE \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
        if [ -n "$LB_HOST" ]; then
          echo "PROD_URL=http://$LB_HOST" > production-deploy.env
          echo "✅ Production URL: http://$LB_HOST"
          break
        fi
        echo "  Attempt $i/30 — waiting for LB provisioning..."
        sleep 10
      done
      if [ -z "$LB_HOST" ]; then
        echo "⚠️  LoadBalancer hostname not available yet"
        echo "PROD_URL=" > production-deploy.env
      fi
    - echo ""
    - echo "✅ Production deployment complete"
  artifacts:
    reports:
      dotenv: production-deploy.env
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# =============================================================================
# STAGE 7: PRODUCTION VALIDATION — Post-deploy smoke tests
# =============================================================================

smoke-tests-production:
  stage: prod-validation
  image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/alpine:latest
  needs:
    - deploy-production
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  Production Smoke Tests — Health Checks"
    - echo "═══════════════════════════════════════════════════════════════"
    - |
      FAILED=0
      SERVICES_TO_CHECK="auth-service user-bl-service user-db-access-service job-bl-service job-db-access-service customer-bl-service customer-db-access-service admin-bl-service frontend"
      for SVC in $SERVICES_TO_CHECK; do
        echo -n "  Checking $SVC... "
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
          "${PROD_URL}/api/${SVC}/health" 2>/dev/null || echo "000")
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ ($HTTP_CODE)"
        else
          echo "❌ ($HTTP_CODE)"
          FAILED=$((FAILED + 1))
        fi
      done

      echo ""
      if [ "$FAILED" -gt 0 ]; then
        echo "❌ $FAILED service(s) failed health check in production"
        echo "⚠️  ACTION REQUIRED: Check deployment logs and kubectl rollout status"
        exit 1
      else
        echo "✅ All production services healthy"
      fi
  rules:
    - if: $IMAGE_VERSION
      when: always
  allow_failure: false

# =============================================================================
# STAGE 8: NOTIFY — Deploy result notification
# =============================================================================

# =============================================================================
# STAGE 9: TEARDOWN — Scale down staging after successful production deploy
# =============================================================================
# Once production is validated, staging is no longer needed. Scale its nodes
# to 0 to save costs. The EKS control plane remains (~$0.10/hr) so it can
# be quickly brought back up on the next deployment.
#
# To fully destroy the staging cluster, use 'destroy-staging' in the infra repo.

teardown-staging:
  stage: teardown
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/amazon/aws-cli:2.22.0
    entrypoint: [""]
  needs:
    - smoke-tests-production
  script:
    - |
      echo "═══════════════════════════════════════════════════════════════"
      echo "  Tearing down STAGING — production deploy validated"
      echo "═══════════════════════════════════════════════════════════════"

      echo "Scaling staging node group to 0 nodes..."
      aws eks update-nodegroup-config \
        --cluster-name $STAGING_CLUSTER_NAME \
        --nodegroup-name $STAGING_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --scaling-config desiredSize=0,minSize=0,maxSize=3

      echo "✅ Staging nodes scaled to 0."
      echo "   Staging cluster control plane still running (~$0.10/hr)."
      echo "   To fully destroy, run 'destroy-staging' in the infra repo."
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: true

# =============================================================================
# STAGE 10: NOTIFY — Deploy result notification
# =============================================================================

notify-success:
  stage: notify
  image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/alpine:latest
  needs:
    - smoke-tests-production
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  ✅ DEPLOYMENT SUCCESSFUL"
    - echo "═══════════════════════════════════════════════════════════════"
    - echo ""
    - 'echo "  Environment:  Production"'
    - 'echo "  Version:      ${IMAGE_VERSION}"'
    - 'echo "  Source:        ${SOURCE_COMMIT}"'
    - 'echo "  Pipeline:     ${CI_PIPELINE_URL}"'
    - echo ""
    # TODO: Add Slack/Teams/webhook notification
    # - |
    #   curl -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" \
    #     -d "{\"text\": \"✅ Production deploy complete — version ${IMAGE_VERSION}\"}"
  rules:
    - if: $IMAGE_VERSION
      when: on_success
  allow_failure: true

notify-failure:
  stage: notify
  image: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/alpine:latest
  needs:
    - smoke-tests-production
  before_script:
    - apk add --no-cache curl
  script:
    - echo "═══════════════════════════════════════════════════════════════"
    - echo "  ❌ DEPLOYMENT FAILED"
    - echo "═══════════════════════════════════════════════════════════════"
    - echo ""
    - 'echo "  Environment:  Production"'
    - 'echo "  Version:      ${IMAGE_VERSION}"'
    - 'echo "  Pipeline:     ${CI_PIPELINE_URL}"'
    - echo ""
    - 'echo "  ACTION REQUIRED: Check deployment logs and kubectl rollout status"'
    # TODO: Add Slack/Teams/webhook notification
  rules:
    - if: $IMAGE_VERSION
      when: on_failure
  allow_failure: true

# =============================================================================
# MANUAL OVERRIDE: SCALE-UP / SCALE-DOWN JOBS
# =============================================================================
#
# Manual-trigger jobs for controlling EKS node groups via AWS CLI.
# These are independent of the deploy flow — use them from the GitLab UI.
#
# Typical workflow (Option C — separate clusters):
#   1. scale-up-staging    → bring staging nodes up
#   2. (pipeline deploys)  → validate in staging
#   3. scale-up-production → bring production nodes up
#   4. (pipeline deploys)  → canary rollout to production
#   5. scale-down-staging  → staging no longer needed (auto after prod deploy)
#   6. (after demo/use)    → scale-down-production
#
# EKS control plane (~$0.10/hr) still runs when nodes=0.
# To fully destroy a cluster, use 'destroy-staging' or 'destroy-production'
# in the infrastructure repo.

manual-scale-up-staging:
  stage: manual-ops
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - |
      echo "Scaling STAGING node group to 2 nodes..."
      aws eks update-nodegroup-config \
        --cluster-name $STAGING_CLUSTER_NAME \
        --nodegroup-name $STAGING_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --scaling-config desiredSize=2,minSize=0,maxSize=3

      echo "Waiting for staging nodes..."
      aws eks wait nodegroup-active \
        --cluster-name $STAGING_CLUSTER_NAME \
        --nodegroup-name $STAGING_NODE_GROUP \
        --region $AWS_DEFAULT_REGION
      echo "✅ Staging scaled UP"
  rules:
    - when: manual
  allow_failure: true

manual-scale-down-staging:
  stage: manual-ops
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - |
      echo "Scaling STAGING node group to 0 nodes..."
      aws eks update-nodegroup-config \
        --cluster-name $STAGING_CLUSTER_NAME \
        --nodegroup-name $STAGING_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --scaling-config desiredSize=0,minSize=0,maxSize=3
      echo "✅ Staging scaled DOWN"
  rules:
    - when: manual
  allow_failure: true

manual-scale-up-production:
  stage: manual-ops
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - |
      echo "Scaling PRODUCTION node group to 3 nodes..."
      aws eks update-nodegroup-config \
        --cluster-name $PROD_CLUSTER_NAME \
        --nodegroup-name $PROD_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --scaling-config desiredSize=3,minSize=0,maxSize=5

      echo "Waiting for production nodes..."
      aws eks wait nodegroup-active \
        --cluster-name $PROD_CLUSTER_NAME \
        --nodegroup-name $PROD_NODE_GROUP \
        --region $AWS_DEFAULT_REGION
      echo "✅ Production scaled UP"
  rules:
    - when: manual
  allow_failure: true

manual-scale-down-production:
  stage: manual-ops
  image:
    name: $CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX/amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - |
      echo "Scaling PRODUCTION node group to 0 nodes..."
      aws eks update-nodegroup-config \
        --cluster-name $PROD_CLUSTER_NAME \
        --nodegroup-name $PROD_NODE_GROUP \
        --region $AWS_DEFAULT_REGION \
        --scaling-config desiredSize=0,minSize=0,maxSize=5
      echo "✅ Production scaled DOWN"
  rules:
    - when: manual
  allow_failure: true
