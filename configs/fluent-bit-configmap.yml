apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: elastic-system
data:
  fluent-bit.conf: |
    [SERVICE]
      Parsers_file parsers.conf
      Log_Level info
      Flush 5
      Daemon off
      HTTP_Server On
      HTTP_Listen 0.0.0.0
      HTTP_Port 2020

    # Healthcheck input - for k8s probes
    [INPUT]
      Name http
      Port 9880
      Listen 0.0.0.0
      tag healthcheck

    # Tail container logs from year4-project-dev namespace
    [INPUT]
      Name tail
      Path /var/log/containers/*_year4-project-dev_*.log
      Parser docker
      Tag app.*
      Refresh_Interval 5
      Mem_Buf_Limit 50MB
      Skip_Long_Lines On
      DB /var/log/flb-kube.db
      DB.locking true

    # Parse JSON logs from applications
    [FILTER]
      Name parser
      Match app.*
      Key_Name log
      Parser json
      Preserve_Key On
      Parser docker
      Reserve_Data On

    # Extract Kubernetes metadata
    [FILTER]
      Name kubernetes
      Match app.*
      Kube_URL https://kubernetes.default.svc:443
      Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
      Kube_Tag_Prefix app.var.log.containers.
      Merge_Log On
      Keep_Log Off

    # Add hostname to logs
    [FILTER]
      Name record_modifier
      Match app.*
      Record hostname ${HOSTNAME}
      Record cluster year4-project-dev

    # Route healthchecks to stdout
    [OUTPUT]
      Name stdout
      Match healthcheck

    # Debug output - see all logs (remove in production)
    [OUTPUT]
      Name stdout
      Match app.*
      Format json_lines

    # Send logs to Elasticsearch
    [OUTPUT]
      Name es
      Match app.*
      Host quickstart-es-http.elastic-system.svc.cluster.local
      Port 9200
      HTTP_User elastic
      HTTP_Passwd weyG8Y919T9372VNEg8Gp5MP
      Index app-logs-%Y.%m.%d
      Type _doc

  parsers.conf: |
    [PARSER]
      Name docker
      Format json
      Time_Key time
      Time_Format %Y-%m-%dT%H:%M:%S.%L%z
      Time_Keep On
      Decode_Field_As escaped_utf8 log

    [PARSER]
      Name json
      Format json
      Time_Key timestamp
      Time_Format %Y-%m-%dT%H:%M:%S.%L
      Time_Keep On

    [PARSER]
      Name regex_app
      Format regex
      Regex ^(?<time>[^ ]*) (?<stream>stdout|stderr) (?<source>[^ ]*) (?<log>.*)$
      Time_Key time
      Time_Format %Y-%m-%dT%H:%M:%S.%L%z
      Time_Keep On