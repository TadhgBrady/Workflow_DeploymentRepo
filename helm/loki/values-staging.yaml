deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: yr4-project-staging-loki-placeholder
      ruler: yr4-project-staging-loki-placeholder
      admin: yr4-project-staging-loki-placeholder
    s3:
      region: eu-west-1
      s3ForcePathStyle: false
      insecure: false
  limits_config:
    retention_period: 720h
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
    max_query_lookback: 720h
  compactor:
    retention_enabled: true
    delete_request_store: s3

serviceAccount:
  create: true
  name: loki
  annotations: {}

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: gp3
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1536Mi

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

chunksCache:
  # Staging runs on a small node pool; disable memcached chunks cache to reduce CPU pressure.
  enabled: false
  allocatedMemory: 256

resultsCache:
  # Staging runs on a small node pool; disable memcached results cache to reduce CPU pressure.
  enabled: false
  allocatedMemory: 128

gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

minio:
  enabled: false

test:
  enabled: false

lokiCanary:
  # Disable canary in staging to avoid extra DaemonSet scheduling and Helm wait delays.
  enabled: false
