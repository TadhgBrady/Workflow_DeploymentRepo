{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "year4-project.fullname" . }}-nginx-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "year4-project.labels" . | nindent 4 }}
    service: nginx
data:
  nginx.conf: |
    worker_processes auto;
    worker_rlimit_nofile 65535;
    pid /var/cache/nginx/nginx.pid;

    error_log /var/log/nginx/error.log warn;

    events {
        worker_connections 4096;
        multi_accept       on;
        use                epoll;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        log_format json_combined escape=json
            '{'
                '"time":"$time_iso8601",'
                '"remote_addr":"$remote_addr",'
                '"request":"$request",'
                '"status":$status,'
                '"body_bytes_sent":$body_bytes_sent,'
                '"request_time":$request_time,'
                '"upstream_response_time":"$upstream_response_time",'
                '"http_user_agent":"$http_user_agent",'
                '"http_x_forwarded_for":"$http_x_forwarded_for"'
            '}';

        access_log /var/log/nginx/access.log json_combined;

        sendfile        on;
        tcp_nopush      on;
        tcp_nodelay     on;
        keepalive_timeout  65;
        types_hash_max_size 2048;
        server_tokens off;

        gzip              on;
        gzip_vary         on;
        gzip_proxied      any;
        gzip_comp_level   6;
        gzip_min_length   256;
        gzip_types
            text/plain
            text/css
            text/javascript
            application/json
            application/javascript
            application/xml
            application/xml+rss
            image/svg+xml;

        client_max_body_size       10m;
        client_body_buffer_size    128k;
        client_header_buffer_size  1k;
        large_client_header_buffers 4 8k;

        # Upstream definitions and routing configuration would go here
        # (Reference the original nginx-configmap.yaml for full config)
    }
{{- end }}
