# Staging environment overrides
global:
  environment: staging

# Create namespace for staging
namespace:
  create: true
  name: year4-project-staging

# Use staging image tags
image:
  tag: staging

# Staging uses standard replicas
replicaCount: 2

# Standard resources for staging
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# All services with standard replicas
nginx:
  replicaCount: 2
  service:
    type: LoadBalancer

authService:
  replicaCount: 2

userBlService:
  replicaCount: 2

userDbService:
  replicaCount: 2

jobBlService:
  replicaCount: 2

jobDbService:
  replicaCount: 2

customerBlService:
  replicaCount: 2

customerDbService:
  replicaCount: 2

adminBlService:
  replicaCount: 2

adminDbService:
  replicaCount: 2

frontend:
  replicaCount: 2

env:
  ENVIRONMENT: staging
  LOG_LEVEL: INFO

# Enable autoscaling for staging
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
