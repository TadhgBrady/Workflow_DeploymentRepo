# Production environment overrides
global:
  environment: production

# Create namespace for production
namespace:
  create: true
  name: year4-project

# Use latest image tags
image:
  tag: latest

# Production uses two replicas to reduce steady-state cost while preserving basic HA
replicaCount: 2

# Production resources
resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# All services use the production cost-conscious replica target
nginx:
  replicaCount: 2
  service:
    type: LoadBalancer

authService:
  replicaCount: 2

userBlService:
  replicaCount: 2

userDbService:
  replicaCount: 2

jobBlService:
  replicaCount: 2

jobDbService:
  replicaCount: 2

customerBlService:
  replicaCount: 2

customerDbService:
  replicaCount: 2

adminBlService:
  replicaCount: 2

adminDbService:
  replicaCount: 2

frontend:
  replicaCount: 2

env:
  ENVIRONMENT: production
  LOG_LEVEL: WARN

# Enable autoscaling for production
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Enable ingress for production
ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: yourdomain.com
      paths:
        - path: /
          pathType: Prefix

# Pod disruption budget for production
podDisruptionBudget:
  enabled: true
  minAvailable: 1
