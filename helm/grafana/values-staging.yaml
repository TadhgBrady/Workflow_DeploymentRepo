replicaCount: 2

image:
  repository: grafana/grafana
  tag: "10.2.2"
  pullPolicy: IfNotPresent

nameOverride: grafana
fullnameOverride: grafana

serviceAccount:
  create: true
  annotations: {}
  name: grafana

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"

podSecurityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

securityContext:
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 472

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

persistence:
  enabled: true
  storageClass: "gp2"
  accessMode: ReadWriteOnce
  size: 20Gi
  mountPath: /var/lib/grafana

nodeSelector: {}

tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - grafana
          topologyKey: kubernetes.io/hostname

adminUser: admin
adminPassword: "changeme"

env:
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: changeme
  GF_INSTALL_PLUGINS: ""
  GF_PATHS_PROVISIONING: /etc/grafana/provisioning
  GF_SERVER_PROTOCOL: http
  GF_AUTH_ANONYMOUS_ENABLED: "false"
  GF_USERS_ALLOW_SIGN_UP: "false"

config:
  datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus:9090
      access: proxy
      isDefault: true
      interval: 1m
      scrape_interval: 5m

  dashboards:
    - title: "Year 4 Cluster Overview"
      uid: "cluster-overview"
      panels:
        - title: "Cluster CPU Usage %"
          targets:
            - expr: 'sum(rate(container_cpu_usage_seconds_total{pod!=""}[5m])) / sum(container_spec_cpu_quota{pod!=""}) * 100'
        - title: "Cluster Memory Usage %"
          targets:
            - expr: 'sum(container_memory_usage_bytes{pod!=""}) / sum(container_spec_memory_limit_bytes{pod!=""}) * 100'
        - title: "Pod State Distribution"
          targets:
            - expr: 'count by (phase) (kube_pod_status_phase)'
        - title: "Container Restart Rate"
          targets:
            - expr: 'rate(kube_pod_container_status_restarts_total[1h])'

    - title: "Fluent Bit Pipeline"
      uid: "fluent-bit-pipeline"
      panels:
        - title: "Input Records/sec"
          targets:
            - expr: 'rate(fluentbit_input_records_total[5m])'
        - title: "Output Success Rate %"
          targets:
            - expr: '(1 - (rate(fluentbit_output_errors_total[5m]) / (rate(fluentbit_output_records_total[5m]) + 1))) * 100'
        - title: "Errors/sec"
          targets:
            - expr: 'rate(fluentbit_output_errors_total[5m])'
        - title: "Retry Count"
          targets:
            - expr: 'fluentbit_output_retries_total'
        - title: "Uptime (hours)"
          targets:
            - expr: 'fluentbit_uptime / 3600'

    - title: "Infrastructure Health"
      uid: "infra-health"
      panels:
        - title: "Node CPU Usage %"
          targets:
            - expr: '(1 - avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100'
        - title: "Node Memory Usage %"
          targets:
            - expr: '100 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100)'
        - title: "Disk IO Read (MB/s)"
          targets:
            - expr: 'rate(node_disk_read_bytes_total[5m]) / 1024 / 1024'
        - title: "Disk IO Write (MB/s)"
          targets:
            - expr: 'rate(node_disk_written_bytes_total[5m]) / 1024 / 1024'

    - title: "Application Alerts"
      uid: "app-alerts"
      panels:
        - title: "Failed Pods"
          targets:
            - expr: 'count(kube_pod_status_phase{phase="Failed"})'
        - title: "High Memory Pods"
          targets:
            - expr: 'topk(5, container_memory_usage_bytes{pod!=""})'
        - title: "High CPU Pods"
          targets:
            - expr: 'topk(5, rate(container_cpu_usage_seconds_total[5m]))'
