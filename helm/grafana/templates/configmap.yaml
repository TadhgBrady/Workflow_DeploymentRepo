apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-datasources
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      {{- range .Values.config.datasources }}
      - name: {{ .name }}
        type: {{ .type }}
        url: {{ .url }}
        access: {{ .access }}
        isDefault: {{ .isDefault }}
        interval: {{ .interval }}
        jsonData:
          scrapeInterval: {{ .scrape_interval | quote }}
      {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-dashboards
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'Dashboards'
        orgId: 1
        folder: 'Year 4 Project'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-dashboard-cluster
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  cluster-overview.json: |
    {
      "dashboard": {
        "title": "Year 4 Cluster Overview",
        "uid": "cluster-overview",
        "timezone": "UTC",
        "panels": [
          {
            "title": "CPU Usage ",
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{pod!=\"\"}[5m])) by (pod)"
              }
            ]
          },
          {
            "title": "Memory Usage",
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes{pod!=\"\"}) by (pod)"
              }
            ]
          }
        ]
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-dashboard-operations
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  operations-hub.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["operations", "gitops", "rollouts", "mesh"],
      "time": {"from": "now-6h", "to": "now"},
      "timezone": "UTC",
      "title": "Year 4 Operations Hub",
      "uid": "operations-hub",
      "version": 1,
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "{{ .Values.operationsHub.appNamespace }}", "value": "{{ .Values.operationsHub.appNamespace }}"},
            "hide": 0,
            "label": "Namespace",
            "name": "namespace",
            "options": [{"selected": true, "text": "{{ .Values.operationsHub.appNamespace }}", "value": "{{ .Values.operationsHub.appNamespace }}"}],
            "query": "{{ .Values.operationsHub.appNamespace }}",
            "type": "constant"
          }
        ]
      },
      "panels": [
        {
          "gridPos": {"h": 7, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "content": "### Operations Hub\nUse this page as the starting point for release and runtime checks. Grafana owns metrics, SLOs, release evidence, and historical views; Kiali owns mesh topology; Argo owns GitOps and rollout state; CloudWatch owns log investigation.\n\n| Workflow | Open |\n| --- | --- |\n| GitOps sync and drift | [Argo CD]({{ .Values.operationsHub.argoCdUrl }}) |\n| Canary rollout status | [Argo Rollouts]({{ .Values.operationsHub.argoRolloutsUrl }}) |\n| Service mesh graph | [Kiali]({{ .Values.operationsHub.kialiUrl }}) |\n| Release pipeline | [GitLab pipelines]({{ .Values.operationsHub.gitlabPipelinesUrl }}) |\n| Logs and incidents | [CloudWatch Logs]({{ .Values.operationsHub.cloudWatchLogsUrl }}) |\n| Load gate evidence | [k6 staging dashboard]({{ .Values.operationsHub.k6DashboardUrl }}) |",
            "mode": "markdown"
          },
          "title": "Release And Runtime Navigation",
          "type": "text"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 7},
          "id": 2,
          "targets": [{"expr": "count(kube_pod_status_ready{namespace=\"$namespace\",condition=\"true\"} == 1) or vector(0)", "refId": "A"}],
          "title": "Ready Pods",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 7},
          "id": 3,
          "targets": [{"expr": "count(kube_pod_status_phase{namespace=\"$namespace\",phase=\"Failed\"} == 1) or vector(0)", "refId": "A"}],
          "title": "Failed Pods",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 7},
          "id": 4,
          "targets": [{"expr": "sum(rate(istio_requests_total{destination_workload_namespace=\"$namespace\"}[5m])) or vector(0)", "refId": "A"}],
          "title": "Istio Request Rate",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "percentunit"}},
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 7},
          "id": 5,
          "targets": [{"expr": "(sum(rate(istio_requests_total{destination_workload_namespace=\"$namespace\",response_code=~\"5..\"}[5m])) / clamp_min(sum(rate(istio_requests_total{destination_workload_namespace=\"$namespace\"}[5m])), 1)) or vector(0)", "refId": "A"}],
          "title": "Istio 5xx Rate",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 11},
          "id": 6,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [{"expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}[1h]))", "legendFormat": "$pod", "refId": "A"}],
          "title": "Pod Restarts In Last Hour",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "percentunit"}},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 11},
          "id": 7,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [{"expr": "sum by (destination_workload) (rate(istio_requests_total{destination_workload_namespace=\"$namespace\",response_code=~\"5..\"}[5m])) / clamp_min(sum by (destination_workload) (rate(istio_requests_total{destination_workload_namespace=\"$namespace\"}[5m])), 1)", "legendFormat": "$destination_workload", "refId": "A"}],
          "title": "Mesh Error Rate By Workload",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 19},
          "id": 8,
          "options": {"showHeader": true},
          "targets": [{"expr": "sum by (deployment) (kube_deployment_status_replicas_ready{namespace=\"$namespace\"})", "format": "table", "instant": true, "refId": "A"}],
          "title": "Deployment Ready Replicas",
          "type": "table"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 19},
          "id": 9,
          "options": {"showHeader": true},
          "targets": [{"expr": "sum by (name) (rate(fluentbit_output_errors_total[5m]))", "format": "table", "instant": true, "refId": "A"}],
          "title": "Fluent Bit Output Errors",
          "type": "table"
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-dashboard-fluent
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  fluent-bit.json: |
    {
      "dashboard": {
        "title": "Fluent Bit Monitoring",
        "uid": "fluent-bit-monitoring",
        "timezone": "UTC",
        "panels": [
          {
            "title": "Input Records/sec",
            "targets": [
              {
                "expr": "rate(fluentbit_input_records_total[5m])"
              }
            ]
          },
          {
            "title": "Output Errors/sec",
            "targets": [
              {
                "expr": "rate(fluentbit_output_errors_total[5m])"
              }
            ]
          },
          {
            "title": "Output Retries",
            "targets": [
              {
                "expr": "rate(fluentbit_output_retries_total[5m])"
              }
            ]
          }
        ]
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-dashboard-services
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  application-services.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "refresh": "10s",
      "schemaVersion": 27,
      "style": "dark",
      "tags": ["services", "applications"],
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "UTC",
      "title": "Application Services Dashboard",
      "uid": "app-services-monitoring",
      "version": 1,
      "templating": {
        "list": [
          {
            "allValue": null,
            "current": {"selected": false, "text": "All", "value": "$__all"},
            "datasource": "Prometheus",
            "definition": "label_values(http_requests_total{namespace=\"year4-project-dev\"}, job)",
            "description": null,
            "hide": 0,
            "includeAll": true,
            "label": "Service",
            "multi": true,
            "name": "service",
            "options": [],
            "query": {"query": "label_values(http_requests_total{namespace=\"year4-project-dev\"}, job)", "refId": "StandardVariableQuery"},
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 0,
            "type": "query"
          }
        ]
      },
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 2,
          "targets": [{"expr": "count(up{job=~\"$service\"})", "refId": "A"}],
          "title": "Total Services",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}},
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 3,
          "targets": [{"expr": "count(up{job=~\"$service\"} == 1)", "refId": "A"}],
          "title": "Healthy Services",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 4,
          "targets": [{"expr": "sum(rate(http_requests_total{job=~\"$service\"}[5m]))", "refId": "A"}],
          "title": "Total Request Rate",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "percentunit"}},
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "id": 5,
          "targets": [{"expr": "sum(rate(http_requests_total{job=~\"$service\",status=~\"2..\"}[5m])) / sum(rate(http_requests_total{job=~\"$service\"}[5m]))", "refId": "A"}],
          "title": "Success Rate",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "id": 6,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [{"expr": "sum by (job) (rate(http_requests_total{job=~\"$service\"}[5m]))", "intervalFactor": 1, "legendFormat": "$job", "refId": "A"}],
          "title": "Request Rate by Service",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "s"}},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "id": 7,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [{"expr": "histogram_quantile(0.95, sum by (le, job) (rate(http_request_duration_seconds_bucket{job=~\"$service\"}[5m])))", "intervalFactor": 1, "legendFormat": "$job p95", "refId": "A"}],
          "title": "API Latency (p95)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "percentunit"}},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "id": 8,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [{"expr": "sum by (job) (rate(http_requests_total{job=~\"$service\",status=~\"5..\"}[5m])) / sum by (job) (rate(http_requests_total{job=~\"$service\"}[5m]))", "intervalFactor": 1, "legendFormat": "$job", "refId": "A"}],
          "title": "Error Rate (5xx)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "id": 9,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [{"expr": "sum by (job) (rate(container_cpu_usage_seconds_total{pod=~\"$service.*\",namespace=\"year4-project-dev\"}[5m]))", "intervalFactor": 1, "legendFormat": "$job cpu", "refId": "A"}],
          "title": "CPU Usage by Service", 
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 20},
          "id": 10,
          "options": {"legend": {"displayMode": "table", "placement": "right"}},
          "targets": [{"expr": "sum by (job) (container_memory_usage_bytes{pod=~\"$service.*\",namespace=\"year4-project-dev\"})", "intervalFactor": 1, "legendFormat": "$job", "refId": "A"}],
          "title": "Memory Usage by Service",
          "type": "timeseries"
        }
      ]
    }
