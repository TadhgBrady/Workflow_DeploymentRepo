apiVersion: v1
kind: Service
metadata:
  name: {{ include "prometheus.fullname" . }}-headless
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
spec:
  clusterIP: None
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "prometheus.selectorLabels" . | nindent 4 }}
