apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fluent-bit.fullname" . }}-config
  labels:
    {{- include "fluent-bit.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
{{ .Values.config.service | indent 4 }}
{{ .Values.config.inputs | indent 4 }}
{{ .Values.config.filters | indent 4 }}
{{ .Values.config.outputs | indent 4 }}

  parsers.conf: |
{{ .Values.config.parsers | indent 4 }}
