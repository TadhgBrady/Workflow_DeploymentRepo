replicaCount: 3
image:
  repository: fluent/fluent-bit
  tag: "5.0.3"
  pullPolicy: IfNotPresent

nameOverride: fluent-bit
fullnameOverride: fluent-bit

serviceAccount:
  create: true
  annotations: {}
  name: fluent-bit

rbac:
  create: true

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "2020"
  prometheus.io/path: "/api/v1/metrics/prometheus"

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

state:
  mountPath: /tmp/flb-state
  hostPath: /var/lib/flb-state

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

nodeSelector: {}

tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule
  - key: dedicated
    operator: Equal
    value: logging
    effect: NoSchedule

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - fluent-bit
        topologyKey: kubernetes.io/hostname

config:
  service: |
    [SERVICE]
      Parsers_File parsers.conf
      Log_Level warn
      Flush 15
      Daemon off
      HTTP_Server On
      HTTP_Listen 0.0.0.0
      HTTP_Port 2020
      Health_Check On

  inputs: |
    [INPUT]
      Name http
      Port 9880
      Listen 0.0.0.0
      tag healthcheck

    [INPUT]
      Name tail
      Path /var/log/containers/*.log
      Parser cri
      Tag app.*
      Refresh_Interval 10
      Mem_Buf_Limit 128MB
      Skip_Long_Lines On
      DB /tmp/flb-state/flb-production.db
      DB.locking true

  filters: |
    [FILTER]
      Name parser
      Match app.*
      Key_Name log
      Parser json
      Preserve_Key On
      Parser docker
      Reserve_Data On

    [FILTER]
      Name kubernetes
      Match app.*
      Kube_URL https://kubernetes.default.svc:443
      Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
      Kube_Tag_Prefix app.var.log.containers.
      Merge_Log On
      Keep_Log Off

    [FILTER]
      Name record_modifier
      Match app.*
      Record hostname ${HOSTNAME}
      Record cluster aws-production
      Record environment production
      Record region eu-west-1

  outputs: |
    [OUTPUT]
      Name stdout
      Match healthcheck

    [OUTPUT]
      Name cloudwatch_logs
      Match app.*
      region eu-west-1
      log_group_name /aws/eks/year4-project/prod/logs
      log_stream_prefix fluent-bit-
      auto_create_group false
      retry_limit 5

  parsers: |
    [PARSER]
      Name cri
      Format regex
      Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
      Time_Key time
      Time_Format %Y-%m-%dT%H:%M:%S.%L%z
      Time_Keep On

    [PARSER]
      Name docker
      Format json
      Time_Key time
      Time_Format %Y-%m-%dT%H:%M:%S.%L%z
      Time_Keep On
      Decode_Field_As escaped_utf8 log

    [PARSER]
      Name json
      Format json
      Time_Key timestamp
      Time_Format %Y-%m-%dT%H:%M:%S.%L
      Time_Keep On

    [PARSER]
      Name regex_app
      Format regex
      Regex ^(?<time>[^ ]*) (?<stream>stdout|stderr) (?<source>[^ ]*) (?<log>.*)$
      Time_Key time
      Time_Format %Y-%m-%dT%H:%M:%S.%L%z
      Time_Keep On
