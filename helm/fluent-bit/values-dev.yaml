replicaCount: 1
image:
  repository: fluent/fluent-bit
  tag: "5.0.3"
  pullPolicy: IfNotPresent

nameOverride: fluent-bit
fullnameOverride: fluent-bit

serviceAccount:
  create: true
  annotations: {}
  name: fluent-bit

rbac:
  create: true

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "2020"
  prometheus.io/path: "/api/v1/metrics/prometheus"

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

securityContext:
  privileged: true

state:
  mountPath: /tmp/flb-state
  hostPath: /var/lib/flb-state

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

nodeSelector: {}
tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

affinity: {}

config:
  service: |
    [SERVICE]
      Parsers_File parsers.conf
      Log_Level info
      Flush 5
      Daemon off
      HTTP_Server On
      HTTP_Listen 0.0.0.0
      HTTP_Port 2020
      Health_Check On

  inputs: |
    [INPUT]
      Name http
      Port 9880
      Listen 0.0.0.0
      tag healthcheck

    [INPUT]
      Name tail
      Path /var/log/containers/*_year4-project-dev_*.log
      Parser cri
      Tag app.*
      Refresh_Interval 5
      Mem_Buf_Limit 50MB
      Skip_Long_Lines On
      DB /tmp/flb-state/flb-dev.db
      DB.locking true

  filters: |
    [FILTER]
      Name parser
      Match app.*
      Key_Name log
      Parser json
      Preserve_Key On
      Parser docker
      Reserve_Data On

    [FILTER]
      Name kubernetes
      Match app.*
      Kube_URL https://kubernetes.default.svc:443
      Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
      Kube_Tag_Prefix app.var.log.containers.
      Merge_Log On
      Keep_Log Off

    [FILTER]
      Name record_modifier
      Match app.*
      Record hostname ${HOSTNAME}
      Record cluster year4-project-dev
      Record environment dev

  outputs: |
    [OUTPUT]
      Name stdout
      Match healthcheck

    [OUTPUT]
      Name stdout
      Match app.*
      Format json_lines

    [OUTPUT]
      Name es
      Match app.*
      Host quickstart-es-http.elastic-system.svc.cluster.local
      Port 9200
      HTTP_User elastic
      HTTP_Passwd weyG8Y919T9372VNEg8Gp5MP
      Index app-logs-dev-%Y.%m.%d
      Type _doc

  parsers: |
    [PARSER]
      Name cri
      Format regex
      Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
      Time_Key time
      Time_Format %Y-%m-%dT%H:%M:%S.%L%z
      Time_Keep On

    [PARSER]
      Name docker
      Format json
      Time_Key time
      Time_Format %Y-%m-%dT%H:%M:%S.%L%z
      Time_Keep On
      Decode_Field_As escaped_utf8 log

    [PARSER]
      Name json
      Format json
      Time_Key timestamp
      Time_Format %Y-%m-%dT%H:%M:%S.%L
      Time_Keep On

    [PARSER]
      Name regex_app
      Format regex
      Regex ^(?<time>[^ ]*) (?<stream>stdout|stderr) (?<source>[^ ]*) (?<log>.*)$
      Time_Key time
      Time_Format %Y-%m-%dT%H:%M:%S.%L%z
      Time_Keep On
